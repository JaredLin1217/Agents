name: checkpoint

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  policy-pack:
    name: policy pack
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run policy validation
        shell: pwsh
        run: .\scripts\validate.ps1

      - name: Check diff whitespace
        shell: pwsh
        run: git diff --check
