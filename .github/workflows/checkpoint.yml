name: checkpoint

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  agents-workflow:
    name: agents workflow
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Agents workflow validation
        shell: pwsh
        run: .\scripts\validate.ps1 -Full

      - name: Check diff whitespace
        shell: pwsh
        run: git diff --check
