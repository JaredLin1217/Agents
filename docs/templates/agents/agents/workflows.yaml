schema: agents-workflows/v2
purpose: "Compact procedures for isolation, memory, deployment, multi-agent work, handoff, skills, and maintenance."
owns: "Task routing, progress policy, employee orchestration, handoff, scoring batches, and maintenance profile routing."

read_first:
  - "Task class -> common_task_matrix."
  - "Policy/isolation/closeout -> policy.yaml."
  - "Verification profile -> verify.yaml."
  - "Assignment/report/status fields -> schemas.yaml only when needed."
  - "Tool capability boundaries -> mcp.yaml only when optional runtime integrations matter."
  - "Target deployment -> deploy.yaml."

startup:
  controller:
    - "Read AGENTS.md, then classify the request."
    - "Answer-only with no current repo-state claim: no command, no canonical-file load."
    - "Before edits, git/deploy actions, or git/worktree state claims: inspect git status; for other current-state claims, inspect only the named state source."
    - "Read only the needed canonical file."
    - "Use the smallest verification profile that proves the claim."
    - "Recover/poll employees only for known active employees, explicit runtime claims, ledger entries, or edits near owned scopes."
  common_task_matrix:
    answer_only: "Reads: loaded rules only; status: no; verify: none; closeout: answer plus isolation."
    assigned_read_only_audit: "Reads: assigned files only; status: no unless assigned; verify: read_only_audit; closeout: compact explorer report."
    current_state: "Reads: exact state source; status: only if git state is claimed; verify: fast_turn; closeout: state plus isolation."
    scoped_edit_no_behavior: "Reads: target files; status: scoped when safe; verify: scoped diff; closeout: changed files plus isolation."
    scoped_behavior_edit: "Reads: target and behavior source; status: plain/scoped; verify: focused test/lint/build; closeout: changed files, verification, isolation."
    policy_pack_edit: "Reads: changed canonical/template files; status: plain; verify: changed pairs and changed prose gates only."
    git_checkpoint: "Reads: changed manifest; status: full; verify: commit_tag_checkpoint plus push result when applicable."
    deploy_or_release: "Reads: deploy and affected templates; status: full; verify: release_deploy_push_audit."
  fast_classification:
    answer_only: "No repo-state, git, file, runtime, deploy, memory, or hard-isolation claim; answer directly."
    current_state: "User asks a repo/deploy/git/runtime state question, such as now/current/latest/clean/dirty/online/committed/pushed/tagged/deployed/active/completed; inspect only the needed state source."
    scoped_edit: "Use status, read target files, patch, scoped diff, and closest practical verification."
    policy_pack_edit: "Use policy_pack_edit profile; check changed mirror pairs only."
    multi_agent_runtime: "Use explicit hire/delegate flow; start max available employees first."
    deploy_release_audit: "Use deploy.yaml plus release_deploy_push_audit profile."
    hard_isolation: "Do not claim beyond behavioral-only without current enforcement evidence."
    delegated_deployment: "Use deploy.yaml, assign one deployment_worker only after exact target authorization, and keep writes inside deployed_file_set."
  employee:
    - "Read assignment first."
    - "Read only assigned paths and required project-local skills."
    - "Run only assignment-allowed verification; assigned read-only explorers do not run git status unless explicitly allowed."
    - "Return final report when complete, blocked, or stopped."

progress_updates:
  canonical: "This block is the single progress-update policy; AGENTS, skills, and runbooks should point here instead of restating it."
  answer_only: "No interim update."
  short_read_only: "If expected under 30 seconds or under 5 assigned files, send no interim update unless blocked."
  ordinary_work: "At most one concise update every 30-60 seconds or at a material phase boundary."
  workers: "Update before risky edits, when blocked, after meaningful verification, and at final."
  runtime_cleanup: "Default to one quiet batch; do not narrate each probe/table/file unless cleanup is blocked, destructive scope expands, or user asks for detail."
  cap: "One or two sentences; do not repeat unchanged status."

memory:
  index: "docs/memory/index.md"
  entry_template: "docs/memory-entry.template.md"
  rules:
    - "Use memory only when prior project experience may matter; read only relevant rows/details."
    - "Current repo evidence wins; memory triggers are not verification gates."
    - "Propose entries only for verified, reusable, project-specific lessons."

multi_agent_runtime:
  trigger_when: "explicit hire/spawn/delegate/parallel-agent request or clear semantic equivalent"
  do_not_trigger_for: ["goal continuation", "broad optimization without delegation request", "quality audit without delegation request", "static validation without delegation request", "self-scoring unless the user explicitly requests employee scoring"]
  modes:
    session-managed: "Short bounded sidecar; may block active turn."
    manual-detached: "Visible/user-controllable/non-blocking/longer local work; default for normal hiring."
    cloud-or-automation: "Only by explicit request and available setup."
  roles:
    explorer: "Read-only investigation."
    worker: "Bounded edits inside exclusive owned write scope."
  explorer_lightweight:
    use_when: "session-managed read-only explorer, short-lived, no file edits, no recovery need"
    assignment_schema: "explorer_brief_assignment"
    report_schema: "scoring_explorer_report for scoring/review batches; explorer_final_report for other read-only investigations"
    roster: "optional unless many explorers need progress tracking or the explorer may outlive controller context"
    final_cap: "8-12 lines or about 150-250 words unless blocked or asked for detail"
  controller: "Assigns, reviews, integrates, reconciles, reports."
  fast_spawn:
    prework:
      - "Run one controller git status when git/worktree state or edits matter."
      - "Prepare one reusable short brief per role type."
      - "Do not re-read all runbooks per employee."
    queue_rule: "Fill the runtime's current maximum active slots, keep remaining employees queued, and refill immediately when any employee completes or is closed."
    wait_rule: "Wait only when the next controller step needs results; otherwise continue non-overlapping controller work."
    close_rule: "Close completed employees as soon as their final report is recorded; launch the next queued employee in the freed slot."
    history_cleanup_rule: "Plain close requests close runtime only. Sidebar/history cleanup needs explicit cleanup wording or standalone exact cleanup authorization; when authorized, run one quiet batch for exact closed runtime ids and report XR/XW once."
    ledger_rule: "Append hired/report/closed/integrated events to the project-local ledger when recovery matters."
  lifecycle_checks:
    before:
      - "Classify the request and confirm employee use is explicit."
      - "Define role, read scope, write scope, command scope, report schema, and close condition before launch."
      - "Verify worker write scopes are exclusive and normalized when edits are possible."
    during:
      - "Poll only when controller progress needs results or a worker may affect owned scope."
      - "Record reports once with report_dedupe before integration."
      - "Stop expansion when scoring convergence or hard cap is reached."
    after:
      - "Close completed runtimes after final reports are recorded."
      - "Reconcile git status and owned scopes before claiming integration."
      - "Leave ledger/runtime state ignored and unstaged."
  ownership:
    required_for: "any worker, two active employees, or controller edits near employee scopes"
    normalize: "repo-relative, normalized separators, containment-aware, case-insensitive where needed"
    hard_fail:
      - "overlapping or contained active worker write scopes"
      - "worker changes outside owned scope"
      - "controller edits active worker scope before poll/release/reconcile"
  roster:
    project_local_ledger: ".agents/runtime/agent-ledger.jsonl"
    ledger_purpose: "Ignored repo-local JSONL employee lifecycle ledger; advisory, not Codex's official runtime DB, not deployable, and not XR/XW."
    ledger_events: ["initialized", "hired", "started", "completed", "blocked", "stopped", "closed", "shutdown", "integrated", "reconciled"]
    ledger_writer: "Controller appends JSONL events; employees may append only when assignment grants the exact ledger path."
    ledger_git_rule: "Never stage, commit, deploy, or copy .agents/runtime/**."
    ledger_missing_or_cleared: "Recover from runtime notifications, git status, final reports, and temp cache; missing ledger does not invalidate current evidence."
    temp_cache: "%TEMP%/codex-agent-status/<project-id>/"
    temp_cache_purpose: "External fallback for app restarts, multiple controller windows, or when project-local ledger is unavailable or insufficient."
    required_when:
      - "two or more employees are active"
      - "employee may outlive controller context or session"
      - "manual-detached/cloud-or-automation mode, worker writes, ownership changes, or later resume likely"
    employee_access: "Only exact path/action granted by assignment; otherwise do not inspect temp roster."
    controller_access: "Allowed for coordination when required; report XR/XW once with the exact temp path."
    missing_or_cleared: "Recover from runtime notifications, git status, and employee final reports; do not treat missing temp cache as source of truth."
    git_rule: "Never stage/commit volatile roster, events, leases, or filled validation records."
    micro_batch_exception: "For short session-managed read-only scoring batches, roster is optional if recovery/status claims are not needed; use it when the user needs live tracking."
  runtime:
    completion: "Final report is completion notification."
    close: "Close by exact runtime id before any history cleanup."
    official_controls_first: "Prefer close_agent/runtime close, then official app-server status/archive/unsubscribe checks when available; do not start with DB edits."
    official_status_checks: ["thread/list with cwd and subAgent sourceKinds", "thread/loaded/list", "runtime close tool result"]
    official_delete_limit: "No official hard-delete thread API is assumed; archive hides stored threads from normal lists, unsubscribe unloads only after the no-subscriber grace period."
    refresh_limit: "No official sidebar refresh API is assumed; if official lists and persisted state are clean but the sidebar still shows a closed employee, reload/restart Codex UI before further cleanup."
    quiet_cleanup: "Close all target ids, verify exact current-project subagent matches, delete matching state/history rows/files, verify zero remaining hits, append one ledger summary, then report one compact result."
    history_cleanup: "Codex App sidebar/history cleanup is external cleanup after runtime close; explicit cleanup wording authorizes exact closed runtime ids, while standalone cleanup needs exact authorization, source/schema check, and XR/XW closeout."
    history_cleanup_scope: "Delete active DB rows plus matching subagent rollout history files only for closed subagent runtime ids under the current repo cwd; verify official app-server lists when available."
    orphan_cleanup_scope: "Delete orphan thread_spawn_edges only when both endpoints are missing and cleanup was requested; report the count."
    post_cleanup_ui_rule: "When restart clears a cleaned employee from the sidebar, record the Desktop UI refresh result and stop; do not keep deleting more state."
    offline_cache_cleanup: "Only if the exact residue survives reload/restart and the user gives explicit shutdown/cache-cleanup authorization: close all Codex processes, clean exact current-project runtime id residues from Codex Desktop cache/log/state, then restart before claiming UI disappearance."
    history_cleanup_never: ["do not delete parent/controller/user threads", "do not clean unrelated project cwd", "do not delete non-subagent rollout files", "do not use ledger-only ids without runtime/DB or rollout metadata match", "do not claim UI refresh while Codex Desktop may still hold live memory"]
  report_dedupe:
    report_hash: "Hash normalized agent, runtime id, task, status, score/findings, and files changed when recording batch reports."
    dedupe_key: "agent + runtime id + event + roster snapshot version + report hash"
    duplicate_rule: "After recording a matching final report once, do not re-read or reprocess identical reports."
    loop_guard: "Stop polling after 3 unchanged polls or 5 minutes for session-managed explorers; retry close at most 2 times before reporting risk."

scoring_batches:
  use_when: "user explicitly requests employee scoring, review scoring, or many-agent evaluation"
  default_size: "3 scorers"
  expand_to: "5 scorers when score spread exceeds 10 points or top issue categories conflict"
  hard_cap: "7 scorers for high-risk disagreement; 10 only with explicit user approval; larger brute-force batches require explicit user request"
  convergence: "Stop when at least 3 reports exist, score spread is <=10, and a majority shares the top issue category."
  expansion_rule: "Before launching more than 5 scorers, state the unresolved disagreement or coverage gap; otherwise aggregate and stop."
  stop_rule: "Do not keep spawning scorers for confidence alone; after the cap, report disagreement instead of extending the batch."
  invalid_reports: ["missing score", "non-numeric score", "missing isolation line", "forbidden read/write", "unsupported hard-isolation/runtime claim"]
  validity_outcomes: "Use schemas.report_validation.validity_values; accepted, needs-revision, rejected, and excluded are report validation outcomes, not invalid state names."
  aggregation:
    primary_score: "median first"
    also_report: ["mean", "min", "max", "range", "excluded count", "confidence"]
    outlier_rule: "Flag scores outside median +/- 20 or reports with invalid fields; exclude only with a stated reason."
    confidence: "high when n >= 5 and range <=10; medium when n >=3 and range <=20; low otherwise."
    cap_rule: "Cap confidence at low when range exceeds 25 or mean/median differ by more than 10; cap aggregate score at 80 if invalid reports are present and not replaced."
  synthesis:
    dedupe_by: "scope + root cause + proposed fix"
    top_limits: "top 5 issues, top 5 fixes, up to 3 material dissent notes"
    duplicate_rule: "Count repeated findings as confidence, not separate issues."
    final_cap: "For large batches, summarize in 600-900 words unless the user asks for full detail."

handoff:
  project_id: "lowercase repo root, normalize separators, replace non a-z/0-9 with hyphen, collapse/trim hyphens"
  files:
    project_local: [".agents/runtime/agent-ledger.jsonl"]
    temp_cache: ["%TEMP%/codex-agent-status/<project-id>/agent-status.md", "%TEMP%/codex-agent-status/<project-id>/controller-lease.md", "%TEMP%/codex-agent-status/<project-id>/events/"]
    legacy_repo_local: ["docs/agent-status.md", "docs/agent-events/"]
  rules:
    - "Inspect project-local ledger first when employee history may matter; inspect temp cache only when external fallback is required and report XR."
    - "Treat docs/agent-status.md and docs/agent-events/ as ignored legacy/local-only paths, not canonical handoff state."
    - "Treat ledger and temp roster as advisory; verify git/runtime/app-server state and require unambiguous controller lease/runtime id before status writes or close actions."

deployment:
  rule: "Use docs/agents/deploy.yaml for authorized targets; source repo must not store target status/history/commits/remotes/results."
  delegated_worker: "For requests such as deploy this project to an exact target, the controller may assign a deployment_worker with one target path, one mode, dry-run/write scope, and no app-code or OS-permission repair authority."
  upgrade: "Treat upgrades as allowlisted redeployments: dry-run first, preserve target-owned state, and update only deployed_file_set."

skill_authoring:
  create_when: "Repeatable workflow is better as procedural instructions than AGENTS, memory, decision, or runbook."
  layout: [".agents/skills/<skill-name>/SKILL.md", ".agents/skills/<skill-name>/agents/openai.yaml"]
  rules:
    - "requires matching folder/frontmatter name, $skill default_prompt, 25-64 char short_description, and allow_implicit_invocation"

maintenance:
  local_permission_boundary:
    - "Do not run OS permission, ownership, ACL, or .git metadata repair commands as an automated project flow."
    - "If Git cannot create index.lock, update the index, or write .git metadata, report it as a local workspace blocker instead of attempting repair."
    - "Resume Git actions only after the user confirms the repo is writable or provides a clean writable clone."
  verification_profiles:
    fast_turn: "answer-only/scoped ordinary work; no command for answer-only without current-state claim"
    policy_pack_edit: "check changed files and changed mirror pairs only unless broader claim"
    commit_tag_checkpoint: "ordinary commit/tag/version/branch-push checkpoints; fast gates only"
    release_deploy_push_audit: "release/deploy/protected-main-push/broad audit/no-deduction only"
    runtime_multi_agent: "only with real employee runtime evidence"
    hard_isolation: "only with verified enforcement evidence"
  local_only:
    - ".agents/runtime/"
    - ".codex/config.toml"
    - ".codex/environments/environment.toml"
    - "docs/agent-status.md"
    - "docs/agent-events/"
    - "docs/tmp-approval-*/"
    - "docs/hard-isolation-evidence/"
    - "docs/runtime-multi-agent-validation/"

closeout:
  compact_when: "answer-only with no files/current-state/external/git/deploy/runtime/hard-isolation/durable-knowledge claim"
  compact_output: "required isolation line plus directly relevant facts"
  expanded_when: "files changed, verification/risk/external access/git/deploy/runtime/hard-isolation/durable knowledge is involved"
