schema: agents-core-system/v1
purpose: "Foundation Creation Layer boundary for repo-local AI workflow governance."
identity:
  name: "Repo-local AI Workflow Foundation"
  version_source: "docs/agents/version.yaml"
  release_name: "Foundation Creation Layer"
  system_type: "repo-local AI workflow foundation"
  non_goals:
    - "SaaS platform"
    - "dashboard"
    - "session database"
    - "provider gateway"
    - "cloud enforcement"
canonical:
  route_first: "docs/agents/ai-runtime.yaml"
  version: "docs/agents/version.yaml"
  foundation_creation: "docs/agents/openai-foundations.yaml"
  governance:
    - "docs/agents/core-system.yaml"
    - "docs/agents/openai-foundations.yaml"
    - "docs/agents/runtime-execution.yaml"
    - "docs/agents/route-packs.yaml"
    - "docs/agents/knowledge-footprint.yaml"
  organization:
    - "docs/agents/org.yaml"
    - "docs/agents/dispatch.yaml"
    - "docs/agents/collaborators.yaml"
  runtime:
    - "docs/agents/workflow-artifacts.yaml"
    - "docs/agents/context-compact.yaml"
    - "docs/agents/provider-adapters.yaml"
  operations:
    - "docs/agents/workflows.yaml"
    - "docs/agents/deploy.yaml"
    - "docs/agents/verify.yaml"
    - "docs/agents/schemas.yaml"
runtime_local:
  never_track_or_ship:
    - ".agents/runtime/**"
    - ".agents/runtime/executions/**"
    - ".agents/runtime/workflows/**"
    - ".agents/runtime/knowledge/**"
    - ".workflow/**"
    - ".codex/**"
  forbidden_payloads:
    - "live thread id"
    - "runtime evidence"
    - "API key"
    - "provider session"
    - "local Codex config"
deploy_contract:
  source: "docs/agents/deploy.yaml"
  required_evidence:
    - "preflight"
    - "copy"
    - "verify"
    - "cleanup"
  exclude: "runtime_local.never_track_or_ship"
release_contract:
  source: "scripts/export-release-package.ps1"
  manifest_fields:
    - "version"
    - "commit"
    - "package_hash"
    - "file_count"
    - "files"
    - "blocklist_result"
route_contract:
  source: "docs/agents/route-packs.yaml"
  rule: "Read ai-runtime first; expand only the named route pack."
validation:
  profile: "core_system"
  pass_when:
    - "canonical files exist"
    - "version is aligned"
    - "runtime-local blocklist is active"
    - "deploy and release contracts exclude runtime state"
    - "foundation creation contract is present"
    - "old external connector residue is absent"
