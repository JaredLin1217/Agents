schema: agents-verify/v2
purpose: "Compact verification profiles and release gates."
owns: "Profile selection, file-class gates, checkpoints, release gates, and evidence requirements."

principle: "Run the smallest check set that proves the current claim."
scope_rule: "Use existing repo paths unless the user authorizes an exact external path/action."
stale_literal_rule: "Do not keep resolved one-off literal searches as routine gates."
batch_rule: "For checkpoint gates, batch related checks into one shell invocation when practical."

profile_selection:
  order: ["answer-only/no current-state claim -> fast_turn with no command", "assigned read-only explorer audit -> read_only_audit", "repo/deploy/git/runtime state claim -> inspect only required state source", "ordinary scoped edit -> fast_turn", "Agents rule/template/runbook/skill/memory-doc edit -> policy_pack_edit", "commit/tag/ordinary branch push checkpoint -> commit_tag_checkpoint", "deploy/release/protected push/broad audit/no-deduction -> release_deploy_push_audit", "runtime multi-agent behavior claim -> runtime_multi_agent plus current runtime evidence", "hard isolation claim -> hard_isolation plus current enforcement evidence"]
  mixed_claim_rule: "Use the highest-risk matching profile for the claim; do not upgrade unrelated facts."
  if_unclear: "State the narrower claim instead of running a broad audit by default."
  task_class_note: "Task classes come from policy/workflows; profile names may be shared."

file_classes:
  root_rules: ["AGENTS.md"]
  project_skill: [".agents/skills/**/SKILL.md", ".agents/skills/**/agents/openai.yaml"]
  canonical_yaml: ["docs/agents/*.yaml"]
  runbooks: ["docs/runbooks/*.md"]
  deploy_templates: ["docs/templates/agents/**"]
  memory_docs: ["docs/project-memory.md", "docs/memory/**", "docs/memory-entry.template.md"]
  runtime_local: [".agents/runtime/**", ".codex/config.toml", ".codex/environments/environment.toml", "docs/agent-status.md", "docs/agent-events/**", "docs/tmp-approval-*/**", "docs/runtime-multi-agent-validation/**", "docs/hard-isolation-evidence/**", ".agents/docs/agent-status.md", ".agents/docs/agent-events/**", ".agents/docs/tmp-approval-*/**", ".agents/docs/runtime-multi-agent-validation/**", ".agents/docs/hard-isolation-evidence/**"]
  generated_or_cache: ["generated output", "cache", "build output", "vendor"]

gate_matrix:
  durable_prose_changed: ["changed English-only", "changed placeholder check"]
  exact_pair_member_changed: ["changed exact-pair check only"]
  deploy_template_changed: ["task-specific source-pollution check"]
  deploy_manifest_changed: ["deploy manifest/source/blocklist checks when making deploy-clean claim"]
  schema_changed: ["schema field coverage only for release/deploy/broad audit or schema-coverage claim"]
  skill_metadata_changed: ["skill metadata check only for project skill metadata changes"]
  runtime_local_changed: ["must stay ignored/local unless explicitly targeted"]
  code_or_behavior_changed: ["closest focused test/lint/build when available"]
  claim_upgrade: ["runtime evidence only for runtime claim", "hard-isolation evidence only for hard-isolation claim", "release audit only for release/deploy/protected-push/no-deduction/full-audit claim"]

commands:
  status_full: "git status -sb --ignored --untracked-files=all"
  status_plain: "git status -sb"
  status_scoped: "git status -sb -- <paths>"
  diff_check: "git diff --check"
  changed_manifest: "git diff --name-only plus git diff --cached --name-only, de-duplicated"
  checkpoint_bundle: "status, diff_check, changed_manifest, changed-file prose/line-ending/pair gates, optional size gates, and no staged runtime/local files"
  full_audit_bundle: ".\\scripts\\validate.ps1 -Full"
  changed_english: 'rg -n "[\p{Han}]" <changed durable rule/template files>'
  changed_placeholders: 'rg -n "TO[D]O|\[TO[D]O\]|T[B]D|FI[X]ME" <changed durable rule/template files>'
  line_endings: "git ls-files --eol <changed files>"
  ignored_runtime: "git check-ignore -v --no-index .agents/runtime/agent-ledger.jsonl docs/agent-status.md docs/agent-events/ docs/tmp-approval-example/report.md docs/hard-isolation-evidence/example.md docs/runtime-multi-agent-validation/example.md .agents/docs/agent-status.md .agents/docs/agent-events/ .agents/docs/tmp-approval-example/report.md .agents/docs/hard-isolation-evidence/example.md .agents/docs/runtime-multi-agent-validation/example.md .codex/config.toml .codex/environments/environment.toml"
  deploy_steps_top_level: 'rg -n "^steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_steps_not_nested: 'rg -n "^  steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_sources_exist: "Every deployable_by_mode from path exists; deployment_modes, mode_composition, deployable groups, and deployment script mode ValidateSet stay synchronized."
  deploy_manifest_unique: "deployable_by_mode from paths unique per group; non-append to paths unique."
  deploy_blocklist_required_paths: "do_not_deploy includes local runtime, scratch, Codex runtime, and .git paths."
  deployment_script_safety: "scripts/deploy-agents-workflow.ps1 keeps path-containment gates, deploy.yaml blocklist sync, and no admin elevation, OS permission, ACL, ownership, .git repair, destructive Git fallback, or local repair flow."
  deployment_script_selftest: ".\\scripts\\deploy-agents-workflow.ps1 -SelfTest writes disposable root_docs, template-provider, dot_agents_docs, dry-run, protected-existing, git-backed foreign project, missing-target, target-owned-state, routed-legacy, and ambiguous-layout targets under %TEMP%/codex-agent-status/<derived-project-id>/deploy-selftest-* and verifies quiet success, source-neutral temp namespace derivation, blocked deployed path rejection, app-file preservation, target-owned state preservation, target git rollback scope, dry-run write-state classification, deployed report file set and validation summary, explicit target creation gate, and provider self-write refusal."
  multi_agent_workflow_integrity: "scripts/validate.ps1 checks lifecycle, ownership, roster/ledger recovery, report dedupe, scoring, delegated deployment, ledger compatibility aliases, and runtime validation fields."
  evidence_template_schema_coverage: "scripts/validate.ps1 checks that hard-isolation and runtime multi-agent evidence templates retain required schema fields."
  ci_workflow_stability: "scripts/validate.ps1 checks that checkpoint workflow pins a Windows runner, uses the default fast gate, and does not duplicate full-audit or whitespace checks."
  template_pollution_rule: "Search deployable templates for concrete source/target literals relevant to the task."
  deployed_file_set_status: "git status -sb -- <deployed_file_set>"
  deployed_file_set_diff_check: "git diff --check -- <deployed_file_set>"
  powershell_rg_glob_rule: "In PowerShell, place rg options before --, then pattern and paths."
  deployed_file_set_literal_scan: "Search only deployed_file_set for source literals; separate target-owned legacy docs."

profiles:
  read_only_audit:
    use: "assigned read-only explorer audit, scoring, or review with no edits"
    do: ["read assigned paths only", "run only assignment-allowed commands", "report inspected files, findings, and isolation"]
    skip: ["repo status", "verification commands", "unassigned files"]
  fast_turn:
    use: "answer-only, scoped edits, ordinary closeout"
    do: ["answer-only/no current-state claim: no command", "edits: status, target read, scoped diff, focused verification if behavior changed", "current-state claim: inspect only the named state"]
  policy_pack_edit:
    use: "AGENTS.md, .agents, docs/agents, docs/runbooks, docs/templates/agents, memory templates, deploy rules changed"
    do: ["status before edit", "target files read", "scoped diff review", "changed exact-pair checks", "changed prose English/placeholder checks", "size gates when budget changed materially"]
    skip: ["full repo scans", "full template coverage", "deploy manifest checks", "schema field coverage"]
  commit_tag_checkpoint:
    use: "ordinary commit/tag/version/branch-push checkpoint without deploy, release, no-deduction, broad audit, runtime, or hard-isolation claim"
    target_time: "one batched short validation pass"
    do: ["status_full", "diff_check", "changed_manifest once", "changed exact-pair checks", "changed durable prose gates", "changed-file line endings", "size gates when budget changed", "confirm ignored runtime/local files are not staged"]
    skip: ["full repo English/placeholder scans", "full template coverage", "deploy manifest checks", "schema field coverage", "template pollution unless relevant deployable templates changed"]
  release_deploy_push_audit:
    use: "release, deploy, protected/main push, broad audit, no-deduction claim, or explicit full verification"
    do:
      baseline: ["status_full", "diff_check", "English/placeholder gates", "line-ending readiness", "ignored_runtime"]
      deployment_integrity: ["deploy source/uniqueness/blocklist gates", "task-specific template pollution"]
      deployment_script: ["path containment", "provider self-write refusal", "explicit target creation switch", "no local permission repair or admin elevation", "disposable deployment self-test"]
      template_integrity: ["exact-pair drift checks", "template bundle coverage"]
      schema_skill_integrity: ["schema field coverage", "multi-agent workflow integrity", "evidence template schema coverage", "skill metadata checks"]
      size: ["size gates including prospective tracked size"]
      claim_specific: ["release_appendix provider checks when provider/deployable-template claim is made", "runtime_multi_agent only when claimed", "hard_isolation only when claimed"]
  runtime_multi_agent:
    use: "claiming runtime multi-agent behavior"
    do: "current real employee evidence satisfies live_employee_validation; static docs alone can only claim behavioral readiness"
  hard_isolation:
    use: "claiming tool/external isolation"
    do: "current hard-isolation evidence proves enforcement; otherwise say behavioral-only"

size_gates:
  unit: "bytes; 1 KiB = 1024 bytes"
  targets:
    AGENTS.md: 10240
    project_skill: 10240
    canonical_agents_yaml: 20480
    script_ps1: 65536
    tracked_repo_kib: 384
  tracked_rule: "Ignored/untracked files do not count; intended new files count before commit."

claim_scopes:
  static_policy_pack: "Relevant profile gates passed; no runtime or hard-isolation proof."
  runtime_multi_agent: "Only after live employee evidence passes."
  hard_isolation: "Only after current tool/external enforcement evidence passes; otherwise behavioral-only."
  deploy_clean: "Only after affected deploy.yaml source-neutral/template/blocklist checks."
  no_repo_pollution: "Only after status and ignored/local-runtime checks cover affected files."

minimum_evidence:
  static_policy_pack: ["changed files read", "scoped diff reviewed", "applicable profile gates passed"]
  branch_push: ["checkpoint gates", "current branch/remote", "push result"]
  deploy_clean: ["target authorization", "target inspected", "target layout selected", "deployed_file_set recorded", "blocklist/source-neutral checks on deployed_file_set"]
  runtime_multi_agent: ["real runtime id", "assignment/report match", "git status after employee work"]
  hard_isolation: ["current tool/runtime/OS/account/cloud enforcement evidence"]

no_deduction_audit:
  rule: "Claim no-deduction only with release_deploy_push_audit-level proof plus applicable runtime/hard-isolation evidence."
  always: ["current repo state inspected", "changed files/diffs reviewed", "external access reported", "GM/GS reported", "templates source-neutral", "deployment checks use deployed_file_set", "runtime/local scratch artifacts not staged", "claim scope stated"]
  when_applicable: ["workers have non-overlapping ownership", "ledger/roster/event evidence exists for compact-risk or concurrent employees", "history cleanup has explicit cleanup wording or exact authorization", "hard-isolation verification avoids forbidden reads unless exact-authorized"]

coverage_gates:
  slim_policy_pack: ["AGENTS.md and project SKILL support no-command answer-only fast path", "policy/workflows/verify define compact profiles and claim boundaries", "deploy rules keep source state out of targets", "schemas/templates preserve assignment, report, ledger, status, lease, runtime validation, memory, and skill fields", "workflow/schema gates preserve lifecycle, ownership, roster/ledger recovery, report dedupe, scoring, delegated deployment, and runtime validation together", "task closeout permits compact no-change answers"]

live_employee_validation:
  required: ["explicit user hire/spawn/delegation/parallel-agent request", "runtime id/nickname/mode/role/task", "ledger or roster path/version/permissions when required", "assignment includes ledger/roster, status-event, final-report, and ownership fields", "final report matches runtime id and required fields", "ledger or poll/report/close/reconciled evidence has matching snapshot version", "git status proves no out-of-scope changes", "history cleanup authorization recorded as none/not requested unless explicitly authorized"]

drift_checks:
  exact_pairs: ["docs and docs/templates mirror: assignment/status/event/lease/evidence/memory templates, AGENTS.md, project skill files, agents yaml, runbooks"]
  template_specific_cleanliness_files: ["docs/templates/agents/README.md", "docs/templates/agents/gitignore.fragment", "docs/templates/agents/project-memory.md", "docs/templates/agents/project-structure.md", "docs/templates/agents/memory-index.md"]

release_appendix:
  provider_repo_checks: ["tracked/intended docs/templates/agents files are paired or template-specific", "template memory starter has no data rows or provider project names", "schema field coverage matches templates", "project skill metadata is valid"]
  source_neutral_scan_literals: ["provider repo name or path", "concrete usernames", "remotes, branches, commits, tags, or push status", "filled status rows or validation results", "non-placeholder memory rows"]
