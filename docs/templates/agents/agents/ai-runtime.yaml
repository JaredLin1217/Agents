schema: agents-ai-runtime/v1
load: {default: ["AGENTS.md","docs/agents/ai-runtime.yaml"], expand_only: true}
route:
  answer_only: {f: [], v: none}
  current_state: {f: [], v: named_state}
  scoped_edit: {f: ["target","docs/agents/verify.yaml"], v: fast_turn}
  policy_pack_edit: {f: ["target_pair","docs/agents/verify.yaml"], v: policy_pack_edit}
  git_checkpoint: {f: ["docs/agents/verify.yaml"], v: commit_tag_checkpoint}
  deploy_or_release: {f: ["docs/agents/deploy.yaml","docs/agents/verify.yaml"], v: release_deploy_push_audit}
  multi_agent: {f: ["docs/agents/workflows.yaml","docs/agents/schemas.yaml","docs/agents/verify.yaml"], v: runtime_multi_agent}
  enterprise_dispatch: {f: ["docs/agents/org.yaml","docs/agents/model-policy.yaml","docs/agents/dispatch.yaml","docs/agents/verify.yaml"], v: enterprise_dispatch}
  workflow_artifact: {f: ["docs/agents/workflow-artifacts.yaml","docs/agents/schemas.yaml","docs/agents/verify.yaml"], v: workflow_artifact}
  context_compact: {f: ["docs/agents/context-compact.yaml","docs/agents/schemas.yaml","docs/agents/verify.yaml"], v: context_compact}
  collaborator_window: {f: ["docs/agents/collaborators.yaml","docs/agents/verify.yaml"], v: collaborator_window}
  core_system: {f: ["docs/agents/core-system.yaml","docs/agents/verify.yaml"], v: core_system}
  runtime_execution: {f: ["docs/agents/runtime-execution.yaml","docs/agents/verify.yaml"], v: runtime_execution}
  provider_adapter: {f: ["docs/agents/provider-adapters.yaml","docs/agents/model-policy.yaml","docs/agents/verify.yaml"], v: provider_adapters}
  route_pack: {f: ["docs/agents/route-packs.yaml","docs/agents/ai-runtime.yaml"], v: route_pack}
  knowledge_footprint: {f: ["docs/agents/knowledge-footprint.yaml","docs/agents/context-compact.yaml","docs/agents/verify.yaml"], v: knowledge_footprint}
  hard_isolation: {f: ["docs/agents/policy.yaml","docs/agents/verify.yaml"], v: hard_isolation}
rules: ["classify->route->read f", "canonical YAML wins", "Do not load docs/templates/agents/**", "Never stage, deploy, or copy runtime_local"]
