schema: agents-ai-runtime/v1
purpose: route
load: {default: ["AGENTS.md","docs/agents/ai-runtime.yaml"], expand_only: true}
codes: {gm: global memory, gs: global/system skill, xr: external read, xw: external write}
route:
  answer_only: {f: [], v: none}
  current_state: {f: [], v: named_state}
  scoped_edit: {f: ["target","docs/agents/verify.yaml"], v: fast_turn}
  policy_pack_edit: {f: ["target_pair","docs/agents/verify.yaml"], v: policy_pack_edit}
  git_checkpoint: {f: ["docs/agents/verify.yaml"], v: commit_tag_checkpoint}
  deploy_or_release: {f: ["docs/agents/deploy.yaml","docs/agents/verify.yaml"], v: release_deploy_push_audit}
  multi_agent: {f: ["docs/agents/workflows.yaml","docs/agents/schemas.yaml","docs/agents/verify.yaml"], v: runtime_multi_agent}
  enterprise_dispatch: {f: ["docs/agents/org.yaml","docs/agents/model-policy.yaml","docs/agents/dispatch.yaml","docs/agents/verify.yaml"], v: enterprise_dispatch}
  hard_isolation: {f: ["docs/agents/policy.yaml","docs/agents/verify.yaml"], v: hard_isolation}
rules:
  - "classify->route->read f"
  - "canonical YAML wins"
  - "Do not load docs/templates/agents/**"
  - "Never stage, deploy, or copy runtime_local"
closeout: "Isolation: GM <used/not used> | GS <used/not used> | XR <none/paths> | XW <none/paths>"
