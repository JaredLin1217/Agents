creation_patterns:
  assistant_feature:
    route: "foundation_creation"
    minimum_contract: ["objective","input schema","state owner","tool boundary","verification","fallback"]
  coding_agent_feature:
    route: "foundation_creation"
    minimum_contract: ["files owned","structured report","cleanup rule","latency control","trace or evidence ref"]
  product_workflow:
    route: "foundation_creation"
    minimum_contract: ["user journey","agent role","handoff boundary","guardrail","eval sample","release gate"]
verification:
  profile: "foundation_creation"
  required_markers: ["structured_outputs","conversation_state","agents_sdk","codex_skills","subagents","prompt_caching","predicted_outputs","evaluations"]
  failure_modes: ["schema-free machine output","implicit state owner","unbounded tool authority","parallel write conflict","cost or latency control absent","retiring eval flow dependency"]
