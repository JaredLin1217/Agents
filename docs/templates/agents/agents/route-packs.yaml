schema: agents-route-packs/v1
purpose: "Deterministic minimal-read packs for LLM routing."
source: "docs/agents/ai-runtime.yaml"
pack:
  required_fields:
    - "route_id"
    - "required_files"
    - "schema_hash"
    - "tool_surface"
    - "cache_key_fields"
    - "manifest_hash"
cache_key_fields:
  - "version"
  - "route_id"
  - "required_file_hashes"
tool_surface:
  no_read_default:
    - "no_file_read"
  read_only_default:
    - "filesystem_read"
  runtime_routes:
    - "runtime_evidence_write"
    - "thread_operation_if_available"
routes:
  answer_only:
    required_files: []
  core_system:
    required_files:
      - "docs/agents/core-system.yaml"
      - "docs/agents/verify.yaml"
  runtime_execution:
    required_files:
      - "docs/agents/runtime-execution.yaml"
      - "docs/agents/verify.yaml"
  provider_adapter:
    required_files:
      - "docs/agents/provider-adapters.yaml"
      - "docs/agents/model-policy.yaml"
  route_pack:
    required_files:
      - "docs/agents/route-packs.yaml"
      - "docs/agents/ai-runtime.yaml"
  knowledge_footprint:
    required_files:
      - "docs/agents/knowledge-footprint.yaml"
      - "docs/agents/context-compact.yaml"
rules:
  - "Route packs do not call models."
  - "Route pack export must be deterministic for the same file hashes."
  - "Route packs never include runtime state, thread ids, API keys, or provider sessions."
validation:
  profile: "route_pack"
