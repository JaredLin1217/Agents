schema: agents-policy/v2
purpose: "Compact repo-local operating policy for the isolated Agents workflow."

authority:
  repo_reality: "When current repo state matters, trust files, scripts, git state, diffs, logs, tests, and observed behavior over prior chat or memory."
  memory: "Hint only; verify before acting."
  limitation: "Repo rules are behavioral, not runtime sandboxing. Claim technical isolation only with current verified evidence."
  higher_priority: "Codex system instructions, tools, plugins, and system skills may still exist; report required use."

project_state:
  rule: "Do not assume mode, framework, scripts, runtime, or architecture until repo files define them."
  verification: "Use the smallest applicable profile in docs/agents/verify.yaml."

isolation:
  durable_storage: "Store project rules, memory, decisions, runbooks, and skills in this repo."
  global_memory: "Not used unless the user explicitly asks."
  global_skills: "Not intentionally used for normal work; .agents/skills/** is project-local."
  external_filesystem:
    default: "No read/write/list/create/delete/move/stage/commit/config outside repo root."
    allowed:
      - "User-authorized exact path/action."
      - "Approved temp handoff cache: %TEMP%/codex-agent-status/<project-id>/."
    report: "Report external reads as XR and writes as XW."
  codex_app:
    local_policy: ".codex/config.toml is repo-local."
    live_environment: ".codex/environments/environment.toml is ignored runtime state."
    template_environment: ".codex/environments/environment.template.toml is reference-only."

runtime_enforcement:
  default: "behavioral-only"
  stronger_claims_require: "Current runtime, tool, OS, account, cloud, or external enforcement evidence."

editing:
  before:
    - "Run git status before edits when feasible."
    - "Read target files before patching."
    - "Protect user/parallel-agent changes."
    - "Ask before dependencies, public API/data format, release/build/deploy changes, or destructive actions."
  during:
    - "Keep changes small, scoped, and reversible."
    - "Follow existing names, layout, docs, and tests."
    - "Do not hand-edit generated output, caches, build output, vendored files, runtime copies, or .git unless targeted."

knowledge_layers:
  AGENTS.md: "Small every-session router."
  docs/agents: "Canonical policy pack."
  docs/project-memory.md: "Project-local memory overview."
  docs/memory/index.md: "Searchable memory index."
  docs/memory/entries: "Verified reusable lessons."
  docs/decisions: "Durable decisions."
  docs/runbooks: "Short procedure routers."
  docs/templates/agents: "Source-neutral deployment bundle."
  .agents/skills: "Project-local skills."

placement:
  deploy_templates: "docs/templates/agents/"
  volatile_agent_status: "%TEMP%/codex-agent-status/<project-id>/"
  ignored_local_scratch: "docs/tmp-approval-*/, docs/hard-isolation-evidence/, docs/runtime-multi-agent-validation/"

template_cleanliness:
  deployable_templates_must_not_contain:
    - "source project name/path/commit/tag/remote/branch/push status"
    - "source employee history/status/validation/deployment results"
    - "source memory rows or entries"
    - "target-specific records"

closeout:
  required_line: "Isolation: GM <used/not used> | GS <used/not used> | XR <none/paths> | XW <none/paths>"
  compact: "For answer-only/no-change work with no current-state, external-access, runtime, release, deploy, no-deduction, or hard-isolation claim, the required line plus directly relevant facts is enough."
  expand_for:
    - "file changes"
    - "verification supporting a claim"
    - "remaining risk"
    - "external access"
    - "new durable knowledge"
    - "explicit claim scope"

hard_fail_gates:
  - "No global Memory without explicit user approval."
  - "No intentional global/system skill use for normal work."
  - "No external filesystem access without exact authorization or temp-cache exception."
  - "No source-specific state in deployable templates."
  - "No overlapping active worker write scopes."
  - "No compact-risk/concurrent/editing employee without temp roster."
  - "No hard-isolation claim without verified evidence."
  - "Keep AGENTS.md and project SKILL.md compact."
