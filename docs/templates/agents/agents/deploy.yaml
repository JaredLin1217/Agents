schema: agents-deploy/v2
purpose: "Allowlist/blocklist for deploying this Agents workflow into an authorized target repo."
owns: "Deployment modes, allowlists, blocklists, validation levels, and target/source ownership."

boundary:
  requires: "explicit user authorization for exact target path and write action"
  method: "inspect target, then copy/adapt allowlisted files"
  target_owns: ["Codex App policy", "local environment", "agent ledger", "agent status", "memory entries", "commits", "remotes", "deployment history"]
  source_must_not_store: "target status, employee ledger/history, commits, remotes, or deployment results"

target_layout:
  detect_first: ["AGENTS.md routes", "existing docs/agents", "existing .agents/docs/agents", "existing .agents/skills"]
  root_docs: "Use root docs/agents and docs/runbooks when the target already routes there or has no existing Agents layout."
  dot_agents_docs: "Use .agents/docs and .agents/skills when the target AGENTS.md or existing files route there."
  rule: "Preserve one target layout; do not create a competing root docs layout and .agents/docs layout in the same deployment unless the user explicitly asks for provider migration."
  target_path_rule: "`to` paths in deployable_by_mode are provider canonical paths before target-layout adjustment."
  path_rewrite: "When deploying to .agents/docs, rewrite internal references according to the selected layout_destination_map."
  layout_destination_map:
    root_docs:
      "AGENTS.md": "AGENTS.md"
      ".gitignore append/adapt": ".gitignore append/adapt"
      "docs/agents/": "docs/agents/"
      "docs/runbooks/": "docs/runbooks/"
      "docs/templates/agents/": "docs/templates/agents/"
      "docs/*.template.md": "docs/<same basename>"
      "docs/project-memory.md": "docs/project-memory.md"
      "docs/memory/index.md": "docs/memory/index.md"
      "docs/memory/entries/README.md": "docs/memory/entries/README.md"
      "docs/project-structure.md": "docs/project-structure.md"
      ".agents/skills/": ".agents/skills/"
    dot_agents_docs:
      "AGENTS.md": "AGENTS.md"
      ".gitignore append/adapt": ".gitignore append/adapt"
      "docs/agents/": ".agents/docs/agents/"
      "docs/runbooks/": ".agents/docs/runbooks/"
      "docs/templates/agents/": ".agents/docs/templates/agents/"
      "docs/*.template.md": ".agents/docs/<same basename>"
      "docs/project-memory.md": ".agents/docs/project-memory.md"
      "docs/memory/index.md": ".agents/docs/memory/index.md"
      "docs/memory/entries/README.md": ".agents/docs/memory/entries/README.md"
      "docs/project-structure.md": ".agents/docs/project-structure.md"
      ".agents/skills/": ".agents/skills/"
  ambiguous: "If both layouts exist, follow the layout referenced by AGENTS.md and report the other as target-owned legacy state."

dirty_target:
  classify_before_write:
    deploy_scope: "Files this deployment may update."
    protected_dirty: "Unrelated app/source/config/secrets/runtime files; do not touch."
    target_legacy_agents: "Existing target-owned memory, decisions, imports, status, or historical Agents docs outside the deployed file set."
  rule: "Do not fail or broaden cleanup because target_legacy_agents contains local paths, old memory, or prior tool references; report them separately as follow-up."
  deployed_file_set: "Record exact files written or intentionally verified for this deployment."
  validation_scope: "Validate deployed_file_set, not the whole dirty target, unless the user asks for a full target audit."

deployment_modes:
  core_bootstrap: "Install AGENTS.md, Agents governance rules, project skill, gitignore fragment, deployment and closeout runbooks."
  full_workflow: "Install core_bootstrap plus memory starters, runtime/evidence templates, and multi-agent/maintenance runbooks."
  template_provider_mode: "Install full_workflow plus docs/templates/agents/** so the target can redeploy this workflow later."

upgrade:
  rule: "Upgrade is the same allowlisted deployment operation with dry-run first and target-owned state preserved."
  overwrite_gate: "Existing deployed files with content changes require -Upgrade after dry-run; unchanged files may be skipped."
  dry_run_plan: "Dry-run classifies allowlisted target paths as planned create/update, already current, or requiring -Upgrade without writing files."
  version_source: "docs/agents/version.yaml"
  target_marker: "The deployed version file records workflow compatibility, not target status or provider runtime state."
  no_permission_repair: "Do not run OS permission, ownership, ACL, or .git metadata repair as part of deployment or upgrade."
  same_repo_guard: "The deployment script must not write into the provider/source repo; provider self-maintenance uses patches plus validation, with deployment dry-run only."
  target_creation: "A missing target directory may be created only by an explicit non-dry run with a target-creation switch after exact path authorization; dry-run requires an existing target."

delegated_deployment:
  trigger: "When the controller receives a request such as deploy this project to an exact target path."
  worker_role: "deployment_worker"
  assignment_scope: "One exact target path, one mode, dry-run/write flag, and the deployment script/runbook only."
  controller_duties: ["verify exact target authorization", "choose mode", "review dry-run plan", "integrate the worker report"]
  worker_duties: ["inspect target layout", "run dry-run first unless explicitly waived", "write only deployed_file_set", "report exact XR/XW paths"]
  forbidden: ["copy provider runtime state", "edit target app code outside deployed_file_set", "repair local OS or Git metadata", "store target deployment history in provider repo"]

mode_composition:
  core_bootstrap: ["core_bootstrap"]
  full_workflow: ["core_bootstrap", "full_workflow_additions"]
  template_provider_mode: ["core_bootstrap", "full_workflow_additions", "template_provider_additions"]

deployable_by_mode:
  core_bootstrap:
    - from: "docs/templates/agents/AGENTS.md"
      to: "AGENTS.md"
    - from: "docs/templates/agents/gitignore.fragment"
      to: ".gitignore append/adapt"
    - from: "docs/templates/agents/agents/policy.yaml"
      to: "docs/agents/policy.yaml"
    - from: "docs/templates/agents/agents/workflows.yaml"
      to: "docs/agents/workflows.yaml"
    - from: "docs/templates/agents/agents/schemas.yaml"
      to: "docs/agents/schemas.yaml"
    - from: "docs/templates/agents/agents/deploy.yaml"
      to: "docs/agents/deploy.yaml"
    - from: "docs/templates/agents/agents/mcp.yaml"
      to: "docs/agents/mcp.yaml"
    - from: "docs/templates/agents/agents/version.yaml"
      to: "docs/agents/version.yaml"
    - from: "docs/templates/agents/agents/verify.yaml"
      to: "docs/agents/verify.yaml"
    - from: "docs/templates/agents/skills/project-isolation-workflow/SKILL.md"
      to: ".agents/skills/project-isolation-workflow/SKILL.md"
    - from: "docs/templates/agents/skills/project-isolation-workflow/agents/openai.yaml"
      to: ".agents/skills/project-isolation-workflow/agents/openai.yaml"
    - from: "docs/templates/agents/agents-deployment.md"
      to: "docs/runbooks/agents-deployment.md"
    - from: "docs/templates/agents/task-closeout.md"
      to: "docs/runbooks/task-closeout.md"
  full_workflow_additions:
    - from: "docs/templates/agents/agent-assignment.template.md"
      to: "docs/agent-assignment.template.md"
    - from: "docs/templates/agents/agent-event.template.md"
      to: "docs/agent-event.template.md"
    - from: "docs/templates/agents/agent-status.template.md"
      to: "docs/agent-status.template.md"
    - from: "docs/templates/agents/controller-lease.template.md"
      to: "docs/controller-lease.template.md"
    - from: "docs/templates/agents/hard-isolation-evidence.template.md"
      to: "docs/hard-isolation-evidence.template.md"
    - from: "docs/templates/agents/runtime-multi-agent-validation.template.md"
      to: "docs/runtime-multi-agent-validation.template.md"
    - from: "docs/templates/agents/project-memory.md"
      to: "docs/project-memory.md"
    - from: "docs/templates/agents/memory-index.md"
      to: "docs/memory/index.md"
    - from: "docs/templates/agents/memory-entry.template.md"
      to: "docs/memory-entry.template.md"
    - from: "docs/templates/agents/memory-entries-README.md"
      to: "docs/memory/entries/README.md"
    - from: "docs/templates/agents/isolation-audit.md"
      to: "docs/runbooks/isolation-audit.md"
    - from: "docs/templates/agents/multi-agent-workflow.md"
      to: "docs/runbooks/multi-agent-workflow.md"
    - from: "docs/templates/agents/repository-maintenance.md"
      to: "docs/runbooks/repository-maintenance.md"
    - from: "docs/templates/agents/session-handoff.md"
      to: "docs/runbooks/session-handoff.md"
    - from: "docs/templates/agents/skill-authoring.md"
      to: "docs/runbooks/skill-authoring.md"
    - from: "docs/templates/agents/project-structure.md"
      to: "docs/project-structure.md"
  template_provider_additions:
    recursive_template_bundle: "Copy/adapt docs/templates/agents/** only when the target should redeploy this workflow later."

do_not_deploy:
  paths:
    - "docs/agent-status.md"
    - "docs/agent-events/"
    - ".agents/docs/agent-status.md"
    - ".agents/docs/agent-events/"
    - ".agents/runtime/"
    - "docs/tmp-approval-*/"
    - ".agents/docs/tmp-approval-*/"
    - "docs/hard-isolation-evidence/"
    - ".agents/docs/hard-isolation-evidence/"
    - "docs/runtime-multi-agent-validation/"
    - ".agents/docs/runtime-multi-agent-validation/"
    - ".codex/config.toml"
    - ".codex/environments/environment.toml"
    - ".git/"
    - "README.md from the template-provider repository"
    - "docs/project-structure.md from the template-provider repository"
    - "docs/project-memory.md from the template-provider repository"
    - "docs/memory/index.md from the template-provider repository"
    - "docs/templates/agents/ from the template-provider repository unless template_provider_mode is selected"
  categories: ["source commits/remotes/tags/branches/push status", "source employee ledger/status/validation/deployment history", "source memory rows/entries", "source temp cache", "filled evidence records", "generated/cache/build/vendor/runtime output"]

case_by_case:
  - "docs/decisions/: copy only adopted decisions."
  - "docs/memory/entries/: create target-specific entries after target verification."
  - "README.md: target-owned."
  - ".gitattributes: use only if target adopts same line-ending policy."
  - ".codex/*: review one file at a time; never copy wholesale."
  - ".codex/environments/environment.template.toml: reference only unless target adopts it."

steps:
  - "Confirm exact target path/write authorization."
  - "Inspect target state first."
  - "Detect target layout and classify dirty files before writing."
  - "Choose core_bootstrap, full_workflow, or template_provider_mode; default to core_bootstrap unless the user asks for more."
  - "For upgrades, use the same selected mode, start with dry-run, preserve target-owned state, and update only deployed_file_set."
  - "Build deployed_file_set from the selected mode, target layout, and layout_destination_map."
  - "Rewrite internal documentation references for the selected target layout."
  - "Copy/adapt only deployable_by_mode groups listed in mode_composition for the chosen deployment mode."
  - "Append/adapt gitignore.fragment; do not replace target .gitignore wholesale."
  - "Remove source-specific state and adapt target assumptions to target evidence."
  - "Validate deployed_file_set for diff hygiene, source-neutral literals, and deployed skill metadata; keep legacy target docs separate."
  - "Report exact target paths read/written."

hard_fail_gates:
  - "No exact target authorization."
  - "Deployable template contains provider project state."
  - "Default deploy claims unverified target mode/scripts/stack."
  - "Target state stored in provider repo."
  - "Blocklisted file copied by default."
  - "Deployment or upgrade attempts OS permission, ACL, ownership, or .git metadata repair."
  - "Deployment script write into the provider/source repo."
  - "Target-specific claim without target inspection."
  - "Competing target layout created without explicit migration request."
  - "Deployment cleanliness claim based on whole dirty target instead of deployed_file_set."

validation_levels:
  repo_local_dry_run: "source/template/blocklist checks only"
  disposable_selftest: "write root_docs, template-provider, dot_agents_docs, dry-run, protected-existing, git-backed foreign project, missing-target, target-owned-state, routed-legacy, and ambiguous-layout targets under per-process approved temp status space and verify blocked deployed path rejection, app-file preservation, dry-run write-state classification, deployed report file set, explicit target creation gate, and provider self-write refusal"
  authorized_target_dry_run: "read target and report plan"
  authorized_target_deployment_test: "write allowlisted/approved files and validate target"
