schema: agents-deploy/v2
purpose: "Deploy allowlist/blocklist for an authorized target repo."
owns: "Modes, file sets, validation, and source/target ownership."
boundary:
  requires: "explicit exact target path and write authorization"
  method: "inspect target, then copy/adapt allowlisted files"
  target_owns: ["Codex policy","env","runtime","workflow artifacts","compact events","memory","git","history"]
  source_must_not_store: "no target status/workflow artifacts/compact events/commits/remotes/deployment results/live ids"
  claim_boundary: "Clean claim needs target dry-run/verify/handoff."
target_layout:
  detect_first: ["AGENTS.md","docs/agents",".agents/docs/agents",".agents/skills"]
  public_profiles:
    auto: "Detect route, preserve layout, else root-layout."
    root-layout: "Use docs/agents and docs/runbooks."
    dot-agents-layout: "Use .agents/docs/agents and .agents/docs/runbooks."
  root_docs: "Use docs/agents + docs/runbooks when routed there or no layout exists."
  dot_agents_docs: "Use .agents/docs + .agents/skills when routed there."
  rule: "Preserve one layout unless explicitly migrating."
  report_name_rule: "Reports use public profile names: auto, root-layout, dot-agents-layout."
  mixed_route_rule: "AGENTS.md must not route to both docs/agents and .agents/docs/agents."
  target_path_rule: "`to` is canonical before layout adjustment."
  path_rewrite: "For .agents/docs, rewrite refs with layout_destination_map."
  layout_destination_map:
    root_docs:
      "AGENTS.md": "AGENTS.md"
      ".gitignore append/adapt": ".gitignore append/adapt"
      "docs/agents/": "docs/agents/"
      "docs/runbooks/": "docs/runbooks/"
      "docs/templates/agents/": "docs/templates/agents/"
      "docs/*.template.md": "docs/<same basename>"
      "docs/project-memory.md": "docs/project-memory.md"
      "docs/memory/index.md": "docs/memory/index.md"
      "docs/memory/entries/README.md": "docs/memory/entries/README.md"
      "docs/project-structure.md": "docs/project-structure.md"
      ".agents/skills/": ".agents/skills/"
    dot_agents_docs:
      "AGENTS.md": "AGENTS.md"
      ".gitignore append/adapt": ".gitignore append/adapt"
      "docs/agents/": ".agents/docs/agents/"
      "docs/runbooks/": ".agents/docs/runbooks/"
      "docs/templates/agents/": ".agents/docs/templates/agents/"
      "docs/*.template.md": ".agents/docs/<same basename>"
      "docs/project-memory.md": ".agents/docs/project-memory.md"
      "docs/memory/index.md": ".agents/docs/memory/index.md"
      "docs/memory/entries/README.md": ".agents/docs/memory/entries/README.md"
      "docs/project-structure.md": ".agents/docs/project-structure.md"
      ".agents/skills/": ".agents/skills/"
  ambiguous: "If both layouts exist, follow AGENTS.md and report the other as target-owned historical state."
dirty_target:
  classify_before_write:
    deploy_scope: "Files this deployment may update."
    protected_dirty: "Unrelated app/source/config/secrets/runtime files; do not touch."
    target_historical_agents: "Target-owned memory, decisions, status, or historical Agents docs outside deployed_file_set."
  rule: "Do not fail or broaden cleanup; report them separately."
  deployed_file_set: "Record exact files written or intentionally verified for this deployment."
  validation_scope: "Validate deployed_file_set, not the whole dirty target, unless the user asks for full target audit."
  snapshot_fields: ["pre_dirty_snapshot","post_dirty_snapshot","changed_by_deploy","unexpected_changed_files"]
  dirty_snapshot_guard: "Allow only deployed_file_set, env, reports, gitignore fragment."
  unexpected_change_rule: "New/changed non-Agents business files fail deployment."
deployment_modes:
  core_bootstrap: "Install AGENTS, rules, skill, gitignore fragment, deploy/closeout runbooks."
  full_workflow: "Add memory starters, evidence/feedback templates, maintenance runbooks."
  template_provider_mode: "Add docs/templates/agents/** so target can redeploy."
upgrade:
  rule: "Upgrade is allowlisted redeploy: dry-run first, preserve target-owned state, update only deployed_file_set."
  overwrite_gate: "Changed deployed files need -Upgrade after dry-run; unchanged may skip."
  dry_run_plan: "Dry-run classifies paths as create/update/current/requiring -Upgrade without writing."
  version_source: "docs/agents/version.yaml"
  target_marker: "Version file records contract, not target/provider runtime state."
  no_permission_repair: "Do not run OS permission, ownership, ACL, or .git metadata repair during deployment or upgrade."
  same_repo_guard: "The deployment script must not write into the provider/source repo; source maintenance uses patches plus validation."
  target_creation: "Missing target dir requires explicit non-dry run target-creation switch."
delegated_deployment:
  trigger: "Controller receives deploy-to-path request."
  worker_role: "deployment_worker"
  assignment_scope: "One target, one mode, one write flag, deploy script/runbook only."
  controller_duties: ["verify target authorization","choose mode","review dry-run","integrate report"]
  worker_duties: ["inspect layout","dry-run unless waived","write only deployed_file_set","report XR/XW"]
  forbidden: ["copy runtime state","edit app code","repair OS/Git metadata","store target history in source"]
mode_composition:
  core_bootstrap: ["core_bootstrap"]
  full_workflow: ["core_bootstrap", "full_workflow_additions"]
  template_provider_mode: ["core_bootstrap", "full_workflow_additions", "template_provider_additions"]
deployable_by_mode:
  core_bootstrap:
    - from: "docs/templates/agents/AGENTS.md"
      to: "AGENTS.md"
    - from: "docs/templates/agents/gitignore.fragment"
      to: ".gitignore append/adapt"
    - from: "docs/templates/agents/agents/policy.yaml"
      to: "docs/agents/policy.yaml"
    - from: "docs/templates/agents/agents/ai-runtime.yaml"
      to: "docs/agents/ai-runtime.yaml"
    - from: "docs/templates/agents/agents/org.yaml"
      to: "docs/agents/org.yaml"
    - from: "docs/templates/agents/agents/model-policy.yaml"
      to: "docs/agents/model-policy.yaml"
    - from: "docs/templates/agents/agents/dispatch.yaml"
      to: "docs/agents/dispatch.yaml"
    - from: "docs/templates/agents/agents/workflows.yaml"
      to: "docs/agents/workflows.yaml"
    - from: "docs/templates/agents/agents/workflow-artifacts.yaml"
      to: "docs/agents/workflow-artifacts.yaml"
    - from: "docs/templates/agents/agents/context-compact.yaml"
      to: "docs/agents/context-compact.yaml"
    - from: "docs/templates/agents/agents/collaborators.yaml"
      to: "docs/agents/collaborators.yaml"
    - from: "docs/templates/agents/agents/core-system.yaml"
      to: "docs/agents/core-system.yaml"
    - from: "docs/templates/agents/agents/runtime-execution.yaml"
      to: "docs/agents/runtime-execution.yaml"
    - from: "docs/templates/agents/agents/provider-adapters.yaml"
      to: "docs/agents/provider-adapters.yaml"
    - from: "docs/templates/agents/agents/route-packs.yaml"
      to: "docs/agents/route-packs.yaml"
    - from: "docs/templates/agents/agents/knowledge-footprint.yaml"
      to: "docs/agents/knowledge-footprint.yaml"
    - from: "docs/templates/agents/agents/schemas.yaml"
      to: "docs/agents/schemas.yaml"
    - from: "docs/templates/agents/agents/deploy.yaml"
      to: "docs/agents/deploy.yaml"
    - from: "docs/templates/agents/agents/mcp.yaml"
      to: "docs/agents/mcp.yaml"
    - from: "docs/templates/agents/agents/version.yaml"
      to: "docs/agents/version.yaml"
    - from: "docs/templates/agents/agents/verify.yaml"
      to: "docs/agents/verify.yaml"
    - from: "docs/templates/agents/skills/project-isolation-workflow/SKILL.md"
      to: ".agents/skills/project-isolation-workflow/SKILL.md"
    - from: "docs/templates/agents/skills/project-isolation-workflow/agents/openai.yaml"
      to: ".agents/skills/project-isolation-workflow/agents/openai.yaml"
    - from: "scripts/agents-cleanup.ps1"
      to: "scripts/agents-cleanup.ps1"
    - from: "docs/templates/agents/agents-deployment.md"
      to: "docs/runbooks/agents-deployment.md"
    - from: "docs/templates/agents/task-closeout.md"
      to: "docs/runbooks/task-closeout.md"
  full_workflow_additions:
    - from: "docs/templates/agents/agent-assignment.template.md"
      to: "docs/agent-assignment.template.md"
    - from: "docs/templates/agents/agent-event.template.md"
      to: "docs/agent-event.template.md"
    - from: "docs/templates/agents/agent-status.template.md"
      to: "docs/agent-status.template.md"
    - from: "docs/templates/agents/controller-lease.template.md"
      to: "docs/controller-lease.template.md"
    - from: "docs/templates/agents/hard-isolation-evidence.template.md"
      to: "docs/hard-isolation-evidence.template.md"
    - from: "docs/templates/agents/runtime-multi-agent-validation.template.md"
      to: "docs/runtime-multi-agent-validation.template.md"
    - from: "docs/templates/agents/deployment-feedback.template.md"
      to: "docs/deployment-feedback.template.md"
    - from: "docs/templates/agents/project-memory.md"
      to: "docs/project-memory.md"
    - from: "docs/templates/agents/memory-index.md"
      to: "docs/memory/index.md"
    - from: "docs/templates/agents/memory-entry.template.md"
      to: "docs/memory-entry.template.md"
    - from: "docs/templates/agents/memory-entries-README.md"
      to: "docs/memory/entries/README.md"
    - from: "docs/templates/agents/isolation-audit.md"
      to: "docs/runbooks/isolation-audit.md"
    - from: "docs/templates/agents/multi-agent-workflow.md"
      to: "docs/runbooks/multi-agent-workflow.md"
    - from: "docs/templates/agents/repository-maintenance.md"
      to: "docs/runbooks/repository-maintenance.md"
    - from: "docs/templates/agents/session-handoff.md"
      to: "docs/runbooks/session-handoff.md"
    - from: "docs/templates/agents/skill-authoring.md"
      to: "docs/runbooks/skill-authoring.md"
    - from: "docs/templates/agents/project-structure.md"
      to: "docs/project-structure.md"
    schema_bundle: "Copy schemas/README.md and schemas/*.schema.json to schemas/."
    script_bundle: "Copy scripts/README.md and scripts/*.ps1 to scripts/."
  template_provider_additions:
    recursive_template_bundle: "Copy/adapt docs/templates/agents/** only when the target should redeploy this workflow later."
do_not_deploy:
  workflow_artifact_rule: "Block .agents/runtime/workflows/ and .workflow/."
  context_compact_rule: "Block .agents/runtime/compact-events.jsonl."
  collaborator_window_rule: "Block collaborators runtime and live thread ids."
  runtime_execution_rule: "Block execution/tool/deploy/route-pack/knowledge runtime."
  context_compact_hard_fail: "Compact runtime copied by default."
  paths:
    - "docs/agent-status.md"
    - "docs/agent-events/"
    - ".agents/docs/agent-status.md"
    - ".agents/docs/agent-events/"
    - ".agents/runtime/"
    - ".agents/runtime/collaborators.jsonl"
    - ".agents/runtime/compact-events.jsonl"
    - ".agents/runtime/workflows/"
    - ".agents/runtime/executions/"
    - ".agents/runtime/knowledge/"
    - ".agents/runtime/route-packs/"
    - ".agents/runtime/tool-evidence/"
    - ".agents/runtime/deployments/"
    - ".workflow/"
    - "docs/tmp-approval-*/"
    - ".agents/docs/tmp-approval-*/"
    - "docs/hard-isolation-evidence/"
    - ".agents/docs/hard-isolation-evidence/"
    - "docs/runtime-multi-agent-validation/"
    - ".agents/docs/runtime-multi-agent-validation/"
    - ".codex/config.toml"
    - ".codex/environments/environment.toml"
    - ".codex/environments/*.toml"
    - ".codex/environments/environment.template.toml"
    - ".git/"
    - "README.md from the template-provider repository"
    - "docs/project-structure.md from the template-provider repository"
    - "docs/project-memory.md from the template-provider repository"
    - "docs/memory/index.md from the template-provider repository"
    - "docs/templates/agents/ from the template-provider repository unless template_provider_mode is selected"
  categories: ["source git metadata","runtime history","workflow artifacts","compact events","thread ids","memory rows","temp cache","filled evidence","generated/cache/build/vendor output"]
case_by_case:
  - "docs/decisions/: adopted only."
  - "docs/memory/entries/: target-specific only."
  - "README.md: target-owned."
  - ".gitattributes: only if target adopts same EOL."
  - ".codex/*: one file at a time; never wholesale."
  - ".codex/environments/*.toml: preserve existing; if none, create .codex/environments/<target-project>.toml outside deployed_file_set."
cross_project_runtime_resilience:
  run_id: "Deploy/verify/cleanup records unique run_id."
  resume_pointer: "Resume from ledger, summary, refs, report; not full chat."
  temp_root: "%TEMP%/codex-agent-status/<project-id>-<repo-path-hash>/<run-id>/"
  cleanup_mandatory: "Require cleanup script/rule/gate."
  cleanup_claim_rule: "Exact id; no full-delete claim without proof."
  batch_isolation: "Isolated run ids; no shared lock/manifest/hash/temp."
  route_pack_determinism: "Route pack hash ignores temp/run_id."
steps:
  - "Confirm exact target path/write authorization."
  - "Inspect target state and layout before writing."
  - "Create run_id and pre_dirty_snapshot before copying any target file."
  - "Select LayoutProfile auto/root-layout/dot-agents-layout; reject mixed AGENTS routes."
  - "Choose mode; default core_bootstrap."
  - "Upgrade: dry-run first, preserve target-owned state, update only deployed_file_set."
  - "Build deployed_file_set from mode_composition/deployable_by_mode/layout map."
  - "Rewrite refs for selected layout."
  - "Append/adapt gitignore.fragment; do not replace .gitignore."
  - "If no .codex/environments/*.toml, create target-named env outside deployed_file_set."
  - "Drop source-specific state; adapt assumptions to target evidence."
  - "Validate deployed_file_set; keep historical target docs separate."
  - "Verify cleanup capability: cleanup script, workflow cleanup rule, and verify cleanup gate."
  - "Record post_dirty_snapshot, changed_by_deploy, unexpected_changed_files, cleanup_capability, resume pointer."
  - "Report changes, untouched files, target-owner next actions."
  - "Run handoff: AGENTS route, skill, runbooks, feedback, runtime, git status."
  - "Report exact XR/XW target paths."
hard_fail_gates:
  - "No exact target authorization."
  - "Template contains provider project state."
  - "Unverified target mode/scripts/stack claim."
  - "Target state stored in provider repo."
  - "Provider env template copied or target env overwritten."
  - "Blocklisted file copied by default."
  - "Workflow artifact runtime or .workflow import copied by default."
  - "Context compact runtime events copied by default."
  - "Collaborator thread ids/window runtime copied by default."
  - "OS permission, ACL, ownership, or .git repair attempted."
  - "Deployment script writes provider/source repo."
  - "Target claim without inspection/verify/handoff evidence."
  - "Competing layout without explicit migration."
  - "AGENTS.md routes to both docs/agents and .agents/docs/agents."
  - "Cleanliness claim uses whole dirty target, not deployed_file_set."
  - "Post-deploy dirty snapshot has unexpected business file changes."
  - "Cleanup script, workflow cleanup rule, or verify cleanup gate is missing from deployed target."
  - "Runtime closeout claims fully deleted without proof."
validation_levels:
  repo_local_dry_run: "source/template/blocklist checks only"
  disposable_selftest: "root_docs, template-provider, dot_agents_docs, forced-dot-layout, dry-run, protected-existing, git-backed foreign project, dirty guard, partial-gitignore, missing-target, target-owned-state, routed-historical, ambiguous-layout; verifies blocklist, cleanup, target-local environment bootstrap, app-file preservation, gitignore duplicate avoidance, target handoff check, target-owned state preserved, target git rollback scope, isolated temp/run id."
  authorized_target_dry_run: "read target and report plan"
  authorized_target_handoff_check: "read target AGENTS route, skill path, deployment report, runbook links, feedback template, protected runtime/local paths, and git status summary"
  authorized_target_deployment_test: "write allowlisted/approved files, validate deployed_file_set, and complete the target handoff check"
