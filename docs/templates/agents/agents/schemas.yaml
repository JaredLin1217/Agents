schema: agents-schemas/v2
purpose: "Field labels for assignments, reports, status, evidence, memory, and skills."
owns: "Compact assignment/report schemas plus extended runtime, recovery, evidence, memory, and skill fields."

assignment:
  required_fields:
    Status context: ""
    Agent: ""
    Runtime id: ""
    Mode: "session-managed | manual-detached | cloud-or-automation"
    Runtime enforcement: "behavioral-only | tool-enforced | externally-enforced"
    Runtime enforcement evidence: ""
    Role: "explorer | worker"
    Goal: ""
    Ownership: "read-only | exclusive-writer | controller-only-integration"
    Owned write scope: ""
    Normalized owned write scope: ""
    Ownership matrix status: "clear | conflict | unknown | not applicable"
    Shared read scope: ""
    Required project-local skills: ""
    Allowed scope: ""
    Forbidden scope: ""
    Edit permission: ""
    Allowed tool/resource use: ""
    Verification: ""
    Roster requirement: "not required | controller records | required at exact temp status path"
    Roster path: ""
    Roster write permission: "controller-only | employee append-event only at exact path | none"
    Ledger requirement: "not required | controller records | required at .agents/runtime/agent-ledger.jsonl"
    Ledger path: ".agents/runtime/agent-ledger.jsonl"
    Ledger write permission: "controller-only | employee append-event only at exact path | none"
    Completion notification: "final report on complete, blocked, or stopped"
    Status event rule: "not allowed | controller records | employee append-only event at exact path"
    Boundary note: ""

explorer_brief_assignment:
  use_when: "session-managed read-only explorer with no edits and no recovery requirement"
  fields: ["Agent", "Mode", "Role=explorer", "Runtime enforcement=behavioral-only unless verified", "Goal", "Read scope", "Forbidden scope", "Required project-local skills", "Edit permission=none", "Allowed tool/resource use", "Verification", "Final report requirements", "Isolation requirements"]
  preset_rule: "Default for read-only/scoring explorers. Do not include ownership matrix, roster, runtime enforcement evidence, or worker-only fields unless recovery, ownership, or writes are involved."

explorer_final_report:
  fields: ["Agent", "Status", "Task", "Files inspected", "Findings/proposals", "Risks", "Verification", "Recommended next action", "Isolation line"]
  rule: "Use full employee_final_report for workers, detached/cloud agents, long-running explorers, or recovery-sensitive work."

scoring_explorer_report:
  use_when: "read-only scoring or review batches"
  fields: ["Agent", "Overall score", "Confidence", "Top issues", "Top fixes", "Cap suggestion", "Validity", "Verification", "Isolation line"]
  optional_fields: ["Subscores", "Evidence quality", "Uncertainty reason", "Finding key", "Duplicate of"]
  rule: "Keep scoring reports to score, up to 3 issues, up to 3 fixes, one cap/risk note, and isolation unless assigned otherwise."

scoring_rollup_report:
  use_when: "controller aggregates scoring_explorer_report batches"
  fields: ["Batch", "Agents requested", "Reports received", "Reports accepted", "Reports excluded", "Raw scores", "Score distribution", "Mean score", "Median score", "Min score", "Max score", "Range", "Confidence", "Aggregation method", "Outliers", "Invalid reports", "Final score", "Score rationale", "Top issues", "Top fixes", "Dissent", "Cap applied", "Stop reason", "Integrated opinion", "Verification", "Isolation line"]
  aggregation_rule: "Use median first, also report mean/range; exclude only invalid reports or stated outliers; repeated findings raise confidence instead of duplicating output."

report_validation:
  scoring_required: ["Agent", "Overall score", "Top issues", "Top fixes", "Validity", "Isolation line"]
  score_rule: "Overall score must be numeric 0-100."
  isolation_rule: "Isolation line must include GM, GS, XR, and XW values; XR/XW may be none or exact path list."
  validity_values: ["accepted", "needs-revision", "rejected", "excluded"]
  invalid_when: ["missing score", "non-numeric score", "missing isolation line", "forbidden read/write", "unsupported runtime or hard-isolation claim"]
  report_hash_fields: ["Agent", "Runtime id", "Task", "Status", "Overall score", "Top issues", "Top fixes", "Validity", "Files changed"]

ownership_matrix:
  use_when: "worker exists, two employees are active, or controller edits near employee scope"
  required_fields: ["Agent", "Runtime id", "Role", "Status", "Ownership", "Normalized owned write scope", "Scope type", "Conflict status", "Checked against", "Last checked by", "Last checked at"]
  conflict_statuses: ["clear", "conflict", "unknown"]
  conflict_checks: ["same scope", "directory contains file/scope", "scope differs only by spelling/case/separators", "controller edits active worker scope"]

employee_final_report:
  statuses: ["completed", "blocked", "stopped"]
  required_fields:
    - "Agent"
    - "Mode"
    - "Runtime id"
    - "Runtime enforcement"
    - "Runtime enforcement evidence"
    - "Role"
    - "Status"
    - "Task"
    - "Ownership"
    - "Owned write scope"
    - "Normalized owned write scope"
    - "Ownership conflict status"
    - "Shared read scope"
    - "Allowed scope"
    - "Forbidden scope"
    - "Files inspected"
    - "Files changed"
    - "Project-local skills read"
    - "Current stopping point"
    - "Findings"
    - "Verification"
    - "Risks"
    - "Needs review"
    - "Recommended next action"
    - "Boundary note"
    - "Roster requirement"
    - "Roster path"
    - "Roster write permission"
    - "Ledger requirement"
    - "Ledger path"
    - "Ledger write permission"
    - "Roster snapshot version"
    - "Ownership matrix status"
    - "System/global resources"
    - "Global Memory"
    - "Global Skill"
    - "Project-external reads"
    - "Project-external writes"
    - "Status event"
    - "Completion notification"

agent_status_snapshot:
  location: "%TEMP%/codex-agent-status/<project-id>/agent-status.md"
  statuses: ["prepared", "active", "completed", "blocked", "stopped", "needs-review", "closed", "unknown"]
  required_fields: ["Snapshot version", "Agent", "Runtime id", "Nickname", "Mode", "Role", "Status", "Task", "Ownership", "Owned write scope", "Normalized owned write scope", "Shared read scope", "Ownership matrix status", "Last known event", "Last poll result", "Close required", "Runtime close result", "Closed at", "History cleanup", "History cleanup authorization", "History cleanup target ids", "History cleanup sources", "History cleanup result", "Desktop UI refresh result", "Project-external status path"]
  explorer_queue_fields: ["Agent", "Runtime id", "Task", "Read scope", "Status", "Last poll", "Needs review", "Next action", "Report hash", "Duplicate count", "No-progress count"]
  history_cleanup_values: ["not requested", "not applicable", "authorized", "completed", "failed"]

agent_event:
  names: ["prepare", "hired", "launch", "spawn", "started", "input", "progress", "poll", "report", "completed", "blocked", "stopped", "wait", "close", "history_cleanup", "shutdown", "integrated", "reconciled"]
  explorer_event_fields: ["Agent", "Runtime id", "Event", "Status", "Summary", "Needs review", "Next action", "Report id", "Report observed at", "Report hash", "Duplicate count"]
  ownership_event_fields: ["Normalized owned write scope", "Ownership conflict status", "Ownership matrix status", "Checked against"]
  close_event_fields: ["Close required", "Runtime close result", "Closed at", "Official list result", "History cleanup", "History cleanup authorization", "History cleanup target ids", "History cleanup sources", "History cleanup result", "Desktop UI refresh result", "Roster snapshot version"]
  rule: "Report events preserve only fields relevant to the event; unavailable final-report fields may be not applicable."

agent_ledger_event:
  location: ".agents/runtime/agent-ledger.jsonl"
  format: "JSONL; one JSON object per event"
  status: "repo-local ignored runtime state; advisory, not Codex official runtime DB"
  names: ["initialized", "hired", "started", "report", "completed", "blocked", "stopped", "closed", "history_cleanup", "shutdown", "integrated", "reconciled"]
  canonical_fields: ["ts", "event", "agent_id", "mode", "role", "task"]
  optional_fields: ["status", "nickname", "read_scope", "write_scope", "ledger_version", "report_hash", "final_report_summary", "controller_id", "source", "official_list_result", "history_cleanup_sources", "history_cleanup_db", "history_cleanup_target_ids", "history_cleanup_result", "desktop_ui_refresh_result", "deleted_rows", "notes", "isolation"]
  compatibility_aliases: ["time -> ts", "runtime_id -> agent_id", "agent -> agent_id", "controller -> controller_id", "scope -> read_scope"]
  canonical_write_rule: "New controller-written events should use canonical_fields; readers may normalize compatibility_aliases for older local runtime ledgers."
  write_rule: "Controller appends by default; employees append only when assigned exact ledger path and append permission."
  storage_rule: "Never stage, commit, deploy, or copy .agents/runtime/**; ledger may be cleared and rebuilt from runtime evidence."

controller_lease:
  location: "%TEMP%/codex-agent-status/<project-id>/controller-lease.md"
  statuses: ["active", "released", "expired", "takeover-claimed", "unknown"]
  required_fields: ["Controller id", "Lease id", "Lease status", "Acquired at", "Last heartbeat", "Expires at", "Current task", "Snapshot version reviewed", "Released at", "Takeover reason"]

hard_isolation_evidence:
  classifications: ["behavioral-only", "tool-enforced", "externally-enforced"]
  required_fields:
    - "Task"
    - "Agent or controller"
    - "Requested guarantee"
    - "Forbidden paths or resources"
    - "User-approved external paths or actions"
    - "Evidence record location"
    - "Date"
    - "Classification"
    - "Control type"
    - "Control owner"
    - "Configuration source"
    - "Who can change or bypass the control"
    - "Allowed read roots"
    - "Allowed write roots"
    - "Forbidden read roots"
    - "Forbidden write roots"
    - "Credential or account scope"
    - "Network or cloud scope"
    - "Verifier"
    - "Verification command, UI state, or log"
    - "Result"
    - "Observed blocked-access behavior"
    - "Verification avoided reading forbidden content"
    - "If no, exact user authorization"
    - "Expiry, cleanup, or rollback step"
    - "System/global resources"
    - "Global Memory"
    - "Global Skill"
    - "Project-external reads"
    - "Project-external writes"
    - "Remaining risk"
  rule: "Missing required evidence means behavioral-only."

runtime_multi_agent_validation:
  required_fields:
    - "Validation id"
    - "Date"
    - "Controller"
    - "User request"
    - "Claim scope"
    - "Runtime enforcement"
    - "Real employee runtime or authorized manual-detached evidence"
    - "Runtime id"
    - "Nickname"
    - "Mode"
    - "Expected blocking behavior"
    - "Sidebar or user-control behavior"
    - "Role"
    - "Task"
    - "Roster required"
    - "Roster path"
    - "Roster snapshot version"
    - "Roster fields reviewed"
    - "Ledger required"
    - "Ledger path"
    - "Ledger event ids reviewed"
    - "Controller lease id"
    - "Controller lease status"
    - "Assignment path or prompt"
    - "Roster requirement included"
    - "Roster write permission included"
    - "Status-event rule included"
    - "Final report schema included"
    - "Owned write scope"
    - "Normalized owned write scope"
    - "Shared read scope"
    - "Ownership matrix status"
    - "Final report received"
    - "Final report matched runtime id"
    - "Required fields present"
    - "Project-local skills read"
    - "System/global resources"
    - "Global Memory"
    - "Global Skill"
    - "Project-external reads"
    - "Project-external writes"
    - "Files changed"
    - "Verification"
    - "Risks"
    - "Poll event"
    - "Report event"
    - "Close event"
    - "Reconciled event"
    - "Matching snapshot version"
    - "Git status after employee work"
    - "Out-of-scope changes"
    - "Runtime close attempted"
    - "Runtime close result"
    - "Official list result"
    - "History cleanup requested"
    - "History cleanup authorization"
    - "History cleanup sources"
    - "History cleanup result"
    - "Desktop UI refresh result"
    - "Pass condition met"
    - "Remaining runtime risk"
    - "Controller conclusion"
  storage_rule: "Filled records are local scratch unless sanitized and promoted."

memory_entry:
  draft_fields: ["Trigger", "Context", "Cause", "Fix / Rule", "Verification", "Reuse when"]
  index_columns: ["ID", "Date", "Title", "Trigger", "Keywords", "Summary", "Entry", "Verified"]

skill:
  SKILL_md_frontmatter: ["name", "description"]
  openai_yaml:
    interface: ["display_name", "short_description", "default_prompt"]
    policy: ["allow_implicit_invocation"]
  constraints: ["folder name equals skill name", "default_prompt names $skill", "short_description 25-64 chars", "allow_implicit_invocation present"]
