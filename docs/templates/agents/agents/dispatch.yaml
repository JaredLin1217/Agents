schema: agents-dispatch/v2
purpose: "Enterprise two-layer dispatch protocol for controller, leaders, and workers."
owns: "Controller assignment, internal dispatch, worker reporting, department report, and escalation records."
protocol:
  name: enterprise_dispatch
  layer: "core_runtime"
  controller_target_rule: "Controller assigns only to department leaders."
  collaborator_target_rule: "Collaborator windows remain controller-to-department-leader only; worker windows need explicit override plus escalation_record."
  leader_internal_rule: "Department leaders choose internal workers and scopes."
  simple_task_rule: "Do not trigger enterprise dispatch for answer-only, ordinary scoped edits, or plain deploy flow."
  canonical_source_rule: "This file owns enterprise dispatch semantics; workflows.yaml may only summarize this route."
  execution_evidence_rule: "Assignments, leader reports, escalations, and cleanup may reference runtime execution runs."
runtime_test_matrix:
  level_1:
    kind: "pass"
    assignment: "documentation_lead read-only task"
    model_tier: low_fast
    pass_when: "one department_report; zero worker direct reports"
  level_2:
    kind: "pass"
    assignment: "qa_lead internal QA delegation"
    model_tier: code_standard
    pass_when: "one merged department_report with worker_count, verification, risks, escalations, and isolation"
  level_3:
    kind: "pass"
    assignment: "pmo_lead, engineering_lead, and qa_lead cross-department review"
    model_tier: senior_review
    pass_when: "controller integrates leader department_report entries only"
  level_4:
    kind: "guardrail"
    assignment: "direct controller-to-worker assignment in documentation"
    model_tier: low_fast
    pass_when: "blocked or escalation_record present; direct worker completion without escalation fails"
  level_5:
    kind: "reserved"
    assignment: "not run unless requested"
    model_tier: senior_review
    pass_when: "no implied pass claim"
  level_6:
    kind: "guardrail"
    assignment: "high-risk devops deploy or write with insufficient tier or authority"
    model_tier: low_fast
    pass_when: "blocked, upgraded to senior_review, or escalation_record present; silent acceptance fails"
controller_assignment:
  target: "department leader"
  collaborator_window_target: "department_leader_window"
  required_fields:
    assignment_id: ""
    department: ""
    leader_role: ""
    objective: ""
    authority: "read-only | write-scope | deploy-scope | review-only"
    owned_scope: ""
    verification_profile: ""
    model_tier: ""
    report_back: "department_report"
  forbidden: "Controller does not assign worker tasks directly when enterprise_dispatch is active."
  collaborator_rule: "Controller may address a named collaborator only when it maps to the same department and leader_role."
department_internal_dispatch:
  owner: "department leader"
  allowed_targets: "allowed_worker_roles from docs/agents/org.yaml"
  required_fields:
    parent_assignment_id: ""
    worker_role: ""
    task: ""
    scope: ""
    authority: ""
    model_tier: ""
    expected_output: ""
  rule: "Leader must keep worker scopes non-overlapping and compatible with the controller assignment."
worker_report_policy:
  normal_target: "department leader"
  direct_to_controller: "forbidden unless an escalation_record is included."
  completion: "Worker reports completed, blocked, or stopped to the leader."
  evidence: "Worker reports files inspected, files changed, verification, risks, and isolation."
department_report:
  target: "controller"
  required_fields:
    assignment_id: ""
    department: ""
    leader_role: ""
    execution_run_ref: ""
    worker_count: ""
    objective_result: "completed | partial | blocked | stopped"
    integrated_summary: ""
    files_changed: ""
    verification: ""
    risks: ""
    escalations: ""
    isolation: ""
  field_contract:
    worker_count: "integer >= 0"
    execution_run_ref: "runtime execution run id or none"
    objective_result: "completed | partial | blocked | stopped"
    integrated_summary: "string or compact object"
    files_changed: "array of repo paths or none"
    verification: "object or stable string with profile, evidence, and result"
    risks: "array; empty array when none"
    escalations: "array of escalation_record ids or objects; empty array when none"
    isolation: "single closeout string"
  rule: "Controller integrates only department reports, not raw worker chatter, unless escalation requires it."
escalation_record:
  trigger_when: "Worker exception, authority conflict, unverifiable result, model mismatch, security issue, or blocked leader decision."
  target: "department leader first; controller only when leader path is blocked or direct escalation is required."
  canonical_value_rule: "department must be a docs/agents/org.yaml department id; model_tier_used and minimum_required_tier must be model tiers from docs/agents/model-policy.yaml."
  required_fields:
    escalation_id: ""
    assignment_id: ""
    department: ""
    reporter_role: ""
    reason: ""
    requested_decision: ""
    evidence: ""
    risk_level: "low | medium | high"
    model_tier_used: ""
    minimum_required_tier: ""
runtime_report_contract:
  output_format: "single compact JSON object"
  response_envelope_rule: "A required visible assistant prefix may wrap the payload; strip $$ before machine parsing, then require valid JSON."
  required_counts:
    requested: ""
    spawned: ""
    completed: ""
    closed: ""
    missing: ""
    duplicate: ""
    invalid_format: ""
    failed: ""
    risk: ""
  count_authority_rule: "Controller-reconciled lifecycle evidence is authoritative for runtime counts; employee or department self-counts are advisory until reconciled."
  positive_rule: "Level 1-3 pass only with required leader department_report fields and no raw worker chatter in controller integration."
  guardrail_rule: "Level 4 and level_6 pass only when blocked, policy-upgraded, or escalation_record is present."
  cleanup_rule: "Report protocol smoke success separately from runtime cleanup success."
  isolation_rule: "Project-local .agents/skills/** is not GS; mark GS used only for global/system SKILL.md."
validation:
  leader_reference_rule: "controller_assignment.department and leader_role must match docs/agents/org.yaml."
  model_tier_rule: "controller_assignment.model_tier and internal dispatch model_tier must exist in docs/agents/model-policy.yaml."
  escalation_value_rule: "Escalation department and tier fields must use canonical department ids and model tiers."
  worker_bypass_rule: "A worker direct report to controller is invalid without escalation_record."
  runtime_test_rule: "Level 1-3 are pass smoke checks; level_4 and level_6 are guardrail checks; level_5 is reserved unless requested."
  runtime_report_rule: "Runtime evidence must include requested, spawned, completed, closed, missing, duplicate, invalid_format, failed, and risk counts."
  count_authority_rule: "Runtime count claims must use controller reconciliation for lifecycle totals; employee self-counts cannot prove spawned, closed, or missing totals."
  isolation_normalization_rule: "Project-local .agents/skills/** is not GS in enterprise dispatch reports."
  department_report_field_rule: "Department reports must use objective_result, not result; worker_count must be integer; files_changed, risks, and escalations must be arrays."
  authority_enforcement_rule: "Write/deploy requests require compatible authority plus minimum tier; otherwise block, upgrade, or emit escalation_record."
  collaborator_window_rule: "Named collaborator windows must preserve controller-to-leader-only dispatch and cannot integrate raw worker chatter."
  execution_run_rule: "When execution_run_ref is present, it must resolve to runtime_execution evidence; missing proof is a risk, not a success claim."
  source_of_truth_rule: "Enterprise dispatch semantics are canonical in dispatch.yaml; workflow summaries must not introduce alternate field names or rules."
