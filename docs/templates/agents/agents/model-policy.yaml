schema: agents-model-policy/v2
purpose: "Tier-first model selection policy for enterprise dispatch."
owns: "Model tiers, replaceable model mapping, department defaults, and review thresholds."
tiers:
  low_fast:
    capability: "Simple ack, formatting, lightweight read-only review."
    risk_limit: "No writes, deployment, security judgment, or release claims."
  quick_code:
    capability: "Fast code/file location, simple focused verification, small scoped fixes."
    risk_limit: "No broad architecture, release, or high-risk cleanup without review."
  code_standard:
    capability: "Normal implementation, focused refactor, targeted tests, and deployment dry-run support."
    risk_limit: "Escalate security, destructive cleanup, public release, or broad architecture decisions."
  senior_review:
    capability: "Cross-file review, deployment validation, risk analysis, and release checkpoint review."
    risk_limit: "Escalate breaking compatibility, hard isolation, or principal architecture choices."
  principal:
    capability: "Architecture, security-sensitive judgment, release approval, and high-risk escalation."
    risk_limit: "Still requires current evidence for hard-isolation or external enforcement claims."
model_mapping:
  replaceable: "true"
  low_fast: "gpt-5.4-mini"
  quick_code: "gpt-5.3-codex-spark"
  code_standard: "gpt-5.3-codex"
  senior_review: "gpt-5.4"
  principal: "gpt-5.5"
department_bindings:
  executive_office: principal
  pmo: senior_review
  architecture: principal
  engineering: code_standard
  devops: senior_review
  qa: code_standard
  security: principal
  documentation: low_fast
  provider_management: senior_review
risk_rules:
  high_risk_min_tier: senior_review
  release_min_tier: principal
  deploy_write_min_tier: senior_review
  code_write_min_tier: code_standard
  read_only_batch_default: low_fast
  fallback_order: ["low_fast", "quick_code", "code_standard", "senior_review", "principal"]
  model_missing_behavior: "Use the next higher tier in fallback_order; never downgrade; if no higher mapped model is available, emit escalation_record and stop."
  provider_inventory_rule: "Unavailable or capability-mismatched mapped models are escalation_record conditions, not silent success."
validation:
  tier_first_rule: "Departments bind to tiers first; concrete model ids are replaceable mapping values."
  binding_rule: "Every department in docs/agents/org.yaml must have one department_bindings entry."
  tier_reference_rule: "Every department binding and risk rule tier must exist in tiers."
  high_risk_review_rule: "High-risk tasks require senior_review or principal review."
  fallback_rule: "Fallback follows risk_rules.fallback_order upward only; missing provider inventory requires escalation_record."
  provider_mapping_rule: "Concrete model ids must be reviewed for availability and tier fit before release, deploy, or public capability claims."