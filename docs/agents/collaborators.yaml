schema: agents-collaborators/v1
purpose: "Runtime overlay for named, recoverable, archivable Codex collaborator windows."
owns: "Collaborator lifecycle, department leader mapping, thread operations, assignment envelope, reports, and runtime boundaries."
trigger_when:
  include: "Create, rename, message, inspect, recover, archive, close, or dismiss a named collaborator window."
  route_signal: "User intent mentions collaborator, Codex work session, named window, cross-window recovery, window title, archive, close, or dismissal."
do_not_trigger_for:
  items: ["answer-only", "ordinary scoped edit", "plain deploy", "enterprise dispatch without collaborator window request", "subagent sidebar cleanup without collaborator thread operation"]
storage:
  runtime_registry: ".agents/runtime/collaborators.jsonl"
  temp_registry: "%TEMP%/codex-agent-status/<project-id>/collaborators.jsonl"
  git_rule: "Never stage, commit, deploy, release, or copy collaborator runtime registries."
  thread_id_rule: "Live thread ids are runtime evidence only; never place them in templates, deployable files, release packages, or public docs."
capability:
  discover_before_use: "Discover thread tools before create, rename, send, read, archive, close, or active-list claims."
  unavailable_behavior: "Return escalation_record or manual checkpoint when thread tools are unavailable; do not claim a window was created."
  delete_claim_rule: "Claim archive or close only with runtime evidence; claim deletion only if the runtime tool explicitly proves deletion."
types:
  default: department_leader_window
  allowed: ["department_leader_window"]
  blocked_without_override: ["worker_window", "independent_worker_window"]
lifecycle:
  states: ["created", "active", "renamed", "reporting", "archived", "closed", "orphaned"]
  close_rule: "Archive or close the exact collaborator thread id and verify it is no longer active before a clean close claim."
  thread_operation_rule: "Every create, rename, send, archive, close, or failed close attempt records thread_operation_record evidence."
  cleanup_boundary: "Collaborator windows use thread archive or close; subagent sidebar/history cleanup remains separate multi_agent runtime cleanup."
leader_mapping:
  greeting_or_docs:
    department: documentation
    leader_role: documentation_lead
    default_model_tier: low_fast
  validation_or_testing:
    department: qa
    leader_role: qa_lead
    default_model_tier: code_standard
  deploy_or_release:
    department: devops
    leader_role: devops_lead
    default_model_tier: senior_review
  architecture_or_design:
    department: architecture
    leader_role: architecture_lead
    default_model_tier: principal
  model_or_provider:
    department: provider_management
    leader_role: provider_management_lead
    default_model_tier: senior_review
  cross_department:
    department: pmo
    leader_role: pmo_lead
    default_model_tier: senior_review
commands:
  create_named_collaborator: "Map objective to a department leader, create one department_leader_window, send assignment envelope, and record thread_operation_record evidence."
  rename_named_collaborator: "Rename the exact collaborator thread title and record thread_operation_record evidence."
  dismiss_named_collaborator: "Archive or close the exact collaborator thread, record thread_operation_record evidence, and verify it is no longer active."
assignment:
  required_fields: ["collaborator_id", "display_name", "thread_id", "type", "department", "leader_role", "objective", "authority", "scope", "model_tier", "expected_report", "execution_run_ref"]
  target_rule: "Controller targets department leader collaborators only."
  worker_window_rule: "Worker collaborator windows are blocked unless explicit override and escalation_record exist."
thread_operation_record:
  required_fields: ["operation_id", "collaborator_id", "thread_id", "operation", "requested", "result", "verified", "evidence_ref", "claim_scope"]
  operations: ["create", "rename", "send", "archive", "close", "verify_inactive", "failed_close"]
  hard_delete_rule: "Do not claim hard deletion unless a runtime tool explicitly proves deletion; otherwise claim archive or close requested with evidence."
reports:
  allowed_outputs: ["department_report", "collaborator_report", "escalation_record"]
  integration_rule: "Controller integrates leader-level reports only; raw worker chatter is excluded."
  collaborator_report_fields: ["collaborator_id", "display_name", "department", "leader_role", "status", "objective_result", "summary", "verification", "risks", "escalations", "isolation"]
validation:
  profile: collaborator_window
  route_rule: "Route stays optional and must not trigger plain enterprise dispatch or ordinary deploy."
  leader_reference_rule: "Mapped department and leader_role must exist in docs/agents/org.yaml."
  model_tier_rule: "Mapped default_model_tier must exist in docs/agents/model-policy.yaml."
  runtime_boundary_rule: "Runtime registry and thread ids stay local and are excluded from templates, deploy, and release."
  close_claim_rule: "Close or archive claims need verified thread_operation_record evidence; unverified cleanup remains an open risk."
