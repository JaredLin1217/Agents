schema: agents-runtime-execution/v1
purpose: "Runtime execution evidence for plans, tools, approvals, results, and cleanup."
storage:
  root: ".agents/runtime/executions/<run_id>/"
  tracked: false
  deployable: false
state:
  allowed:
    - "planned"
    - "approved"
    - "running"
    - "waiting_approval"
    - "completed"
    - "failed"
    - "blocked"
    - "cleaned"
  terminal:
    - "completed"
    - "failed"
    - "blocked"
    - "cleaned"
run:
  required_fields:
    - "run_id"
    - "objective"
    - "scope"
    - "authority"
    - "owner"
    - "model_tier"
    - "status"
    - "event_summary"
    - "verification_refs"
    - "risks"
    - "deployment_evidence"
    - "resume_pointer"
step:
  required_fields:
    - "step_id"
    - "owner"
    - "target"
    - "action"
    - "authority"
    - "status"
approval_gate:
  required_for:
    - "write"
    - "deploy"
    - "external_access"
    - "destructive_action"
    - "model_tier_upgrade"
  record_fields:
    - "approval_id"
    - "run_id"
    - "action"
    - "approver"
    - "scope"
    - "decision"
tool_evidence:
  required_fields:
    - "tool"
    - "action"
    - "target"
    - "result"
    - "evidence_ref"
result:
  required_fields:
    - "run_id"
    - "status"
    - "summary"
    - "risks"
    - "evidence_refs"
cleanup_evidence:
  required_fields:
    - "run_id"
    - "requested"
    - "verified"
    - "remaining_runtime"
    - "claim_scope"
deployment_evidence:
  required_fields:
    - "evidence_id"
    - "evidence_type"
    - "summary"
    - "evidence_ref"
    - "verification_ref"
    - "risk"
    - "created_at"
  allowed_types:
    - "preflight"
    - "copy"
    - "verify"
    - "cleanup"
    - "result_summary"
cross_window_recovery:
  resume_rule: "Resume from run_id, event_summary, verification_refs, risks, deployment_evidence, and resume_pointer instead of full transcript."
  summary_rule: "Collect emits a minimal summary that excludes raw worker chatter and live thread ids."
  temp_root: "%TEMP%/codex-agent-status/<project-id>-<repo-path-hash>/<run-id>/"
rules:
  - "High-risk steps require approval or escalation before execution."
  - "Worker raw chatter is never a controller result."
  - "Cleanup claims must match verified runtime capability."
  - "Deployment runs record run_id, event_summary, verification_refs, risks, deployment_evidence, and resume_pointer."
  - "Runtime evidence is local state and is not deployed, released, or committed."
validation:
  profile: "runtime_execution"
