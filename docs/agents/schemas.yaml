schema: agents-schemas/v2
purpose: "Compact field contracts for assignments, reports, runtime evidence, recovery."
owns: "Schemas for reports, ledgers, isolation, workflow artifacts, collaborators, foundation creation, core runtime."
assignment:
  required_fields:
    Agent: ""
    Runtime id: ""
    Mode: "session-managed | manual-detached | cloud-or-automation"
    Runtime enforcement: "behavioral-only | tool-enforced | externally-enforced"
    Role: "explorer | worker"
    Goal: ""
    Ownership: "read-only | exclusive-writer | controller-only-integration"
    Owned write scope: ""
    Normalized owned write scope: ""
    Ownership matrix status: "clear | conflict | unknown | not applicable"
    Shared read scope: ""
    Allowed scope: ""
    Forbidden scope: ""
    Verification: ""
    Ledger path: ".agents/runtime/agent-ledger.jsonl"
enterprise_assignment:
  required_fields: "[assignment_id, department, leader_role, objective, authority, owned_scope, verification_profile, model_tier, report_back]"
  target_rule: "Controller targets department leader only."
department_internal_dispatch:
  owner: "department leader"
  required_fields: "[parent_assignment_id, worker_role, task, scope, authority, model_tier, expected_output]"
department_report:
  required_fields: "[assignment_id, department, leader_role, worker_count, objective_result, integrated_summary, files_changed, verification, risks, escalations, isolation, execution_run_ref]"
  field_types:
    worker_count: "integer >= 0"
    objective_result: "completed|partial|blocked|stopped"
    files_changed: "array"
    risks: "array"
    escalations: "array"
  target_rule: "Leader reports one integrated result to controller."
  alias_rule: "Use objective_result, not result."
model_tier:
  required_fields: "[tier, capability, risk_limit, replaceable_model_mapping]"
  rule: "Use policy tiers; concrete model ids are replaceable."
escalation_record:
  required_fields: "[escalation_id, assignment_id, department, reporter_role, reason, requested_decision, evidence, risk_level, model_tier_used, minimum_required_tier]"
  rule: "Direct worker-to-controller report requires escalation_record."
workflow_instance:
  required_fields: "[workflow_id, status, controller, created_at, route, storage_root, plan_path, packet_root, result_root, final_report_path, execution_run_ref]"
  status_values: "[drafted, approved, active, waiting_approval, collecting, completed, blocked, stopped]"
  storage_rule: "Live artifacts stay local under .agents/runtime/workflows/<workflow_id>/ or .workflow/<workflow_id>."
workflow_state:
  required_fields: "[workflow_id, status, updated_at, approval_state, risk_level, active_departments, open_escalations]"
workflow_packet:
  required_fields: "[packet_id, workflow_id, type, owner, target, authority, scope, model_tier, expected_output]"
  packet_types: "[department_leader_assignment, worker_packet, verification_packet, escalation_packet]"
  routing_rule: "Controller targets department leaders; worker-to-controller needs escalation_packet."
workflow_result:
  required_fields: "[result_id, workflow_id, owner, target, status, summary, verification, risks, escalations]"
  forbidden_fields: "[raw_worker_chatter]"
workflow_approval_gate:
  required_fields: "[gate_id, workflow_id, action, requested_by, decision, authority, evidence, expires_at]"
  gated_actions: "[write, deploy, external_read, external_write, destructive_action, model_tier_upgrade]"
workflow_collection_report:
  required_fields: "[workflow_id, packet_count, result_count, department_reports, verification, risks, escalations, final_report_path]"
  rule: "Collect normalizes packets/results and excludes raw worker chatter."
workflow_security_check:
  required_fields: "[workflow_id, path_scope, blocked_path_result, approval_gate_result, model_tier_result, runtime_local_result]"
  path_rule: "Block outside repo, .git, .codex, unauthorized .agents/runtime/workflows, unauthorized .workflow."
context_compact_summary:
  required_fields: "[active_goal, latest_user_request, current_route, changed_files, pending_actions, verification_state, open_risks, external_access, subagents_open, next_step, do_not_forget, isolation, retained_facts, dropped_details, resume_pointer]"
  reject_when: "[missing latest_user_request, missing changed_files, unclosed subagents, raw transcript included, external access omitted]"
  raw_transcript_rule: "Do not store raw transcript, raw worker chatter, long output, superseded instructions."
  continuation_rule: "latest_user_request and next_step must make next action clear."
context_compact_event:
  location: ".agents/runtime/compact-events.jsonl"
  required_fields: "[event_id, trigger, thread_source, workflow_id, summary_path, created_at, verification, risks, retained_facts, dropped_details, resume_pointer]"
  trigger_values: "[manual, auto, handoff, subagent_closeout, pre_commit, pre_deploy, route_switch]"
  storage_rule: "Ignored runtime state; never stage, deploy, release, copy."
collaborator_record:
  location: ".agents/runtime/collaborators.jsonl"
  required_fields: "[collaborator_id, display_name, thread_id, type, department, leader_role, objective, state, created_at, last_operation, last_verified_at]"
  state_values: "[created, active, renamed, reporting, archived, closed, orphaned]"
  storage_rule: "Runtime-local; never stage, commit, deploy, release, or copy."
collaborator_assignment:
  required_fields: "[collaborator_id, display_name, thread_id, type, department, leader_role, objective, authority, scope, model_tier, expected_report, execution_run_ref]"
  target_rule: "Controller assigns only department_leader_window mapped to org.yaml leader_registry."
  worker_window_rule: "Worker collaborator needs explicit override and escalation_record."
collaborator_report:
  required_fields: "[collaborator_id, display_name, department, leader_role, status, objective_result, summary, verification, risks, escalations, isolation]"
  integration_rule: "Controller integrates collaborator_report, department_report, or escalation_record only; excludes raw worker chatter."
thread_operation_record:
  required_fields: "[operation_id, collaborator_id, operation, thread_id, thread_title_before, thread_title_after, requested_by, result, verified_active_state, evidence, created_at]"
  operations: "[create, rename, send, read, archive, close, verify_inactive]"
  storage_rule: "Thread ids and runtime capability evidence are never deployable."
core_system:
  required_fields: "[system_id, version, canonical_files, runtime_blocklist, deploy_contract, release_contract, non_goals]"
  runtime_blocklist: "[.agents/runtime/**, .workflow/**, .codex/**, live thread ids, API keys, provider sessions]"
  release_contract: "Release manifest records version, commit, hash, file list, and blocklist result."
foundation_creation:
  required_fields: "[feature_id, objective, official_docs_refs, output_schema, state_owner, tool_boundary, latency_control, evaluation_gate, fallback, cleanup_rule]"
  schema_rule: "Use Structured Outputs for machine-consumed objects; reject schema-free durable automation output."
  state_rule: "Name model-side, repo-local, or external state owner before multi-turn behavior is claimed."
  creation_rule: "Translate official OpenAI developer documentation into scoped repo-local features, not broad context growth."
  tool_boundary_rule: "Declare allowed tools, handoff boundary, and subagent write ownership before delegation."
  latency_rule: "Choose prompt_caching, predicted_outputs, or neither based on stable prefix and known-output fit."
  evaluation_rule: "Each foundation feature includes pass/fail evidence, risk, and rollback note before release."
runtime_execution:
  required_fields: "[run_id, status, objective, authority, steps, approvals, tool_evidence, results, escalations, cleanup_evidence, isolation]"
  status_values: "[planned, approved, running, waiting_approval, completed, failed, blocked, cleaned]"
  cleanup_evidence: "verified evidence is required before cleanup claims."
provider_adapter:
  required_fields: "[provider_id, capabilities, model_tier_map, default_tiers, risk_limits, replacement_rule]"
  tier_rule: "Bind workflow to capability tier, not a single model ID."
  session_rule: "Provider sessions and credentials are runtime-local and not deployable."
route_pack:
  required_fields: "[route_id, required_files, schema_hash, tool_surface, cache_key_fields, manifest_hash]"
  determinism_rule: "Route pack export is deterministic; same route inputs produce the same hash."
  cache_key_fields: "[route_id, version, required_files, schema_hash, tool_surface]"
knowledge_footprint:
  required_fields: "[footprint_id, scope, opened_files, evidence_refs, retained_facts, dropped_details, gaps, conclusion, resume_pointer]"
  raw_transcript_rule: "No full transcript, raw worker chatter, live thread ids, or secrets."
  resume_rule: "Each footprint includes a resume pointer."
explorer_brief_assignment:
  preset_rule: "Default read-only/scoring explorers. Do not include ownership matrix."
explorer_final_report:
  fields: "[Agent, Status, Findings, Verification, Isolation line]"
scoring_explorer_report:
  fields: "[Agent, Overall score, Confidence, Top issues, Top fixes, Validity, Verification, Isolation line]"
scoring_rollup_report:
  fields: "[Batch, Agents requested, Reports received, Reports accepted, Reports excluded, Median score, Range, Confidence, Invalid reports, Final score, Top issues, Top fixes, Verification, Isolation line]"
  aggregation_rule: "Median primary; report mean/range; exclude invalid/outliers."
report_validation:
  scoring_required: "[Agent, Overall score, Top issues, Top fixes, Validity, Isolation line]"
  score_rule: "Overall score must be numeric 0-100."
  isolation_rule: "Isolation line includes GM, GS, XR, and XW."
  project_local_skill_rule: "Project-local .agents/skills/** is not GS; only global/system SKILL.md counts as GS used."
  validity_values: "[accepted, needs-revision, rejected, excluded]"
ownership_matrix:
  required_fields: "[Agent, Runtime id, Role, Status, Ownership, Normalized owned write scope, Scope type, Conflict status, Checked against, Last checked by, Last checked at]"
  conflict_checks: "[same, containment, alias, controller-active-worker]"
employee_final_report:
  required_fields: "[assignment identity, ownership/scope, inspected/changed files, skills read, findings, verification, risks, review, next action, roster/ledger refs, GM/GS, XR/XW, completion]"
agent_status_snapshot:
  location: "%TEMP%/codex-agent-status/<project-id>/agent-status.md"
  required_fields: "[snapshot, agent/runtime, mode/role/status/task, ownership/scope, matrix status, last event, close/cleanup result, external status path]"
agent_event:
  names: "[prepare, hired, started, poll, report, completed, blocked, stopped, close, history_cleanup, integrated, reconciled]"
  rule: "Events may mark unavailable fields not applicable."
agent_ledger_event:
  location: ".agents/runtime/agent-ledger.jsonl"
  status: "repo-local ignored runtime state; not Codex official runtime DB"
  names: "[initialized, hired, started, report, completed, blocked, stopped, closed, history_cleanup, integrated, reconciled]"
  canonical_fields: "[ts, event, agent_id, mode, role, task]"
  storage_rule: "Never stage, commit, deploy, or copy .agents/runtime/**; rebuild from evidence."
controller_lease:
  location: "%TEMP%/codex-agent-status/<project-id>/controller-lease.md"
  required_fields: "[Controller id, Lease id, Lease status, Snapshot version reviewed]"
hard_isolation_evidence:
  required_fields: ["Task","Agent/controller","Requested guarantee","Forbidden resources","Authorized external paths/actions","Evidence location","Date","Classification","Control owner/config/bypass","Allowed/forbidden read/write roots","Credential/account scope","Network/cloud scope","Verifier/method/log/result","Blocked-access behavior","No forbidden-content read or authorization","Expiry/cleanup/rollback","GM/GS/XR/XW","Remaining risk"]
  rule: "Missing required evidence means behavioral-only."
runtime_multi_agent_validation:
  required_fields: ["Validation id","Date","Controller","User request","Claim scope","Runtime enforcement","Runtime id/nickname/mode/role/task","Roster/ledger paths and snapshots","Assignment/prompt requirements","Owned/shared scope and matrix status","Report receipt and id match","Expected/spawned/completed/closed counts","Missing/duplicate/invalid/wrong/failed/running/unclosed ids","Ack/parser/protocol/task boundaries","Skills and external access","Files changed","Verification","Risks","Ledger/poll/report/close/reconciled evidence","Git status and out-of-scope changes","Runtime close/list/state cleanup evidence","History cleanup authorization/targets/result/evidence","UI refresh","Pass condition","Remaining runtime risk","Controller conclusion"]
  marker_anchors: "[Expected id set, Protocol result, Roster snapshot version, Final report matched runtime id, Git status after employee work, SQLite thread state result, session_index_result, Global unread state result, Rollout residue result, Delayed cleanup verification]"
  storage_rule: "Filled records are local scratch unless promoted."
runtime_release_evidence:
  required_fields: "[schema_version, workflow_version, repo_commit, source_commit, validated_content_digest, content_digest_excluded_paths, working_tree_status_at_capture, run_started_utc, run_finished_utc, duration_ms, commands, claims, scope, xr_xw, evidence_tier]"
  command_fields: "[name, command, result, exit_code, duration_ms, retry_count, raw_output_ref, overall_score]"
  digest_rule: "Content digest excludes runtime scratch and evidence outputs; it binds validated content, not final commit hash."
  performance_rule: "Token usage is unavailable; record reason, never estimating."
  storage_rule: "Raw output stays in %TEMP%/codex-agent-status/<project-id>/<run-id>/; not tracked."
  boundary_rule: "T2 current-repo practice is not live external deployment proof, T3 external pilot, or T4 enforced isolation."
runtime_dry_run_evidence:
  required_fields: ["Evidence id","Date","Operator","Request","Claim scope","Static validation result","Target path","Dry-run command","Write mode","Expected no-write result","Output reference","Changed files","Cleanup","Result","Boundary statement","Isolation"]
  boundary_rule: "Static 100/100 validation is not runtime deployment proof."
history_cleanup_evidence:
  required_when_claimed: "[authorization, cleanup_helper, close result, parent/repo/target ids, deleted counts, state/unread/residue checks, parent preserved, reload/restart result]"
  target_filter: "parent/cwd closed child subagent runtime ids, never sidebar nicknames; delete thread_spawn_edges first"
  runtime_ids_resolved_from: "official runtime close/list evidence, not sidebar labels"
  script_result: "scripts/agents-cleanup.ps1 JSON evidence for Verify or Cleanup"
memory_entry:
  index_columns: "[ID, Date, Title, Trigger, Keywords, Summary, Entry, Verified]"
skill:
  openai_yaml:
    policy: "[allow_implicit_invocation]"
  constraints: "[folder equals skill name, default_prompt names $skill, allow_implicit_invocation present]"
