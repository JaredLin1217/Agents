schema: agents-schemas/v2
purpose: "Field labels for assignments, reports, status, evidence, memory, skills."
owns: "Compact assignment/report schemas plus runtime, recovery, evidence, memory, skill fields."
assignment:
  required_fields:
    Agent: ""
    Runtime id: ""
    Mode: "session-managed | manual-detached | cloud-or-automation"
    Runtime enforcement: "behavioral-only | tool-enforced | externally-enforced"
    Role: "explorer | worker"
    Goal: ""
    Ownership: "read-only | exclusive-writer | controller-only-integration"
    Owned write scope: ""
    Normalized owned write scope: ""
    Ownership matrix status: "clear | conflict | unknown | not applicable"
    Shared read scope: ""
    Allowed scope: ""
    Forbidden scope: ""
    Edit permission: ""
    Verification: ""
    Ledger path: ".agents/runtime/agent-ledger.jsonl"
    Completion notification: "final report on complete, blocked, or stopped"
    Boundary note: ""
enterprise_assignment:
  use_when: "enterprise_dispatch route"
  required_fields: ["assignment_id", "department", "leader_role", "objective", "authority", "owned_scope", "verification_profile", "model_tier", "report_back"]
  target_rule: "Controller targets department leader only."
department_internal_dispatch:
  owner: "department leader"
  required_fields: ["parent_assignment_id", "worker_role", "task", "scope", "authority", "model_tier", "expected_output"]
  rule: "Worker role must be allowed by org.yaml."
department_report:
  required_fields: ["assignment_id", "department", "leader_role", "worker_count", "objective_result", "integrated_summary", "files_changed", "verification", "risks", "escalations", "isolation"]
  field_types:
    worker_count: "integer >= 0"
    objective_result: "completed|partial|blocked|stopped"
    files_changed: "array"
    risks: "array"
    escalations: "array"
  target_rule: "Department leader reports one integrated result to controller."
  alias_rule: "Use objective_result, not result."
model_tier:
  required_fields: ["tier", "capability", "risk_limit", "replaceable_model_mapping"]
  rule: "Use tier references from model-policy.yaml; model ids are replaceable."
escalation_record:
  required_fields: ["escalation_id", "assignment_id", "department", "reporter_role", "reason", "requested_decision", "evidence", "risk_level", "model_tier_used", "minimum_required_tier"]
  rule: "Direct worker-to-controller report requires escalation_record."
workflow_instance:
  use_when: "workflow_artifact route."
  required_fields: ["workflow_id", "status", "controller", "created_at", "route", "storage_root", "plan_path", "packet_root", "result_root", "final_report_path"]
  status_values: ["drafted", "approved", "active", "waiting_approval", "collecting", "completed", "blocked", "stopped"]
  storage_rule: "Live artifacts stay local under .agents/runtime/workflows/<workflow_id>/ or .workflow/<workflow_id>/ alias."
workflow_state:
  required_fields: ["workflow_id", "status", "updated_at", "approval_state", "risk_level", "active_departments", "open_escalations"]
  status_rule: "Status must be one of workflow_instance.status_values."
workflow_packet:
  required_fields: ["packet_id", "workflow_id", "type", "owner", "target", "authority", "scope", "model_tier", "expected_output"]
  packet_types: ["department_leader_assignment", "worker_packet", "verification_packet", "escalation_packet"]
  routing_rule: "Controller assignments target department leaders; worker-to-controller packets require escalation_packet."
workflow_result:
  required_fields: ["result_id", "workflow_id", "owner", "target", "status", "summary", "verification", "risks", "escalations"]
  forbidden_fields: ["raw_worker_chatter"]
  integration_rule: "Controller integrates department reports, collection reports, or escalation records only."
workflow_approval_gate:
  required_fields: ["gate_id", "workflow_id", "action", "requested_by", "decision", "authority", "evidence", "expires_at"]
  gated_actions: ["write", "deploy", "external_read", "external_write", "destructive_action", "model_tier_upgrade"]
  rule: "Gated actions require approval gate before action or escalation_record before refusal."
workflow_collection_report:
  required_fields: ["workflow_id", "packet_count", "result_count", "department_reports", "verification", "risks", "escalations", "final_report_path"]
  rule: "Collect normalizes packets/results and excludes raw worker chatter."
workflow_security_check:
  required_fields: ["workflow_id", "path_scope", "blocked_path_result", "approval_gate_result", "model_tier_result", "runtime_local_result"]
  path_rule: "Block outside repo, .git, .codex, .agents/runtime/workflows without workflow authority, and .workflow without import authority."
explorer_brief_assignment:
  use_when: "session-managed read-only explorer with no edits and no recovery requirement"
  fields: ["Agent", "Mode", "Role=explorer", "Goal", "Read scope", "Forbidden scope", "Edit permission=none", "Verification", "Final report requirements", "Isolation requirements"]
  preset_rule: "Default for read-only/scoring explorers. Do not include ownership matrix, roster, runtime evidence, or worker-only fields unless recovery, ownership, or writes apply."
explorer_final_report:
  fields: ["Agent", "Status", "Task", "Files inspected", "Findings", "Risks", "Verification", "Next action", "Isolation line"]
  rule: "Use full employee_final_report for workers, detached/cloud agents, long-running explorers, or recovery-sensitive work."
scoring_explorer_report:
  use_when: "read-only scoring or review batches"
  fields: ["Agent", "Overall score", "Confidence", "Top issues", "Top fixes", "Cap suggestion", "Validity", "Verification", "Isolation line"]
  optional_fields: ["Subscores", "Evidence quality", "Uncertainty reason", "Duplicate of"]
  rule: "Keep scoring reports to score, up to 3 issues/fixes, one cap/risk note, and isolation unless assigned otherwise."
scoring_rollup_report:
  use_when: "controller aggregates scoring_explorer_report batches"
  fields: ["Batch", "Agents requested", "Reports received", "Reports accepted", "Reports excluded", "Raw scores", "Mean score", "Median score", "Range", "Confidence", "Invalid reports", "Final score", "Top issues", "Top fixes", "Dissent", "Cap applied", "Verification", "Isolation line"]
  aggregation_rule: "Use median first, also report mean/range; exclude only invalid reports or stated outliers; repeated findings raise confidence instead of duplicating output."
report_validation:
  scoring_required: ["Agent", "Overall score", "Top issues", "Top fixes", "Validity", "Isolation line"]
  score_rule: "Overall score must be numeric 0-100."
  isolation_rule: "Isolation line must include GM, GS, XR, and XW values; XR/XW may be none or exact path list."
  project_local_skill_rule: "Project-local .agents/skills/** is not GS; only global/system SKILL.md counts as GS used."
  validity_values: ["accepted", "needs-revision", "rejected", "excluded"]
  invalid_when: ["missing/non-numeric score", "missing isolation", "forbidden read/write", "unsupported runtime or hard-isolation claim", "project-local skill reported as GS without global/system skill evidence"]
  report_hash_fields: ["Agent", "Runtime id", "Task", "Status", "Overall score", "Top issues", "Top fixes", "Validity"]
ownership_matrix:
  use_when: "worker exists, two employees are active, or controller edits near employee scope"
  required_fields: ["Agent", "Runtime id", "Role", "Status", "Ownership", "Normalized owned write scope", "Scope type", "Conflict status", "Checked against", "Last checked by", "Last checked at"]
  conflict_statuses: ["clear", "conflict", "unknown"]
  conflict_checks: ["same scope", "containment", "case/separator alias", "controller edits active worker scope"]
employee_final_report:
  statuses: ["completed", "blocked", "stopped"]
  required_fields: ["Agent", "Mode", "Runtime id", "Runtime enforcement", "Role", "Status", "Task", "Ownership", "Owned write scope", "Normalized owned write scope", "Ownership conflict status", "Shared read scope", "Allowed scope", "Forbidden scope", "Files inspected", "Files changed", "Project-local skills read", "Findings", "Verification", "Risks", "Needs review", "Recommended next action", "Boundary note", "Roster path", "Ledger path", "Roster snapshot version", "Ownership matrix status", "Global Memory", "Global Skill", "Project-external reads", "Project-external writes", "Completion notification"]
agent_status_snapshot:
  location: "%TEMP%/codex-agent-status/<project-id>/agent-status.md"
  statuses: ["prepared", "active", "completed", "blocked", "stopped", "needs-review", "closed", "unknown"]
  required_fields: ["Snapshot version", "Agent", "Runtime id", "Mode", "Role", "Status", "Task", "Ownership", "Owned write scope", "Normalized owned write scope", "Ownership matrix status", "Last known event", "Runtime close result", "History cleanup result", "Project-external status path"]
  explorer_queue_fields: ["Agent", "Runtime id", "Task", "Read scope", "Status", "Needs review", "Next action", "Report hash"]
  history_cleanup_values: ["not requested", "not applicable", "authorized", "completed", "failed"]
agent_event:
  names: ["prepare", "hired", "started", "poll", "report", "completed", "blocked", "stopped", "close", "history_cleanup", "integrated", "reconciled"]
  explorer_event_fields: ["Agent", "Runtime id", "Event", "Status", "Summary", "Next action", "Report hash", "Duplicate count"]
  ownership_event_fields: ["Normalized owned write scope", "Ownership matrix status", "Checked against"]
  close_event_fields: ["Runtime close result", "Closed at", "History cleanup result", "Desktop UI refresh result", "Roster snapshot version"]
  rule: "Report events preserve only fields relevant to the event; unavailable final-report fields may be not applicable."
agent_ledger_event:
  location: ".agents/runtime/agent-ledger.jsonl"
  format: "JSONL; one JSON object per event"
  status: "repo-local ignored runtime state; advisory, not Codex official runtime DB"
  names: ["initialized", "hired", "started", "report", "completed", "blocked", "stopped", "closed", "history_cleanup", "integrated", "reconciled"]
  canonical_fields: ["ts", "event", "agent_id", "mode", "role", "task"]
  optional_fields: ["status", "nickname", "read_scope", "write_scope", "ledger_version", "report_hash", "controller_id", "source", "official_list_result", "history_cleanup_target_ids", "history_cleanup_result", "desktop_ui_refresh_result", "notes", "isolation"]
  compatibility_aliases: ["time -> ts", "runtime_id -> agent_id", "agent -> agent_id", "controller -> controller_id", "scope -> read_scope"]
  canonical_write_rule: "New controller-written events should use canonical_fields; readers may normalize compatibility_aliases for older local runtime ledgers."
  write_rule: "Controller appends by default; employees append only when assigned exact ledger path and append permission."
  storage_rule: "Never stage, commit, deploy, or copy .agents/runtime/**; ledger may be cleared and rebuilt from runtime evidence."
controller_lease:
  location: "%TEMP%/codex-agent-status/<project-id>/controller-lease.md"
  statuses: ["active", "released", "expired", "takeover-claimed", "unknown"]
  required_fields: ["Controller id", "Lease id", "Lease status", "Acquired at", "Last heartbeat", "Expires at", "Current task", "Snapshot version reviewed", "Released at", "Takeover reason"]
hard_isolation_evidence:
  classifications: ["behavioral-only", "tool-enforced", "externally-enforced"]
  required_fields:
    - "Task"
    - "Agent or controller"
    - "Requested guarantee"
    - "Forbidden paths or resources"
    - "User-approved external paths or actions"
    - "Evidence record location"
    - "Date"
    - "Classification"
    - "Control type"
    - "Control owner"
    - "Configuration source"
    - "Who can change or bypass the control"
    - "Allowed read roots"
    - "Allowed write roots"
    - "Forbidden read roots"
    - "Forbidden write roots"
    - "Credential or account scope"
    - "Network or cloud scope"
    - "Verifier"
    - "Verification command, UI state, or log"
    - "Result"
    - "Observed blocked-access behavior"
    - "Verification avoided reading forbidden content"
    - "If no, exact user authorization"
    - "Expiry, cleanup, or rollback step"
    - "System/global resources"
    - "Global Memory"
    - "Global Skill"
    - "Project-external reads"
    - "Project-external writes"
    - "Remaining risk"
  rule: "Missing required evidence means behavioral-only."
runtime_multi_agent_validation:
  required_fields:
    - "Validation id"
    - "Date"
    - "Controller"
    - "User request"
    - "Claim scope"
    - "Runtime enforcement"
    - "Real employee runtime or authorized manual-detached evidence"
    - "Runtime id"
    - "Nickname"
    - "Mode"
    - "Expected blocking behavior"
    - "Sidebar or user-control behavior"
    - "Role"
    - "Task"
    - "Roster required"
    - "Roster path"
    - "Roster snapshot version"
    - "Roster fields reviewed"
    - "Ledger required"
    - "Ledger path"
    - "Ledger event ids reviewed"
    - "Controller lease id"
    - "Controller lease status"
    - "Assignment path or prompt"
    - "Ledger requirement included"
    - "Ledger write permission included"
    - "Roster requirement included"
    - "Roster write permission included"
    - "Status-event rule included"
    - "Final report schema included"
    - "Owned write scope"
    - "Normalized owned write scope"
    - "Shared read scope"
    - "Ownership matrix status"
    - "Final report received"
    - "Final report matched runtime id"
    - "Required fields present"
    - "Expected id set"
    - "Requested count"
    - "Spawned count"
    - "Completed count"
    - "Closed count"
    - "Received ids"
    - "Missing ids"
    - "Duplicate ids"
    - "Invalid-format ids"
    - "Wrong ids"
    - "Failed ids"
    - "Running ids"
    - "Unclosed ids"
    - "Ack schema"
    - "Parser normalization"
    - "Protocol result"
    - "Task result boundary"
    - "Project-local skills read"
    - "System/global resources"
    - "Global Memory"
    - "Global Skill"
    - "Project-external reads"
    - "Project-external writes"
    - "Files changed"
    - "Verification"
    - "Risks"
    - "Ledger event"
    - "Poll event"
    - "Report event"
    - "Close event"
    - "Reconciled event"
    - "Matching snapshot version"
    - "Git status after employee work"
    - "Out-of-scope changes"
    - "Runtime close attempted"
    - "Runtime close result"
    - "Official list result"
    - "SQLite thread state result"
    - "Global unread state result"
    - "Rollout residue result"
    - "Delayed cleanup verification"
    - "History cleanup requested"
    - "History cleanup authorization"
    - "History cleanup target ids"
    - "History cleanup sources"
    - "History cleanup result"
    - "History cleanup evidence"
    - "Desktop UI refresh result"
    - "Pass condition met"
    - "Remaining runtime risk"
    - "Controller conclusion"
  storage_rule: "Filled records are local scratch unless sanitized and promoted."
history_cleanup_evidence:
  required_when_claimed: ["authorization", "no_backup_authorization", "official_close_result", "parent_thread_id", "repo_cwd", "target_ids", "target_counts", "deleted_counts", "sqlite_thread_state_result", "global_unread_state_result", "rollout_residue_result", "parent_preserved", "delayed_zero_residue", "desktop_reload_or_restart_result"]
  target_filter: "parent/cwd closed child subagent ids; delete thread_spawn_edges before threads"
  no_backup_rule: "No backup; abort without exact inactive ids, scope, delay zero."
  forbidden_targets: ["parent/controller/user threads", "unrelated cwd", "unrelated subagents", "ledger-only ids", "non-subagent rollouts", "backup/copy DB files"]
memory_entry:
  draft_fields: ["Trigger", "Context", "Cause", "Fix / Rule", "Verification", "Reuse when"]
  index_columns: ["ID", "Date", "Title", "Trigger", "Keywords", "Summary", "Entry", "Verified"]
skill:
  SKILL_md_frontmatter: ["name", "description"]
  openai_yaml:
    interface: ["display_name", "short_description", "default_prompt"]
    policy: ["allow_implicit_invocation"]
  constraints: ["folder name equals skill name", "default_prompt names $skill", "short_description 25-64 chars", "allow_implicit_invocation present"]
