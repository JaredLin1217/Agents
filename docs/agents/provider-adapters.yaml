schema: agents-provider-adapters/v1
purpose: "Provider capability and model tier mapping without binding workflows to one model id."
tier_source: "docs/agents/model-policy.yaml"
adapter_policy:
  bind_to_tier: true
  bind_to_single_model_id: false
  missing_provider: "escalate"
capability_fields:
  required:
    - "provider"
    - "model_id"
    - "tier"
    - "capabilities"
    - "limits"
    - "status"
tiers:
  required:
    - "low_fast"
    - "quick_code"
    - "code_standard"
    - "senior_review"
    - "principal"
authority:
  high_risk:
    minimum_tier: "senior_review"
    reviewer_tier: "principal"
  unknown_model:
    action: "block_or_escalate"
provider_session:
  storage: "runtime-local only"
  forbidden_in_tracked_files: true
  forbidden_in_release_package: true
rules:
  - "Departments request model tiers, not fixed model ids."
  - "Adapters may substitute equivalent models inside the same tier."
  - "Tier downgrade for write, deploy, security, or architecture work requires escalation."
validation:
  profile: "provider_adapters"
