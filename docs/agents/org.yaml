schema: agents-org/v2
purpose: "Enterprise department map for optional two-layer dispatch."
owns: "Departments, leader roles, worker role boundaries, reporting, and responsibility anchors."
departments:
  executive_office:
    name: "Executive Office"
    leader_role: executive_lead
    allowed_worker_roles: "program_director, integration_reviewer"
    report_target: controller
    default_responsibility: "Own intent, priority, acceptance, and final integration."
  pmo:
    name: "PMO"
    leader_role: pmo_lead
    allowed_worker_roles: "planner, coordinator, dependency_tracker"
    report_target: controller
    default_responsibility: "Plan assignments, milestones, dependencies, and risk registers."
  architecture:
    name: "Architecture"
    leader_role: architecture_lead
    allowed_worker_roles: "system_architect, interface_reviewer, migration_planner"
    report_target: controller
    default_responsibility: "Own structure, compatibility, boundaries, and long-term design fit."
  engineering:
    name: "Engineering"
    leader_role: engineering_lead
    allowed_worker_roles: "implementation_worker, code_reviewer, refactor_worker"
    report_target: controller
    default_responsibility: "Implement scoped code and policy changes inside owned boundaries."
  devops:
    name: "DevOps"
    leader_role: devops_lead
    allowed_worker_roles: "deployment_worker, release_operator, ci_reviewer"
    report_target: controller
    default_responsibility: "Own deployment, CI, release package, and environment-safe operations."
  qa:
    name: "QA"
    leader_role: qa_lead
    allowed_worker_roles: "test_runner, acceptance_reviewer, regression_checker"
    report_target: controller
    default_responsibility: "Own verification profiles, acceptance checks, and regression evidence."
  security:
    name: "Security"
    leader_role: security_lead
    allowed_worker_roles: "boundary_auditor, secrets_reviewer, permission_reviewer"
    report_target: controller
    default_responsibility: "Own isolation, external access, secrets, and destructive-action risk review."
  documentation:
    name: "Documentation"
    leader_role: documentation_lead
    allowed_worker_roles: "technical_writer, changelog_writer, template_reviewer"
    report_target: controller
    default_responsibility: "Own public docs, templates, changelog, and English-only durable prose."
  provider_management:
    name: "Provider Management"
    leader_role: provider_management_lead
    allowed_worker_roles: "model_router, provider_reviewer, capability_tracker"
    report_target: controller
    default_responsibility: "Own model-tier mapping, provider fit, and future model replacement guidance."
leader_registry:
  executive_lead:
    department: executive_office
    default_model_tier: principal
  pmo_lead:
    department: pmo
    default_model_tier: senior_review
  architecture_lead:
    department: architecture
    default_model_tier: principal
  engineering_lead:
    department: engineering
    default_model_tier: code_standard
  devops_lead:
    department: devops
    default_model_tier: senior_review
  qa_lead:
    department: qa
    default_model_tier: code_standard
  security_lead:
    department: security
    default_model_tier: principal
  documentation_lead:
    department: documentation
    default_model_tier: low_fast
  provider_management_lead:
    department: provider_management
    default_model_tier: senior_review
reporting:
  controller: "Repo controller/mainline"
  controller_rule: "Controller assigns work to department leaders only."
  leader_rule: "Department leaders may split internal worker tasks and must return one department report."
  worker_rule: "Workers report to their department leader unless escalation is required."
collaborator_windows:
  allowed_type: department_leader_window
  attachment_rule: "Only leader_registry roles may be exposed as collaborator windows by default."
  worker_window_rule: "Worker windows require explicit override and escalation_record evidence."
  runtime_rule: "Live Codex thread ids and window state are runtime-local, not deployable organization data."
validation:
  department_required_fields: "Each department requires leader_role, allowed_worker_roles, report_target, and default_responsibility."
  leader_reference_rule: "Every department leader_role must exist in leader_registry."
  model_binding_rule: "Every department id must exist in docs/agents/model-policy.yaml department_bindings."
