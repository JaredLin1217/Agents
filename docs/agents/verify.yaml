schema: agents-verify/v2
purpose: "Compact verification profiles and release gates."
owns: "Profile selection, file-class gates, normal checkpoints, release appendices, and evidence requirements."

principle: "Default to the smallest check set that proves the current claim."
scope_rule: "Run commands only on existing repo paths unless the user authorizes an exact external path/action."
stale_literal_rule: "Do not keep resolved one-off literal searches as routine gates."
batch_rule: "For checkpoint gates, batch related checks into one shell invocation when practical; do not split many tiny checks into separate slow steps."

profile_selection:
  order:
    - "answer-only/no current-state claim -> fast_turn with no command."
    - "assigned read-only explorer audit -> read_only_audit; obey assignment command limits."
    - "repo/deploy/git/runtime state claim such as now/current/latest/clean/dirty/online/committed/pushed/tagged/deployed/active/completed -> inspect only required state source."
    - "ordinary scoped edit -> fast_turn."
    - "Agents rule/template/runbook/skill/memory-doc edit -> policy_pack_edit."
    - "commit/tag/ordinary branch push checkpoint -> commit_tag_checkpoint plus push result when applicable."
    - "deploy/release/protected push/broad audit/no-deduction -> release_deploy_push_audit."
    - "runtime multi-agent behavior claim -> runtime_multi_agent plus current runtime evidence."
    - "hard isolation claim -> hard_isolation plus current enforcement evidence."
  mixed_claim_rule: "Use the highest-risk matching profile for the claim being made; do not upgrade unrelated facts."
  if_unclear: "State the narrower claim instead of running a broad audit by default."
  task_class_note: "Task class names come from policy.yaml/workflows.yaml; verification profile names may differ when a profile is shared by multiple classes."

file_classes:
  root_rules: ["AGENTS.md"]
  project_skill: [".agents/skills/**/SKILL.md", ".agents/skills/**/agents/openai.yaml"]
  canonical_yaml: ["docs/agents/*.yaml"]
  runbooks: ["docs/runbooks/*.md"]
  deploy_templates: ["docs/templates/agents/**"]
  memory_docs: ["docs/project-memory.md", "docs/memory/**", "docs/memory-entry.template.md"]
  runtime_local: [".agents/runtime/**", ".codex/environments/environment.toml", "docs/agent-status.md", "docs/agent-events/**", "docs/runtime-multi-agent-validation/**", "docs/hard-isolation-evidence/**"]
  generated_or_cache: ["generated output", "cache", "build output", "vendor"]

gate_matrix:
  durable_prose_changed: ["changed English-only", "changed placeholder check"]
  exact_pair_member_changed: ["changed exact-pair check only"]
  deploy_template_changed: ["task-specific source-pollution check"]
  deploy_manifest_changed: ["deploy manifest/source/blocklist checks when making deploy-clean claim"]
  schema_changed: ["schema field coverage only for release/deploy/broad audit or schema-coverage claim"]
  skill_metadata_changed: ["skill metadata check only for project skill metadata changes"]
  runtime_local_changed: ["must stay ignored/local unless explicitly targeted"]
  code_or_behavior_changed: ["closest focused test/lint/build when repo provides one"]
  claim_upgrade: ["runtime evidence only for runtime claim", "hard-isolation evidence only for hard-isolation claim", "release audit only for release/deploy/protected-push/no-deduction/full-audit claim"]

commands:
  status_full: "git status -sb --ignored --untracked-files=all"
  status_plain: "git status -sb"
  status_scoped: "git status -sb -- <paths>"
  diff_check: "git diff --check"
  changed_manifest: "git diff --name-only plus git diff --cached --name-only, de-duplicated"
  checkpoint_bundle: "one shell invocation: status, diff_check, changed_manifest, changed-file English/placeholder when prose changed, changed-file line endings, changed exact pairs, optional size gates, no staged runtime/local files"
  changed_english: 'rg -n "[\p{Han}]" <changed durable rule/template files>'
  changed_placeholders: 'rg -n "TO[D]O|\[TO[D]O\]|T[B]D|FI[X]ME" <changed durable rule/template files>'
  line_endings: "git ls-files --eol <changed files>"
  ignored_runtime: "git check-ignore -v .agents/runtime/agent-ledger.jsonl docs/agent-status.md docs/agent-events/ docs/tmp-approval-example/report.md docs/hard-isolation-evidence/example.md docs/runtime-multi-agent-validation/example.md .codex/environments/environment.toml"
  deploy_steps_top_level: 'rg -n "^steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_steps_not_nested: 'rg -n "^  steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_sources_exist: "Every deployable_by_mode from path exists; mode_composition names existing groups."
  deploy_manifest_unique: "deployable_by_mode from paths unique per group; non-append to paths unique."
  deploy_blocklist_required_paths: "do_not_deploy includes local runtime, scratch, Codex runtime, and .git paths."
  template_pollution_rule: "Search deployable templates for concrete source/target literals relevant to the task."
  deployed_file_set_status: "git status -sb -- <deployed_file_set>"
  deployed_file_set_diff_check: "git diff --check -- <deployed_file_set>"
  powershell_rg_glob_rule: "In PowerShell, place rg options before --, then pattern and paths: rg -n --fixed-strings --glob '!path/**' -- <pattern> <paths>."
  deployed_file_set_literal_scan: "Search only deployed_file_set for source literals; do not scan target-owned legacy memory/import/status docs unless making a full target audit claim."

profiles:
  read_only_audit:
    use: "assigned read-only explorer audit, scoring, or review with no edits"
    do:
      - "read assigned paths only; scoped file-read commands inside that scope are allowed"
      - "do not run git status, verification, or unassigned state commands unless assignment allows them"
      - "report files inspected, findings, and isolation"
    skip:
      - "repo status"
      - "verification commands"
      - "unassigned canonical files"
  fast_turn:
    use: "answer-only, scoped edits, ordinary closeout"
    do:
      - "answer-only/no current-state claim: no command"
      - "edits: status before edit, read target, scoped diff, closest scoped verification if behavior changed"
      - "current-state claim: inspect only the named state, such as git status, active runtime ids, or the exact target path"
  policy_pack_edit:
    use: "AGENTS.md, .agents, docs/agents, docs/runbooks, docs/templates/agents, memory templates, deploy rules changed"
    do:
      - "status before edit"
      - "target files read"
      - "scoped diff review"
      - "changed exact-pair checks only"
      - "changed durable prose English-only when prose was added"
      - "size gates only when AGENTS.md, project SKILL.md, or tracked-size budget changed materially"
      - "template pollution only when changed deployable templates and relevant literals exist"
      - "classification examples only when task routing changed"
    skip:
      - "full repo scans"
      - "full template coverage"
      - "deploy manifest checks"
      - "schema field coverage"
  commit_tag_checkpoint:
    use: "ordinary commit/tag/version/branch-push checkpoint without deploy, release, no-deduction, broad audit, runtime, or hard-isolation claim"
    target_time: "one batched short validation pass; avoid full repo scans unless the changed scope requires them"
    do:
      - "status_full"
      - "diff_check"
      - "compute changed_manifest once and reuse it"
      - "changed exact-pair checks only"
      - "changed durable prose English-only and placeholder checks only when prose/templates changed"
      - "line-ending readiness for changed/staged files"
      - "size gates only when AGENTS.md, project SKILL.md, or tracked-size budget changed materially"
      - "confirm ignored runtime/local files are not staged"
    skip:
      - "full repo English-only and placeholder scans"
      - "full template coverage"
      - "deploy manifest checks"
      - "schema field coverage"
      - "skill metadata checks unless skill metadata changed"
      - "template pollution unless deployable templates changed with relevant source/target literals"
  release_deploy_push_audit:
    use: "release, deploy, protected/main push, broad audit, no-deduction claim, or explicit full verification"
    do:
      baseline: ["status_full", "diff_check", "English-only/placeholder gates on applicable paths", "line-ending readiness", "ignored_runtime"]
      deployment_integrity: ["deploy steps/source/uniqueness/blocklist gates", "task-specific template pollution checks"]
      template_integrity: ["exact-pair drift checks", "template bundle coverage"]
      schema_skill_integrity: ["schema field coverage", "skill metadata checks"]
      size: ["size gates including prospective tracked size"]
      claim_specific: ["release_appendix provider checks when provider/deployable-template claim is made", "runtime_multi_agent only when claimed", "hard_isolation only when claimed"]
  runtime_multi_agent:
    use: "claiming runtime multi-agent behavior"
    do: "current real employee evidence satisfies live_employee_validation; static docs alone can only claim behavioral readiness"
  hard_isolation:
    use: "claiming tool/external isolation"
    do: "current hard-isolation evidence proves enforcement; otherwise say behavioral-only"

size_gates:
  unit: "bytes; 1 KiB = 1024 bytes"
  targets:
    AGENTS.md: 10240
    project_skill: 10240
    tracked_repo_kib: 256
  tracked_rule: "Ignored/untracked files do not count; intended new files count before commit."

claim_scopes:
  static_policy_pack: "Only after relevant profile gates pass; does not prove runtime behavior or hard isolation."
  runtime_multi_agent: "Only after live employee evidence passes."
  hard_isolation: "Only after current tool/external enforcement evidence passes; otherwise behavioral-only."
  deploy_clean: "Only after deploy.yaml source-neutral/template/blocklist checks for the affected mode."
  no_repo_pollution: "Only after status and ignored/local-runtime checks cover the affected files."

minimum_evidence:
  static_policy_pack: ["changed files read", "scoped diff reviewed", "applicable profile gates passed"]
  branch_push: ["checkpoint gates", "current branch/remote", "push result"]
  deploy_clean: ["target authorization", "target inspected", "target layout selected", "deployed_file_set recorded", "blocklist/source-neutral checks on deployed_file_set"]
  runtime_multi_agent: ["real runtime id", "assignment/report match", "git status after employee work"]
  hard_isolation: ["current tool/runtime/OS/account/cloud enforcement evidence"]

no_deduction_audit:
  rule: "Claim no-deduction only with release_deploy_push_audit-level proof plus applicable runtime/hard-isolation evidence."
  always:
    - "Current repo state inspected."
    - "Changed files/diffs reviewed."
    - "External access none or exact-path authorized and reported."
    - "Global Memory/Global Skill not used or justified and reported."
    - "Templates source-neutral."
    - "Deployment checks use deployed_file_set; target legacy docs are separated from deployed changes."
    - "Runtime/local scratch artifacts not staged unless targeted."
    - "Claim scope stated."
  when_applicable:
    - "Workers have non-overlapping normalized ownership."
    - "Ledger/roster/event evidence exists for compact-risk or concurrent employees."
    - "History cleanup is separate from runtime close and covered by explicit cleanup wording or exact authorization, with target runtime ids, state/history/cache paths touched, official list result when available, and Desktop UI refresh result when sidebar residue was observed."
    - "Hard-isolation verification avoids forbidden reads unless exact-authorized."

coverage_gates:
  slim_policy_pack:
    - "AGENTS.md and project SKILL support no-command answer-only fast path."
    - "policy/workflows/verify define compact profiles and claim boundaries."
    - "deploy rules keep source state out of target repos."
    - "schemas/templates preserve assignment, report, ledger, status, lease, runtime validation, memory, and skill fields."
    - "task closeout permits compact no-change answers."

live_employee_validation:
  required:
    - "explicit user hire/spawn/delegation/parallel-agent request"
    - "runtime id/nickname/mode/role/task"
    - "ledger or roster path/version/permissions when required"
    - "assignment includes ledger/roster, status-event, final-report, and ownership fields"
    - "final report matches runtime id and required fields"
    - "ledger or poll/report/close/reconciled evidence has matching snapshot version"
    - "git status proves no out-of-scope changes"
    - "history cleanup authorization is recorded as none/not requested unless covered by explicit cleanup wording or exact authorization, with target ids, touched state/history/cache paths, official list result when available, cleanup result, and Desktop UI refresh result when sidebar residue was observed"

drift_checks:
  exact_pairs:
    - ["docs/agent-assignment.template.md", "docs/templates/agents/agent-assignment.template.md"]
    - ["docs/agent-status.template.md", "docs/templates/agents/agent-status.template.md"]
    - ["docs/agent-event.template.md", "docs/templates/agents/agent-event.template.md"]
    - ["docs/controller-lease.template.md", "docs/templates/agents/controller-lease.template.md"]
    - ["docs/hard-isolation-evidence.template.md", "docs/templates/agents/hard-isolation-evidence.template.md"]
    - ["docs/runtime-multi-agent-validation.template.md", "docs/templates/agents/runtime-multi-agent-validation.template.md"]
    - ["docs/memory-entry.template.md", "docs/templates/agents/memory-entry.template.md"]
    - ["docs/memory/entries/README.md", "docs/templates/agents/memory-entries-README.md"]
    - [".agents/skills/project-isolation-workflow/agents/openai.yaml", "docs/templates/agents/skills/project-isolation-workflow/agents/openai.yaml"]
    - ["AGENTS.md", "docs/templates/agents/AGENTS.md"]
    - [".agents/skills/project-isolation-workflow/SKILL.md", "docs/templates/agents/skills/project-isolation-workflow/SKILL.md"]
    - ["docs/agents/policy.yaml", "docs/templates/agents/agents/policy.yaml"]
    - ["docs/agents/workflows.yaml", "docs/templates/agents/agents/workflows.yaml"]
    - ["docs/agents/schemas.yaml", "docs/templates/agents/agents/schemas.yaml"]
    - ["docs/agents/deploy.yaml", "docs/templates/agents/agents/deploy.yaml"]
    - ["docs/agents/verify.yaml", "docs/templates/agents/agents/verify.yaml"]
    - ["docs/runbooks/agents-deployment.md", "docs/templates/agents/agents-deployment.md"]
    - ["docs/runbooks/isolation-audit.md", "docs/templates/agents/isolation-audit.md"]
    - ["docs/runbooks/multi-agent-workflow.md", "docs/templates/agents/multi-agent-workflow.md"]
    - ["docs/runbooks/repository-maintenance.md", "docs/templates/agents/repository-maintenance.md"]
    - ["docs/runbooks/session-handoff.md", "docs/templates/agents/session-handoff.md"]
    - ["docs/runbooks/skill-authoring.md", "docs/templates/agents/skill-authoring.md"]
    - ["docs/runbooks/task-closeout.md", "docs/templates/agents/task-closeout.md"]
  template_specific_cleanliness_files:
    - "docs/templates/agents/README.md"
    - "docs/templates/agents/gitignore.fragment"
    - "docs/templates/agents/project-memory.md"
    - "docs/templates/agents/project-structure.md"
    - "docs/templates/agents/memory-index.md"
release_appendix:
  provider_repo_checks:
    - "Every tracked/intended docs/templates/agents file is in exact_pairs or template_specific_cleanliness_files."
    - "Template memory starter has no data rows or provider project names."
    - "Schema field coverage matches templates."
    - "Project skill metadata has required fields and valid default_prompt."
  source_neutral_scan_literals:
    - "provider repo name or path"
    - "concrete usernames"
    - "remotes, branches, commits, tags, or push status"
    - "filled status rows or validation results"
    - "non-placeholder memory rows"
