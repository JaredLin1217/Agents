schema: agents-verify/v2
purpose: "Compact verification profiles and release gates."
owns: "Profile selection, file classes, checkpoints, evidence."
principle: "Smallest check set proves claim."
scope_rule: "Use repo paths unless external path/action authorized."
stale_literal_rule: "Do not keep one-off literal searches as routine gates."
batch_rule: "Batch checkpoint checks when practical."
profile_selection:
  order: ["answer","read-only","state/edit/git/deploy","policy pack","core system","foundation creation","runtime execution","provider_adapter","route pack","knowledge footprint","enterprise","artifact","compact","collaborator","commit/tag/push","deploy/release/protected","runtime/batch","hard isolation"]
  mixed_claim_rule: "Use highest-risk profile; do not upgrade unrelated facts."
  if_unclear: "State narrow claim."
file_classes:
  root_rules: ["AGENTS.md"]
  project_skill: [".agents/skills/**/SKILL.md",".agents/skills/**/agents/openai.yaml"]
  canonical_yaml: ["docs/agents/*.yaml"]
  enterprise_dispatch_canonical: ["docs/agents/org.yaml","docs/agents/model-policy.yaml","docs/agents/dispatch.yaml"]
  workflow_artifact_canonical: ["docs/agents/workflow-artifacts.yaml"]
  context_compact_canonical: ["docs/agents/context-compact.yaml"]
  collaborator_window_canonical: ["docs/agents/collaborators.yaml"]
  core_system_canonical: ["docs/agents/core-system.yaml"]
  foundation_creation_canonical: ["docs/agents/openai-foundations.yaml"]
  runtime_execution_canonical: ["docs/agents/runtime-execution.yaml"]
  provider_adapter_canonical: ["docs/agents/provider-adapters.yaml"]
  route_pack_canonical: ["docs/agents/route-packs.yaml"]
  knowledge_footprint_canonical: ["docs/agents/knowledge-footprint.yaml"]
  runbooks: ["docs/runbooks/*.md"]
  deploy_templates: ["docs/templates/agents/**"]
  memory_docs: ["docs/project-memory.md","docs/memory/**","docs/memory-entry.template.md"]
  runtime_local: [".agents/runtime/**",".agents/runtime/workflows/**",".workflow/**",".codex/**","{docs,.agents/docs}/{agent-status.md,agent-events/**,tmp-approval-*/**,runtime-multi-agent-validation/**,hard-isolation-evidence/**}"]
  generated_or_cache: ["generated","cache","build","vendor"]
gate_matrix:
  durable_prose_changed: ["English-only","placeholder"]
  exact_pair_member_changed: ["exact-pair"]
  deploy_template_changed: ["source-pollution"]
  deploy_manifest_changed: ["manifest/source/blocklist"]
  schema_changed: ["schema coverage only for broad/release/schema claim"]
  runtime_local_changed: ["ignored/local unless targeted"]
  code_or_behavior_changed: ["focused test/lint/build when available"]
  claim_upgrade: ["runtime evidence","batch reconciliation","hard-isolation evidence","release audit"]
commands:
  status_full: "git status -sb --ignored --untracked-files=all"
  status_plain: "git status -sb"
  status_scoped: "git status -sb -- <paths>"
  diff_check: "git diff --check"
  changed_manifest: "unstaged + staged changed paths"
  checkpoint_bundle: "status, diff_check, manifest, pair/prose/EOL/size, no staged runtime"
  full_audit_bundle: ".\\scripts\\validate.ps1 -Full"
  ai_runtime_compact: "ai-runtime/mirror <=4096; expand_only routes."
  enterprise_dispatch_integrity: "validate.ps1: department leader references, model tier references, escalation."
  workflow_artifact_integrity: "validate.ps1: workflow-artifacts route, approval gates, L1-6 simulations."
  context_compact_integrity: "validate.ps1: context-compact route, raw transcript, runtime event boundary."
  collaborator_window_integrity: "validate.ps1: collaborator route/schema/mirror, leader/tier map, runtime ids, close/archive evidence."
  core_system_integrity: "validate.ps1: core contract, blocklist, version."
  foundation_creation_integrity: "validate-foundation.ps1: official docs first, structured outputs, state owner, latency controls, evaluation gate."
  runtime_execution_integrity: "validate.ps1: approvals, tool evidence, results, cleanup."
  provider_adapter_integrity: "validate.ps1: tiers, capabilities, no hard-bound workflow model id."
  route_pack_integrity: "validate.ps1: deterministic manifest hash, compact set, cache keys."
  knowledge_footprint_integrity: "validate.ps1: resume pointer, evidence refs, gaps, no full transcript."
  legacy_residue_scan: "Reject retired compatibility positioning, removed external connector files, and stale helper version literals."
  release_package_export: ".\\scripts\\export-release-package.ps1 -Quiet"
  runtime_release_evidence: ".\\scripts\\capture-runtime-evidence.ps1 -OutputPath docs/evidence/releases/v2.6.2-runtime-evidence.json -Full -Quiet"
  size_gate_helper: "scripts/validate-size-gates.ps1"
  release_evidence_helper: "scripts/validate-release-evidence.ps1"
  runtime_helper: ".\\scripts\\agents-runtime.ps1"
  runtime_cleanup_helper: ".\\scripts\\agents-cleanup.ps1 -Action Verify"
  cleanup_mandatory_script: "scripts/agents-cleanup.ps1"
  route_pack_export: ".\\scripts\\export-route-pack.ps1"
  changed_english: 'rg -n "[\p{Han}]" <changed durable rule/template files>'
  changed_placeholders: 'rg -n "TO[D]O|\[TO[D]O\]|T[B]D|FI[X]ME" <changed durable rule/template files>'
  line_endings: "git ls-files --eol <changed files>"
  ignored_runtime: "git check-ignore -v --no-index runtime_local examples."
  deploy_steps_top_level: 'rg -n "^steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_steps_not_nested: 'rg -n "^  steps:" docs/agents/deploy.yaml docs/templates/agents/agents/deploy.yaml'
  deploy_sources_exist: "deployable_by_mode paths exist; modes/groups/script ValidateSet synced."
  deploy_manifest_unique: "deployable_by_mode paths unique; non-append paths unique."
  deploy_blocklist_required_paths: "do_not_deploy includes runtime, scratch, Codex runtime, .git paths."
  deployment_script_safety: "scripts/deploy-agents-workflow.ps1 keeps path-containment gates, no admin elevation, OS permission, .git repair."
  deployment_script_selftest: "root_docstemplate-providerdot_agents_docsdry-runprotected-existinggit-backed foreign projectmissing-targettarget-owned-statetarget-owned state preservationrouted-historicalambiguous-layoutapp-file preservationpartial-gitignoregitignore duplicate avoidancetarget handoff checktarget git rollback scopetarget-local environment bootstrap"
  target_handoff_check: "Inspect AGENTS route, skill, report, runbooks, protected local paths, target git status."
  multi_agent_workflow_integrity: "validate.ps1: lifecycle, ownership, roster/ledger recovery, dedupe, scoring, batch ack, delegated deployment, cleanup, runtime fields."
  evidence_template_schema_coverage: "scripts/validate-evidence-templates.ps1 checks hard-isolation/runtime multi-agent/runtime dry-run evidence fields."
  ci_workflow_stability: "scripts/validate.ps1 checks pinned Windows runner, fast gate, no duplicate full-audit/whitespace checks."
  template_pollution_rule: "Search deployable templates for concrete source/target literals."
  deployed_file_set_status: "git status -sb -- <deployed_file_set>"
  deployed_file_set_diff_check: "git diff --check -- <deployed_file_set>"
  powershell_rg_glob_rule: "PowerShell rg: options before --, then pattern and paths."
  deployed_file_set_literal_scan: "Search only deployed_file_set for source literals."
profiles:
  read_only_audit: "Read assigned paths; run allowed commands; report findings/isolation; skip unassigned state."
  fast_turn: "answer-only no command; edits read target, status, scoped diff, focused verify; state claims inspect source."
  policy_pack_edit: "AGENTS/.agents/docs/agents/runbooks/templates/memory/deploy changed: status, targets, diff, pair/prose/size gates."
  commit_tag_checkpoint: "commit/tag/version/branch-push: status_full, diff_check, manifest, pair/prose/EOL/size, no staged runtime."
  release_deploy_push_audit:
    use: "release, deploy, protected/main push, broad/no-deduction/full verification"
    do:
      baseline: ["status_full","diff_check","English/placeholder","EOL","ignored_runtime"]
      deployment_integrity: ["source/unique/blocklist","targeted template pollution"]
      deployment_script: ["path containment","self-write refusal","target creation","no permission/admin repair","self-test"]
      template_integrity: ["exact-pair drift","template bundle coverage"]
      schema_skill_integrity: ["schema coverage","multi-agent integrity","evidence template coverage","skill metadata"]
      size: ["size gates"]
      claim_specific: ["release appendix","runtime release evidence","runtime_multi_agent if claimed","hard_isolation if claimed"]
  enterprise_dispatch: "Inspect org/model-policy/dispatch; verify leaders/workers/tiers/escalation; use L1-6; leader-only integration."
  workflow_artifact: "Inspect workflow-artifacts/schemas/verify; use agents-workflow helper; verify gates/packets/guardrails/collection."
  context_compact: "Inspect context-compact/schemas/verify; preserve latest request/next step; record changes/verify/risks; exclude raw transcript."
  collaborator_window: "Inspect collaborators/verify; discover thread tools; map objective to leader; runtime evidence only; verify archive/close."
  core_system: "Inspect core-system/verify/version/deploy; verify canonical set, route pack, foundation layer, blocklist, version, old residue."
  foundation_creation: "Inspect openai-foundations/schemas/verify; schema-first outputs, state owner, tool boundary, latency control, evaluation gate."
  runtime_execution: "Inspect runtime-execution/verify; use scripts/agents-runtime.ps1; record gated approvals; verify cleanup evidence before cleanup claims."
  provider_adapter: "Inspect provider-adapters/model-policy/verify; bind tiers first; model ids replaceable."
  route_pack: "Inspect route-packs/ai-runtime/verify; export deterministic manifest; verify hashes and compact files."
  knowledge_footprint: "Inspect knowledge-footprint/context-compact/verify; store scope, refs, gaps, conclusion, resume pointer."
  runtime_multi_agent: "Claiming runtime multi-agent behavior requires live_employee_validation; batch claims also batch_employee_validation."
  hard_isolation: "Claiming tool/external isolation requires current hard-isolation evidence; otherwise behavioral-only."
size_gates:
  unit: "bytes; 1 KiB = 1024 bytes"
  targets:
    AGENTS.md: 1848
    project_skill: 1592
    canonical_agents_yaml: 15684
    script_ps1: 129000
    validate_script_ps1_after_split: 120668
    tracked_repo_kib: 896
  tracked_rule: "Ignored/untracked files excluded; intended new files count."
claim_scopes:
  static_policy_pack: "Relevant gates passed; no runtime/hard-isolation proof."
  runtime_multi_agent: "Only after live employee evidence; batch also needs reconciliation."
  hard_isolation: "Only after current tool/external enforcement evidence; else behavioral-only."
  deploy_clean: "Only after affected deploy.yaml source-neutral/template/blocklist checks."
  no_repo_pollution: "Only after status and ignored/local-runtime checks cover affected files."
minimum_evidence:
  static_policy_pack: ["changed files read","scoped diff reviewed","applicable gates passed"]
  branch_push: ["checkpoint gates","current branch/remote","push result"]
  deploy_clean: ["target authorization","target inspected","layout selected","deployed_file_set recorded","blocklist/source-neutral checks","handoff or skipped reason"]
  runtime_multi_agent: ["real runtime id","assignment/report match","git status after employee work","close evidence","expected/received/closed reconciliation","history_cleanup_evidence"]
  runtime_release_evidence: ["sanitized release evidence JSON","schema validation","command durations","exit codes","retry counts","token usage unavailable reason","local-only boundary"]
  workflow_artifact: ["workflow state verified","packet/result collection normalized","approval gate or escalation evidence"]
  context_compact: ["latest_user_request preserved","changed_files known/unknown","verification_state","open_risks","subagents_open or closed counts"]
  collaborator_window: ["thread capability discovered","leader mapping verified","runtime-local evidence","archive/close verified"]
  core_system: ["version aligned","canonical set verified","deploy/release contract checked","runtime blocklist checked","foundation route verified","old residue scan passed"]
  foundation_creation: ["official docs source checked","schema contract present","state owner named","tool boundary checked","latency control chosen","evaluation evidence planned"]
  runtime_execution: ["run state verified","gated action checked","tool/result evidence collected","cleanup evidence verified"]
  provider_adapter: ["tier mapping exists","capability boundary checked","no hard-bound workflow model id"]
  route_pack: ["route id checked","file hashes recorded","deterministic manifest verified","cache key fields present"]
  knowledge_footprint: ["scope recorded","evidence refs recorded","gaps explicit","resume pointer present","full transcript excluded"]
  hard_isolation: ["current tool/runtime/OS/account/cloud enforcement evidence"]
no_deduction_audit:
  rule: "Claim no-deduction only with release_deploy_push_audit-level proof plus runtime/hard-isolation evidence when applicable."
  always: ["repo state inspected","diffs reviewed","external access reported","GM/GS reported","templates source-neutral","deployed_file_set checks","runtime scratch not staged","claim scope stated"]
  when_applicable: ["non-overlap worker ownership","ledger/roster/event evidence","cleanup has history_cleanup_evidence","hard-isolation avoids forbidden reads unless authorized"]
coverage_gates:
  slim_policy_pack: ["no-command answer-only","compact profiles/claim bounds","enterprise/artifact/context compact/collaborator routes","source state excluded","assignment/report/runtime fields","lifecycle, recovery, scoring, deployment, validation"]
live_employee_validation:
  required: ["explicit hire/spawn request","real runtime id/nickname/mode/role/task","roster/ledger paths when needed","assignment fields","final report matches runtime id","ledger/poll/report/close snapshot match","git status proves scope","cleanup attempted or exact-aborted with history_cleanup_evidence"]
batch_employee_validation:
  required: ["expected id set created before dispatch","assignment has id + compact schema","missing/duplicate/invalid-format checks","failed/running/unclosed counted","close/list proves cleanup","history cleanup evidence zero residue or safe abort","batch report splits protocol smoke success from work success","project-local skill -> GS not used unless global/system SKILL.md used"]
  accepted_ack_formats: ["compact JSON object preferred","exact natural-language ack only when parser and normalization are stated"]
  invalid_outcomes: ["missing id","duplicate id","wrong id","parser-breaking fields","closed claim without close evidence"]
drift_checks:
  exact_pairs: ["docs and docs/templates mirror: templates, AGENTS.md, project skill files, ai-runtime, agents yaml, runbooks"]
  template_specific_cleanliness_files: ["docs/templates/agents/README.md","docs/templates/agents/gitignore.fragment","docs/templates/agents/project-memory.md","docs/templates/agents/project-structure.md","docs/templates/agents/memory-index.md"]
release_appendix:
  provider_repo_checks: ["tracked/intended docs/templates/agents files are paired or template-specific","template memory starter has no data rows/project names","schema field coverage matches templates","project skill metadata is valid"]
  source_neutral_scan_literals: ["provider repo/path","usernames","repo refs/status rows","non-placeholder memory rows"]
