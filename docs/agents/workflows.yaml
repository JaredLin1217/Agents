schema: agents-workflows/v2
purpose: "Routing, deploy, employee, scoring, handoff, skill, maintenance procedures."
owns: "Routing, runtime discipline, deploy flow, closeout."

read_first: ["ai-runtime route", "policy", "verify", "schemas", "deploy for target writes"]

startup:
  controller: ["Classify from AGENTS + ai-runtime", "No command for answer-only/no-state claim", "Inspect exact state before edits/git/deploy/runtime claim", "Use routed files + smallest verify"]
  common_task_matrix:
    answer_only: "Rules only; no command/status/verify/current-state claim."
    assigned_read_only_audit: "Assigned paths only; no status unless assigned; read_only_audit."
    current_state: "Read exact source; git status only for git claims; fast_turn."
    scoped_edit_no_behavior: "Target read, scoped status/diff, no broad scan."
    scoped_behavior_edit: "Target plus behavior source; focused test/lint/build."
    policy_pack_edit: "Changed canonical/template files plus pair/prose gates."
    git_checkpoint: "Changed manifest, status_full, commit_tag_checkpoint, push result."
    deploy_or_release: "deploy.yaml plus release_deploy_push_audit."
    multi_agent_batch_check: "Structured ack, lifecycle evidence, runtime_multi_agent."
    enterprise_dispatch: "Organization dispatch uses department leaders only; expand org/model-policy/dispatch."
  fast_classification:
    answer_only: "No repo/git/file/runtime/deploy/memory/hard-isolation claim."
    current_state: "Inspect named now/current/latest/clean/dirty/online/committed/pushed/tagged/deployed/active/completed."
    scoped_edit: "Status, target read, patch, scoped diff, focused verify."
    policy_pack_edit: "Use policy_pack_edit; changed mirror pairs only."
    multi_agent_runtime: "Explicit hire/delegate; fill slots; success needs ack + close proof."
    enterprise_dispatch: "Use only for organization-style dispatch, department commands, staff delegation, or model tier binding."
    deploy_release_audit: "Use deploy.yaml + release_deploy_push_audit."
    hard_isolation: "Claim behavioral-only unless enforcement is verified."
    delegated_deployment: "Use deploy.yaml; one deployment_worker; exact target auth; deployed_file_set writes only."
  employee: ["Read assignment", "Read only assigned paths/needed skill", "Run only allowed verify", "Report complete/blocked/stopped"]

progress_updates:
  canonical: "Single policy referenced by AGENTS, skills, runbooks."
  answer_only: "No interim update."
  short_read_only: "Skip under 30s or under 5 files unless blocked."
  ordinary_work: "One concise update per 30-60s or phase."
  workers: "Update before risky edits, on block, after meaningful verify, and final."
  runtime_cleanup: "One quiet batch unless blocked, scope expands, or detail requested."
  cap: "One or two sentences; do not repeat unchanged status."

memory:
  index: "docs/memory/index.md"
  entry_template: "docs/memory-entry.template.md"
  rules: ["Use only when prior project experience matters", "Current repo evidence wins", "Propose only verified reusable lessons"]

multi_agent_runtime:
  trigger_when: "explicit hire/spawn/delegate/parallel-agent request or clear equivalent"
  do_not_trigger_for: ["goal continuation", "optimization/audit/static validation without delegation request", "self-scoring unless requested"]
  modes: "session sidecar; manual-detached default; cloud/automation by request/setup."
  roles: "explorer read-only; worker exclusive scoped edits."
  explorer_lightweight: "Short read-only sidecar; explorer_brief_assignment; roster only if recovery matters."
  controller: "Assign, review, integrate, reconcile, report."
  batch_ack:
    use_when: "many-employee smoke/load/protocol or controller status check"
    assignment_contract: "No side effects; stable id; compact output; no file/command authority unless granted."
    compact_ack_schema: '{"id":"001","ok":true,"msg":"hello"}'
    validation: "expected id set; flag missing/duplicate/invalid-format/wrong-id/failed/running/unclosed; count requested/spawned/completed/closed; split protocol/work success"
    ledger_rule: "For 2+ active employees, record summary plus exceptions; per-agent events only for recovery/resume."
    closeout_fields: ["requested", "spawned", "completed", "closed", "missing", "duplicate", "invalid_format", "failed", "risk"]
  fast_spawn:
    prework: ["Status when worktree matters", "Brief per role", "Precompute expected id set/schema", "No per-employee runbook reread"]
    queue_rule: "Fill active slots, queue rest, refill when one completes or closes."
    wait_rule: "Wait only when controller needs results."
    close_rule: "Close after final report; launch next queued employee in freed slot."
    history_cleanup_rule: "Plain close closes runtime only; sidebar/history cleanup needs explicit cleanup wording or exact authorization."
    dismissal_cleanup_rule: "With cleanup wording, follow runtime.sidebar_cleanup_success_path; record schemas.history_cleanup_evidence before clean-roster claim."
    ledger_rule: "Append hired/report/closed/integrated events when recovery matters; batch ack records summary and exceptions."
  lifecycle_checks:
    before: ["confirm explicit employee use", "define role/read/write/command/report/close", "exclusive worker scopes", "record batch expected id set/schema"]
    during: ["poll when results needed", "dedupe reports", "track ids/formats/failures/unclosed", "stop at convergence/cap"]
    after: ["close completed runtimes", "authorized cleanup before clean-roster claims", "reconcile expected/received/completed/closed", "reconcile git/owned scopes", "keep ledger/runtime ignored"]
  ownership:
    required_for: "worker, two active employees, or controller edits near employee scopes"
    normalize: "repo-relative, slash-normalized, containment-aware, case-insensitive where needed"
    hard_fail: ["overlapping/contained active worker scopes", "worker edits outside scope", "controller edits active worker scope before poll/release/reconcile"]
  roster:
    project_local_ledger: ".agents/runtime/agent-ledger.jsonl"
    ledger_purpose: "Ignored advisory JSONL, not runtime DB, deployable, XR, or XW."
    ledger_writer: "Controller appends; employees only with exact grant."
    ledger_git_rule: "Never stage, commit, deploy, or copy .agents/runtime/**."
    ledger_missing_or_cleared: "Recover from runtime notices, status, reports, temp cache; missing ledger does not void evidence."
    temp_cache: "%TEMP%/codex-agent-status/<project-id>/"
    temp_cache_purpose: "External fallback for restarts, multiple controllers, or weak ledger."
    required_when: ["2+ active employees", "batch/many-employee smoke", "may outlive controller", "manual-detached/cloud", "worker writes", "ownership changes", "resume likely"]
    employee_access: "Only exact path/action granted."
    controller_access: "Allowed when required; report XR/XW once with exact temp path."
    git_rule: "Never stage/commit volatile roster, events, leases, or filled validation records."
    micro_batch_exception: "Short read-only scoring may skip roster if no recovery/status claim."
  runtime:
    completion: "Final report is completion notice."
    close: "Close exact runtime id before history cleanup."
    official_controls_first: "Prefer runtime close, then official status/archive/unsubscribe checks if available."
    official_status_checks: ["thread/list cwd+subAgent", "thread/loaded/list", "runtime close result"]
    official_delete_limit: "No official hard-delete thread API is assumed."
    refresh_limit: "If official state is clean but sidebar shows residue, reload/restart UI before more cleanup."
    dismissal_cleanup_standard: "Close ids, match closed ids by parent/cwd, hard-delete exact residue without backup, verify zero active/residue, record reload."
    quiet_cleanup: "Close ids, derive parent/cwd/subagent/closed targets, hard-delete exact DB/unread/rollout residue without backup, verify zero hits, summarize."
    history_cleanup: "External destructive cleanup after close; needs explicit cleanup wording or exact authorization with no-backup acknowledgement."
    history_cleanup_scope: "Hard-delete active DB rows, unread state, and matching rollout history only for closed subagent ids under current repo cwd + authorized parent."
    history_cleanup_no_backup: "Do not create, require, or rely on cleanup backups; if exact target scope cannot be proven, abort instead of broad deletion."
    sidebar_cleanup_success_path: ["authorize destructive cleanup/restart/no-backup", "close/prove inactive ids", "record parent+cwd+target count snapshot", "target closed subagent ids for parent/cwd", "hard-delete child edges/threads/unread and child rollouts; keep parent/user", "verify parent kept + zero residue/counts", "reload/restart UI; record XR/XW"]
    sidebar_cleanup_keep: ["parent/controller/user threads", "parent/user rollouts", "unrelated cwd/parent subagents unless requested", "runtime ledger unless exact cleanup requested"]
    orphan_cleanup_scope: "Delete orphan thread_spawn_edges only when both endpoints are missing and cleanup requested."
    post_cleanup_ui_rule: "When restart clears residue, record UI refresh result and stop."
    offline_cache_cleanup: "Only after exact residue survives reload/restart plus explicit shutdown/cache-cleanup authorization."
    history_cleanup_never: "Never delete parent/controller/user threads, unrelated cwd, non-subagent rollouts, backup/copy DB files, use ledger-only ids, create cleanup backups, or claim live UI refresh."
  report_dedupe:
    report_hash: "Hash normalized report identity and result."
    dedupe_key: "agent + runtime id + event + roster snapshot version + report hash"
    duplicate_rule: "Record matching final report once; do not reprocess duplicates."
    loop_guard: "Stop after 3 unchanged polls or 5 minutes; close retry max 2."

enterprise_dispatch_runtime:
  trigger_when: "Organization-style dispatch, department command, employee delegation, or model tier binding."
  do_not_trigger_for: ["answer-only", "ordinary scoped edit", "plain deploy without department command"]
  controller_assignment: "Controller assigns only department leaders with department, leader_role, objective, authority, owned_scope, verification_profile, model_tier, and report_back."
  department_leader_dispatch: "Leader may split internal work only to allowed worker roles and owns merge before controller report."
  internal_workers: "Workers report to their department leader unless escalation_record is required."
  department_report: "Leader returns one integrated department report with assignment_id, department, leader_role, worker_count, result, verification, risks, escalations, and isolation."
  model_policy: "Use tier names from model-policy; concrete model mapping is replaceable."
  escalation: "Create escalation_record for worker bypass, scope violation, unverifiable result, missing tier, model mismatch, or blocked authority."
  validation: "Verify department exists, leader matches org, tier exists, worker role is allowed, and direct worker-to-controller report has escalation_record."

scoring_batches:
  use_when: "explicit employee/review scoring or many-agent eval"
  default_size: "3"
  expand_to: "5 when spread >10 or top issue categories conflict"
  hard_cap: "7; 10 only with explicit approval"
  convergence: "Stop when n>=3, spread<=10, and majority shares top issue category."
  expansion_rule: "Before >5 scorers, state gap; never spawn for confidence alone."
  invalid_reports: ["bad score", "missing isolation line", "forbidden read/write", "unsupported hard-isolation/runtime claim"]
  validity_outcomes: "Use schemas.report_validation.validity_values; accepted, needs-revision, rejected, excluded."
  aggregation:
    primary_score: "median"
    also_report: ["mean", "min", "max", "range", "excluded", "confidence"]
    outlier_rule: "Flag scores outside median +/- 20 or invalid fields."
    confidence: "high n>=5 range<=10; medium n>=3 range<=20; low otherwise."
    cap_rule: "Cap confidence low when range >25 or mean/median differ by >10; cap aggregate score at 80 if invalid reports remain."
  synthesis:
    dedupe_by: "scope + root cause + proposed fix"
    top_limits: "top 5 issues/fixes, up to 3 dissent notes"
    duplicate_rule: "Count repeats as confidence, not separate issues."
    final_cap: "600-900 words unless user asks full detail."

handoff:
  project_id: "lowercase repo root; normalize separators; non a-z/0-9 to hyphen; collapse/trim hyphens"
  files: "project ledger .agents/runtime/agent-ledger.jsonl; temp cache %TEMP%/codex-agent-status/<project-id>/; legacy docs status/events are local-only."
  rules: "Inspect ledger first; temp cache fallback needs XR; verify runtime/app/git before status writes or close claims."

deployment:
  rule: "Use docs/agents/deploy.yaml for authorized targets; source repo must not store target status/history/commits/remotes/results."
  delegated_worker: "For deploy-to-path requests, assign one deployment_worker with target path, mode, dry-run/write scope, and no app-code/OS-permission repair authority."
  upgrade: "Treat upgrades as allowlisted redeployments: dry-run first, preserve target-owned state, and update only deployed_file_set."

skill_authoring:
  create_when: "Repeatable workflow fits procedure better than AGENTS, memory, decision, or runbook."
  layout: [".agents/skills/<skill-name>/SKILL.md", ".agents/skills/<skill-name>/agents/openai.yaml"]
  rules: ["matching folder/frontmatter name", "$skill default_prompt", "25-64 char short_description", "allow_implicit_invocation"]

maintenance:
  local_permission_boundary: ["No OS permission/ownership/ACL/.git repair", "Report local Git metadata blockers", "Resume Git only after writable repo or clean clone"]
  verification_profiles:
    fast_turn: "answer-only/scoped work; no command for answer-only without current-state claim"
    policy_pack_edit: "changed files and mirror pairs only unless broader claim"
    commit_tag_checkpoint: "ordinary commit/tag/version/branch-push checkpoints; fast gates only"
    release_deploy_push_audit: "release/deploy/protected-main-push/broad audit/no-deduction"
    runtime_multi_agent: "only with real employee runtime evidence"
    hard_isolation: "only with verified enforcement evidence"
  local_only: "Use verify.file_classes.runtime_local as the single source; never stage/deploy/copy."

closeout:
  compact_when: "answer-only with no files/current-state/external/git/deploy/runtime/hard-isolation/durable-knowledge claim"
  compact_output: "required isolation line plus directly relevant facts"
  expanded_when: "files changed, verification/risk/external access/git/deploy/runtime/hard-isolation/durable knowledge is involved"
