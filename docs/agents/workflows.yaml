schema: agents-workflows/v2
purpose: "Routing, deploy, employees, scoring, handoff, skills."
owns: "Route, runtime, deploy, closeout."
read_first: ["ai-runtime","policy","verify","schemas","deploy for target writes"]
startup:
  controller: ["Classify via AGENTS+ai-runtime","No command for answer-only/no-state","Inspect before edits/git/deploy/runtime claim","Use routed files + smallest verify"]
  common_task_matrix:
    answer_only: "Rules only; no command/status/current claim."
    assigned_read_only_audit: "Assigned paths only."
    current_state: "Read exact source; git status only for git claims."
    scoped_edit_no_behavior: "Target read, scoped status/diff."
    scoped_behavior_edit: "Target + behavior source; focused verify."
    policy_pack_edit: "Changed canonical/template pair gates."
    git_checkpoint: "Manifest, status_full, checkpoint, push."
    deploy_or_release: "deploy.yaml + release_deploy_push_audit."
    multi_agent_batch_check: "Structured ack, lifecycle evidence, runtime_multi_agent."
    enterprise_dispatch: "Department leaders only; expand org/model-policy/dispatch."
    workflow_artifact: "Use workflow_artifact; runtime local/ignored."
    context_compact: "Keep request, route, changes, verify, risks, employees, next."
    collaborator_window: "Named Codex sessions map to leader collaborators; thread ids runtime-local."
  fast_classification:
    answer_only: "No repo/git/file/runtime/deploy/memory/hard-isolation claim."
    current_state: "Inspect named now/current/latest/clean/dirty/online/committed/pushed/tagged/deployed."
    scoped_edit: "Status, target read, patch, scoped diff, focused verify."
    policy_pack_edit: "Use policy_pack_edit; changed pairs only."
    multi_agent_runtime: "Explicit hire/delegate; success needs ack, close proof, residue-zero."
    enterprise_dispatch: "Use only for org dispatch, department commands, staff delegation, tier binding."
    workflow_artifact: "Use only to create, verify, collect, simulate, normalize artifacts."
    context_compact: "Use only for compact, resume, handoff, auto-compaction, closeout summary."
    collaborator_window: "Use only for named collaborators, Codex windows, rename, recovery, archive, or close."
    deploy_release_audit: "Use deploy.yaml + release_deploy_push_audit."
    hard_isolation: "Behavioral-only unless enforcement is verified."
    delegated_deployment: "Use deploy.yaml; one deployment_worker; exact target; deployed_file_set only."
  employee: ["Read assignment","Read assigned paths/skill","Run allowed verify","Report complete/blocked/stopped"]
progress_updates:
  cap: "No interim for answer-only; otherwise one concise update per phase/30-60s and before risky edit/block/verify/final."
memory: "Use docs/memory/index.md for reusable lessons; current evidence wins."
multi_agent_runtime:
  trigger_when: "explicit hire/spawn/delegate/parallel-agent request"
  do_not_trigger_for: ["goal continuation","optimization/audit/static validation without delegation","self-scoring unless requested"]
  modes: "session sidecar; manual-detached default; cloud/automation by request/setup."
  roles: "explorer read-only; worker exclusive scoped edits."
  explorer_lightweight: "Short read-only sidecar; explorer_brief_assignment; roster only if recovery matters."
  controller: "Assign, review, integrate, reconcile, report."
  batch_ack:
    use_when: "many-employee smoke/load/protocol or controller status check"
    assignment_contract: "No side effects; stable id; compact output; no file/command authority unless granted."
    compact_ack_schema: '{"id":"001","ok":true,"msg":"hello"}'
    validation: "expected id set; flag missing/duplicate/invalid-format/wrong-id/failed/running/unclosed; count requested/spawned/completed/closed; split protocol/work"
    ledger_rule: "For 2+ active employees, record summary plus exceptions; per-agent events only for recovery/resume."
    closeout_fields: ["requested","spawned","completed","closed","missing","duplicate","invalid_format","failed","risk"]
  fast_spawn:
    prework: ["Status when worktree matters","Brief per role","Precompute expected id set/schema","No per-employee reread"]
    queue_rule: "Fill slots, queue rest, refill on completion/close."
    wait_rule: "Wait only when controller needs results."
    close_rule: "Close after final report; run runtime.quiet_cleanup for parent/cwd closed subagent ids before closeout; queue continues after residue-zero proof."
    history_cleanup_rule: "standing cleanup authorization: parent/cwd closed subagent ids; broader needs exact auth."
    dismissal_cleanup_rule: "Dismissal uses runtime.sidebar_cleanup_success_path; record history_cleanup_evidence before clean claim."
    ledger_rule: "Append events when recovery matters; batch ack records summary/exceptions."
  lifecycle_checks:
    before: ["confirm explicit employee use","define role/read/write/command/report/close","exclusive worker scopes","record batch expected ids/schema"]
    during: ["poll when needed","dedupe reports","track ids/formats/failures/unclosed","stop at convergence/cap"]
    after: ["close runtimes","quiet cleanup parent/cwd residue","residue-zero proof: sqlite/unread/rollout/delayed","reconcile expected/received/completed/closed","reconcile git/owned scopes","keep ledger/runtime ignored"]
  ownership:
    required_for: "worker, 2 active employees, or controller edits near scopes"
    normalize: "repo-relative, slash-normalized, containment-aware, case-insensitive when needed"
    hard_fail: ["overlapping/contained active worker scopes","worker edits outside scope","controller edits active worker scope before poll/release/reconcile"]
  roster:
    project_local_ledger: ".agents/runtime/agent-ledger.jsonl"
    ledger_purpose: "Ignored advisory JSONL; not DB, deployable, XR, or XW."
    ledger_writer: "Controller appends; employees only with exact grant."
    ledger_git_rule: "Never stage, commit, deploy, or copy .agents/runtime/**."
    ledger_missing_or_cleared: "Recover from notices, status, reports, temp cache; missing ledger does not void evidence."
    temp_cache: "%TEMP%/codex-agent-status/<project-id>/"
    temp_cache_purpose: "External fallback for restarts, multiple controllers, weak ledger."
    required_when: ["2+ active employees","batch/many smoke","may outlive controller","manual-detached/cloud","worker writes","ownership changes","resume likely"]
    employee_access: "Only exact path/action granted."
    controller_access: "Allowed when required; report XR/XW once with exact temp path."
    git_rule: "Never stage/commit volatile roster, events, leases, or filled validation records."
    micro_batch_exception: "Short read-only scoring may skip roster without recovery/status claim."
  runtime:
    completion: "Final report is completion notice."
    close: "Close exact runtime id before history cleanup."
    official_controls_first: "Use runtime close/status/archive/unsubscribe first; no hard-delete API assumed."
    close_success: "Clean roster = inactive + official zero + sqlite edge/thread zero + session-index zero + unread-state zero + rollout zero + delayed zero."
    residue_sources: ["state_*.sqlite: threads/thread_spawn_edges","session_index.jsonl: child rows",".codex-global-state*.json: unread ids","sessions|archived_sessions: child rollouts"]
    cleanup_order: ["close/prove inactive","resolve runtime ids, not sidebar nicknames","official cwd/source list","match parent/cwd/thread_source=subagent","delete thread_spawn_edges then threads","delete session_index rows","delete unread ids/rollouts","delay verify zero"]
    quiet_cleanup: "Standing closeout cleanup: exact runtime ids; delete sqlite/session-index/unread/rollout residue without backup; delayed zero verification; summarize XR/XW."
    history_cleanup: "Dispatch closeout uses quiet_cleanup after close; other cleanup needs exact no-backup auth."
    sidebar_cleanup_success_path: "close proof -> official zero -> sqlite/session-index/unread/rollout zero -> delayed zero -> UI reload if stale"
    sidebar_cleanup_keep: ["parent/controller/user threads","unrelated cwd/parent","runtime ledger unless exact cleanup requested"]
    orphan_cleanup_scope: "Delete orphan thread_spawn_edges only when both endpoints are missing and cleanup requested."
    history_cleanup_never: "Never delete nickname-only, parent/user threads, unrelated cwd, non-subagent rollouts, DB backups/copies, ledger-only ids, or unobserved UI refresh."
  report_dedupe:
    report_hash: "Hash normalized report identity and result."
    dedupe_key: "agent + runtime id + event + roster snapshot version + report hash"
    duplicate_rule: "Record matching final report once; do not reprocess duplicates."
    loop_guard: "Stop after 3 unchanged polls or 5 minutes; close retry max 2."
enterprise_dispatch_runtime:
  source_of_truth: "docs/agents/dispatch.yaml owns enterprise dispatch semantics."
  trigger_when: "Org dispatch, department command, delegation, or model tier binding."
  do_not_trigger_for: ["answer-only","ordinary scoped edit","plain deploy without department command"]
  controller_assignment: "Controller assigns only department leaders with department, leader_role, objective, authority, scope, verification_profile, model_tier, report_back."
  department_leader_dispatch: "Leader may split work to allowed worker roles and owns merge before controller report."
  internal_workers: "Workers report to their department leader unless escalation_record is required."
  department_report: "Leader returns one report: assignment_id, department, leader_role, worker_count, objective_result, verification, risks, escalations, isolation."
  model_policy: "Use model-policy tiers; concrete model mapping is replaceable."
  escalation: "Create escalation_record for worker bypass, scope violation, unverifiable result, missing tier, model mismatch, blocked authority."
  validation: "Verify department, leader, tier, worker role, and worker-to-controller escalation_record."
workflow_artifact_runtime:
  source_of_truth: "docs/agents/workflow-artifacts.yaml owns artifact semantics."
  trigger_when: "Create, verify, collect, simulate, or normalize artifacts, packets, gates, reports."
  do_not_trigger_for: ["answer-only","ordinary scoped edit","plain deploy","enterprise dispatch without artifact backing"]
  storage_rule: "Artifacts stay under .agents/runtime/workflows/<workflow_id>/; .workflow alias only; never commit, deploy, release, copy."
  controller_rule: "Controller integrates department reports, collection reports, or escalation records only; raw worker chatter is not evidence."
  approval_gate_rule: "write, deploy, external, destructive, or model tier upgrade needs approval gate or escalation record."
  collection_rule: "Collect packets/results into normalized report fields before final report."
  simulation_rule: "Level 1-3 smoke must pass; Level 4 and Level 6 guardrails must block or escalate; Level 5 optional."
  cleanup_rule: "Close employees, run history cleanup, leave artifacts local or delete by explicit request."
context_compact_runtime:
  source_of_truth: "docs/agents/context-compact.yaml owns compaction semantics."
  trigger_when: "Manual/auto compact, resume, handoff, subagent closeout, pre-commit/deploy."
  do_not_trigger_for: ["answer-only","ordinary scoped edit","plain deploy","enterprise dispatch without compact backing"]
  summary_rule: "Preserve latest_user_request, route, files, pending, verification_state, open_risks, external, subagents, next_step, isolation."
  raw_content_rule: "Do not preserve raw transcript, raw worker chatter, long output, or superseded instructions."
  subagent_rule: "Closeout records requested, spawned, completed, closed, missing, duplicate, invalid_format, failed, risk."
  risk_rule: "Unclosed employees, missing verification, unknown changes, or omitted external access must be open_risks."
  runtime_rule: "Compact events stay local under .agents/runtime/compact-events.jsonl; never stage, deploy, release, or copy."
collaborator_window_runtime:
  source_of_truth: "docs/agents/collaborators.yaml owns collaborator windows."
  trigger_when: "Create, rename, message, inspect, recover, archive, close, or dismiss a named collaborator window."
  do_not_trigger_for: ["answer-only","ordinary scoped edit","plain deploy","subagent sidebar cleanup without collaborator operation"]
  target_rule: "Controller creates department_leader_window collaborators only; worker windows need explicit override and escalation_record."
  assignment_rule: "Send department, leader_role, objective, authority, scope, model_tier, expected report."
  report_rule: "Collaborators return department_report, collaborator_report, or escalation_record; controller excludes raw worker chatter."
  close_rule: "Use thread archive/close for collaborator windows; use multi_agent cleanup for subagent sidebar/history residue."
  runtime_rule: "Live thread ids, titles, active lists, close evidence stay under .agents/runtime/collaborators.jsonl or temp cache only."
scoring_batches:
  use_when: "explicit scoring or many-agent eval"
  default_size: "3"
  expand_to: "5 when spread >10 or top issues conflict"
  hard_cap: "7; 10 only with explicit approval"
  convergence: "Stop when n>=3, spread<=10, majority top issue matches."
  expansion_rule: "Before >5 scorers, state gap; never spawn for confidence alone."
  invalid_reports: ["bad score","missing isolation line","forbidden read/write","unsupported hard-isolation/runtime claim"]
  validity_outcomes: ["accepted","needs-revision","rejected","excluded"]
  aggregation:
    cap_rule: "Cap low when range >25 or invalid reports remain."
    rule: "Median; report mean/range/excluded/confidence; flag outliers >20."
handoff:
  project_id: "lowercase repo root; normalize separators; non a-z/0-9 to hyphen; collapse/trim"
deployment:
  rule: "Use docs/agents/deploy.yaml for authorized targets; source repo must not store target status/history/commits/remotes/results."
  delegated_worker: "For deploy-to-path requests, assign one deployment_worker with target path, mode, dry-run/write scope, and no app-code/OS-permission repair authority."
  upgrade: "Allowlisted redeploy: dry-run first, preserve target-owned state, update deployed_file_set."
skill_authoring: "Create .agents/skills/<name>/SKILL.md only for repeatable repo-local procedures."
maintenance:
  local_permission_boundary: ["No OS permission/ownership/ACL/.git repair","Report Git metadata blockers","Resume after writable repo or clean clone"]
  verification_profiles:
    fast_turn: "answer-only/scoped work; no command for answer-only without current-state claim"
    policy_pack_edit: "changed files and mirror pairs only unless broader claim"
    commit_tag_checkpoint: "ordinary commit/tag/version/branch-push checkpoints; fast gates only"
    release_deploy_push_audit: "release/deploy/protected push/broad audit/no-deduction"
    runtime_multi_agent: "only with real employee runtime evidence"
    collaborator_window: "only with thread capability evidence and runtime-local close/archive proof"
    hard_isolation: "only with verified enforcement evidence"
  local_only: "Use verify.file_classes.runtime_local as the single source; never stage/deploy/copy."
closeout:
  compact_output: "required isolation line plus directly relevant facts"
  compact_handoff: "Use context_compact fields; compact summaries are not approvals."
