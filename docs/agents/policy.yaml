schema: agents-policy/v2
purpose: "Compact repo-local operating policy for the isolated Agents workflow."
owns: "Authority, isolation, editing boundaries, knowledge layers, template cleanliness, closeout, and hard fail gates."

authority:
  repo_reality: "When current repo state matters, trust files, scripts, git state, diffs, logs, tests, and observed behavior over prior chat or memory."
  memory: "Hint only; verify before acting."
  limitation: "Repo rules are behavioral, not runtime sandboxing. Claim technical isolation only with current verified evidence."
  higher_priority: "Codex system instructions, tools, plugins, and system skills may still exist; report intentional global/system SKILL.md use."

project_state:
  rule: "Do not assume mode, framework, scripts, runtime, or architecture until repo files define them."
  verification: "Use the smallest applicable profile in docs/agents/verify.yaml."

task_classification:
  order:
    - "answer_only: no repo state, file, git, deploy, runtime, or hard-isolation claim."
    - "current_state: user asks what is true about repo/deploy/git/runtime state now, such as latest, clean, dirty, online, committed, pushed, tagged, deployed, active, or completed."
    - "scoped_edit: bounded file/content change without release/deploy/broad-audit claim."
    - "policy_pack_edit: Agents rules, templates, memory docs, skills, or runbooks changed."
    - "multi_agent_runtime: user explicitly hires/spawns/delegates/asks for parallel employees or runtime status."
    - "git_checkpoint: user asks commit, tag, or ordinary branch push without release/deploy/no-deduction claim."
    - "deploy_or_release: user asks deploy, release, protected/main push, target repo sync, or no-deduction proof."
    - "hard_isolation: user asks for guaranteed sandbox, filesystem, account, cloud, or runtime enforcement."
  rule: "Select the highest-risk matching class; if mixed, verify the highest-risk claim and keep the rest scoped."

isolation:
  durable_storage: "Store project rules, memory, decisions, runbooks, and skills in this repo."
  global_memory: "Not used unless the user explicitly asks."
  global_skills: "GS means intentionally opening or following a global/system SKILL.md. Ambient system/developer instructions and project-local .agents/skills/** do not count as GS used."
  external_filesystem:
    default: "No read/write/list/create/delete/move/stage/commit/config outside repo root."
    allowed:
      - "User-authorized exact path/action."
      - "Approved temp handoff cache: %TEMP%/codex-agent-status/<project-id>/."
      - "Official Codex runtime/app-server status, close, archive, or unsubscribe controls for exact current-project thread ids when available."
      - "Codex App sidebar/history cleanup for exact subagent runtime ids after explicit cleanup wording, or by standalone exact cleanup authorization."
      - "Offline Codex Desktop UI-cache cleanup only after explicit shutdown/cleanup authorization and only for exact current-project runtime ids."
    report: "Report intentional external reads as XR and writes as XW; temp roster and Codex App state/history/cache access must be listed exactly once in closeout. Project-local ledger access is repo-local and not XR/XW."
  codex_app:
    local_policy: ".codex/config.toml is repo-local."
    live_environment: ".codex/environments/environment.toml is ignored runtime state."
    template_environment: ".codex/environments/environment.template.toml is reference-only."
    official_thread_controls: "Prefer runtime close plus app-server thread/list, thread/loaded/list, thread/archive, and thread/unsubscribe when available; no official hard-delete thread API is assumed."
    sidebar_history_db: "%USERPROFILE%/.codex/state_<n>.sqlite plus matching subagent rollout files under %USERPROFILE%/.codex/sessions and archived_sessions are external runtime UI/history state; clean only current-project subagent records/files, exclude user/controller threads and backup/copy DB files."
    desktop_ui_cache: "Codex Desktop may keep sidebar entries in live memory after official lists, DB rows, and rollout files are clean; first reload/restart the UI and use post-restart absence as refresh evidence before any cache cleanup claim."

runtime_enforcement:
  default: "behavioral-only"
  stronger_claims_require: "Current runtime, tool, OS, account, cloud, or external enforcement evidence."

editing:
  before:
    - "Run git status before edits when feasible."
    - "Read target files before patching."
    - "Protect user/parallel-agent changes."
    - "Ask before dependencies, public API/data format, release/build/deploy changes, or destructive actions."
  during:
    - "Keep changes small, scoped, and reversible."
    - "Follow existing names, layout, docs, and tests."
    - "Do not hand-edit generated output, caches, build output, vendored files, runtime copies, or .git unless targeted."

knowledge_layers:
  AGENTS.md: "Small every-session router."
  docs/agents: "Canonical policy pack."
  docs/project-memory.md: "Project-local memory overview."
  docs/memory/index.md: "Searchable memory index."
  docs/memory/entries: "Verified reusable lessons."
  docs/decisions: "Durable decisions."
  docs/runbooks: "Short procedure routers."
  docs/templates/agents: "Source-neutral deployment bundle."
  .agents/skills: "Project-local skills."

placement:
  deploy_templates: "docs/templates/agents/"
  project_local_agent_ledger: ".agents/runtime/agent-ledger.jsonl"
  volatile_agent_status: "%TEMP%/codex-agent-status/<project-id>/"
  ignored_local_scratch: ".agents/runtime/, docs/tmp-approval-*/, docs/hard-isolation-evidence/, docs/runtime-multi-agent-validation/"
  rule: "Volatile status, ledger, and validation records are coordination aids, not deployable project knowledge."

template_cleanliness:
  deployable_templates_must_not_contain:
    - "source project name/path/commit/tag/remote/branch/push status"
    - "source employee history/status/validation/deployment results"
    - "source memory rows or entries"
    - "target-specific records"

closeout:
  required_line: "Isolation: GM <used/not used> | GS <used/not used> | XR <none/paths> | XW <none/paths>"
  compact: "For answer-only/no-change work with no current-state, external-access, runtime, release, deploy, no-deduction, or hard-isolation claim, the required line plus directly relevant facts is enough."
  caps:
    answer_only: "answer/result, optional caveat, required isolation line"
    read_only_explorer: "score/result, up to 3 issues, up to 3 fixes, required isolation line"
    runtime_cleanup: "closed ids, cleanup counts, remaining-hit summary, UI reload/restart note when needed, required isolation line"
    scoped_edit: "changed files, verification, risk, required isolation line"
    audit_or_deploy: "claim scope, checks, failures/risks, required isolation line"
  expand_for:
    - "file changes"
    - "verification supporting a claim"
    - "remaining risk"
    - "external access"
    - "new durable knowledge"
    - "explicit claim scope"

hard_fail_gates:
  - "No global Memory without explicit user approval."
  - "No intentional global/system skill use for normal work."
  - "No external filesystem access without exact authorization or temp-cache exception."
  - "No source-specific state in deployable templates."
  - "No overlapping active worker write scopes."
  - "No compact-risk/concurrent/editing employee without project-local ledger or temp roster evidence."
  - "No Codex App sidebar/history/cache cleanup without runtime close first, exact current-project runtime ids, schema/source check, and explicit cleanup wording or standalone exact cleanup authorization."
  - "No Desktop UI-cache cleanup before reload/restart is tried or explicitly bypassed with shutdown/cache-cleanup authorization."
  - "No hard-isolation claim without verified evidence."
  - "Keep AGENTS.md and project SKILL.md compact."
