schema: agents-version/v2
purpose: "Foundation creation version metadata for provider and target deployments."
owns: "Foundation creation version, deployment contract, and upgrade expectations."
workflow:
  version: "2.6.1"
  channel: "foundation-creation"
  positioning: "Stabilization release preserving foundation creation semantics while adding source traceability, runtime dry-run evidence boundaries, and size headroom."
  root_principle: "One repo-local operating standard, official-docs-first capability creation, source-neutral deployment, runtime-local evidence, project-owned knowledge, and repeatable task flow across growing projects."
readiness_ladder:
  P0: "Validation entry point, canonical contracts, English-only durable rules, ignored runtime and local state, and no local permission repair."
  P1: "Deployment dry-run, target layout detection, provider self-write refusal, deployed file boundary, and upgrade gate."
  P2: "Source-neutral template bundle, exact-pair drift checks, route packs, schema mirrors, and template coverage."
  P3: "Delegated deployment worker rules, enterprise department leader dispatch, collaborator leader windows, artifact-backed workflow packets, runtime execution evidence, and lifecycle checks."
  P4: "Release audit profile, release package export, workflow artifact verification, runtime blocklists, hard-isolation claim boundaries, full verification, and size gates."
  P5: "Target-owned state preservation, target rollback by version control, artifact-backed evidence, collaborator thread runtime boundaries, context compaction contracts, knowledge footprints, foundation creation contracts, and compact workflow growth controls."
upgrade_policy:
  default: "dry-run first"
  core_contract_rule: "Upgrades must preserve AGENTS.md routing, project-local skill invocation, enterprise_dispatch, workflow_artifact, context_compact, collaborator_window, foundation_creation, runtime_execution, deploy modes, ignored runtime boundaries, and target-owned state."
  foundation_creation_rule: "Upgrades must preserve openai_foundations, official-docs-first guidance, schema-first outputs, explicit state ownership, tool boundaries, latency controls, and evaluation gates."
  breaking_change_rule: "A breaking change requires migration notes and explicit target opt-in."
  overwrite_scope: "Only allowlisted deployed files may be updated."
  preserve_target_owned: ["runtime state", "workflow artifacts", ".workflow imports", "local Codex config", "memory entries", "status files", "events", "commits", "remotes", "deployment history"]
  rollback: "Use target version control or target backup; provider repo does not store target rollback state."
delegation:
  worker_role: "deployment_worker"
  enterprise_dispatch_rule: "Controller sends enterprise assignments to department leaders; leaders split internal worker tasks and return department reports."
  workflow_artifact_rule: "Artifact-backed dispatch records local packets/results under .agents/runtime/workflows or .workflow alias; controller finalizes normalized reports only."
  context_compact_rule: "Context compaction preserves only latest request, route, changes, verification, risk, employee closeout, and next-step state; runtime compact events stay local."
  collaborator_window_rule: "Collaborator windows are named Codex threads for department leaders only; live thread ids and close evidence stay runtime-local."
  foundation_creation_rule: "Foundation creation turns official OpenAI guidance into scoped, schema-backed, verifiable repo-local capabilities before release."
  runtime_execution_rule: "Plans, approvals, tool evidence, results, and cleanup claims are recorded as runtime-local execution evidence."
  knowledge_footprint_rule: "Cross-window resume stores scope, opened files, evidence refs, gaps, conclusion, and resume pointer without full transcript."
  large_batch_rule: "Requests for more employees than the runtime can keep active must run in waves with queued assignments, replacement rules, and final reconciliation."
  controller_rule: "Controller grants one exact target path, one selected mode, and explicit write or dry-run scope."
  worker_rule: "Worker deploys only the selected mode's deployed_file_set and reports exact read/write paths."
